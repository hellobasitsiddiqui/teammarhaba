# TeamMarhaba — GCP/Firebase project configuration (single source of truth).
# Consumed by deploy workflows and app config; never hardcode these in app code.
project_id: teammarhaba
project_number: "58443206078"
display_name: TeamMarhaba
# Default region for regional resources (Cloud Run, Cloud SQL). The project,
# Firebase, and Auth are not themselves regional.
default_region: europe-west2
billing_account: 01D78A-BEFF21-4B5232

# APIs enabled on the project (TM-66).
enabled_apis:
  - run.googleapis.com            # Cloud Run (backend deploy)
  - sqladmin.googleapis.com       # Cloud SQL Admin (Postgres)
  - firebasehosting.googleapis.com # Firebase Hosting (web)
  - secretmanager.googleapis.com  # Secret Manager
  - artifactregistry.googleapis.com # Artifact Registry (images)
  - firebase.googleapis.com       # Firebase platform
  - identitytoolkit.googleapis.com # Firebase Authentication

# Artifact Registry (TM-55). Docker repo CI pushes images to and Cloud Run pulls
# from; keyless via WIF + the deploy SA's artifactregistry.writer. See
# artifact-registry.md. (TM-66 enabled the API; the repo itself was created in TM-55.)
artifact_registry:
  repository: containers
  location: europe-west2
  host: europe-west2-docker.pkg.dev
  backend_image: europe-west2-docker.pkg.dev/teammarhaba/containers/backend

# Firebase Authentication providers (TM-66). Google = the chosen social login.
auth:
  providers:
    - google.com   # enabled

# Cloud SQL Postgres (TM-63). Dev uses public-IP + Cloud SQL Auth Proxy (no
# authorized networks); private-IP/VPC-connector hardening is deferred to TM-95.
cloud_sql:
  instance: teammarhaba-pg
  connection_name: teammarhaba:europe-west2:teammarhaba-pg
  region: europe-west2
  database_version: POSTGRES_16
  edition: enterprise
  tier: db-f1-micro          # smallest shared-core; stoppable to save cost in dev
  storage: { type: HDD, size_gb: 10 }
  public_ip: true            # no authorized networks; reached only via Auth Proxy
  database: teammarhaba
  user: app
  password_secret: teammarhaba-db-app-password   # Secret Manager; never committed

