# docker-compose.yml — local dev stack (TM-52 / 1.2.4)
#
# Runs the whole TeamMarhaba system locally with one command:
#   backend (Spring Boot) + web (nginx) + Postgres.
#
# Usage (preferred — bootstraps a working local .env automatically):
#   make up                   # runs `make setup` first, then compose up --build -d
#   # backend  -> http://127.0.0.1:8080/health
#   # web      -> http://127.0.0.1:8081
#
# To exercise *authenticated* endpoints locally (sign-in → GET /api/v1/me), the backend
# needs Google Application Default Credentials to verify Firebase ID tokens. Run
# `gcloud auth application-default login` once on the host; the backend service mounts that
# ADC read-only (see GOOGLE_APPLICATION_CREDENTIALS below). Without it, auth calls 401 and
# the web shows "could not load profile" (TM-130).
#
# `.env.example` is the PRODUCTION contract (profile prod, blank secret DB_PASSWORD) — it
# is NOT a runnable local config, so don't `cp .env.example .env`. `make setup`
# (scripts/setup-env.sh, TM-127) writes a git-ignored `.env` with local-dev defaults.
#
# Env is read from ./.env (the same var contract as .env.example). There are NO ":-default"
# fallbacks; the required vars use the ":?" *required* operator, so `docker compose up`
# without a populated .env fails loudly and immediately (TM-64 / 1.4.5) instead of
# silently substituting blanks. All host ports bind to 127.0.0.1 only (never exposed
# beyond the loopback interface).
name: teammarhaba

services:
  postgres:
    image: postgres:16-alpine            # matches Cloud SQL POSTGRES_16 (config.yaml)
    environment:
      POSTGRES_DB: ${DB_NAME:?DB_NAME is required - run `make setup` (or `make up`) to generate a local .env}
      POSTGRES_USER: ${DB_USER:?DB_USER is required - run `make setup` (or `make up`) to generate a local .env}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required - run `make setup` (or `make up`) to generate a local .env}
    ports:
      - "127.0.0.1:5432:5432"            # loopback only
    volumes:
      - pgdata:/var/lib/postgresql/data  # named volume — data survives restarts
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ./backend                 # multi-stage Dockerfile from TM-50
    environment:
      SPRING_PROFILES_ACTIVE: dev         # local profile (Postgres via this compose)
      # Datasource wiring against the compose Postgres. Spring relaxed-binding env
      # names, so this activates automatically once the JDBC driver + datasource land
      # (TM-70 profiles / TM-71 Flyway); today the web-only skeleton ignores it.
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:?FIREBASE_PROJECT_ID is required - run `make setup` (or `make up`) to generate a local .env}
      # The backend verifies caller Firebase ID tokens via the Admin SDK, which reads
      # Application Default Credentials (TM-79). The image is keyless (no committed SA key),
      # so locally we point it at the host ADC mounted below. WITHOUT this, every
      # authenticated request 401s and the web app shows "could not load profile" (TM-130).
      GOOGLE_APPLICATION_CREDENTIALS: /gcp/adc.json
    ports:
      - "127.0.0.1:8080:8080"            # loopback only; Spring binds ${PORT:8080}
    volumes:
      # Mount the developer's host ADC (`gcloud auth application-default login`) read-only so
      # the backend can verify Firebase tokens locally — keyless, no SA key (TM-130 / TM-79).
      # Token verification only needs Google's public certs + the project id, so a user-type
      # ADC is enough. Override the host path with GOOGLE_ADC_PATH if your ADC lives elsewhere.
      - ${GOOGLE_ADC_PATH:-${HOME}/.config/gcloud/application_default_credentials.json}:/gcp/adc.json:ro
    depends_on:
      postgres:
        condition: service_healthy        # wait for Postgres to accept connections
    healthcheck:
      # No curl/wget assumed in the slim JRE image — check the port is listening
      # via bash's /dev/tcp (present on the temurin jammy base).
      test: ["CMD-SHELL", "timeout 3 bash -c '</dev/tcp/localhost/8080' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 40s
    restart: unless-stopped

  web:
    build:
      context: ./web                      # static bundle -> nginx (TM-51)
    ports:
      - "127.0.0.1:8081:8080"            # nginx listens on 8080; host 8081 avoids the backend clash
    restart: unless-stopped

volumes:
  pgdata:
