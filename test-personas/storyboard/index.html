<!doctype html><html lang="en"><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
<style>
  body{margin:0;background:#fbf6ec;font-family:Nunito,system-ui,sans-serif;
       background-image:radial-gradient(#e3d8c4 1px,transparent 1px);background-size:22px 22px}
  .wrap{padding:30px 34px}
  h1{font-family:'Patrick Hand',cursive;margin:0 0 2px;font-size:32px;color:#2b2b2b}
  .sub{color:#6b6257;margin:0 0 22px;font-size:15px}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:22px}
  .cell{margin:0;text-align:center}
  .phone{background:#111;border-radius:28px;padding:9px;box-shadow:5px 7px 0 rgba(0,0,0,.12)}
  .phone img{display:block;width:100%;border-radius:20px}
  figcaption{margin-top:9px;font-size:13px;line-height:1.3}
  figcaption b{display:block;color:#2b2b2b}
  figcaption span{color:#6b6257}
</style></head>
<body><div class="wrap">
  <h1>Story 01 — Willen Lake Walk · lockstep phone wall</h1>
  <p class="sub">Every persona's screen at the same step (2×4). Proof of the storyboard compositor — TM-636 / TM-628. Screens are the design-kit paper wireframes; the live multi-context journey lands with TM-528.</p>
  <div class="grid">
    <figure class="cell">
      <div class="phone"><img src="panels/panel-1.png" alt="Joe · 18 · free"></div>
      <figcaption><b>Joe · 18 · free</b><span>Event detail — on the waitlist</span></figcaption>
    </figure>
    <figure class="cell">
      <div class="phone"><img src="panels/panel-2.png" alt="Sarah · member"></div>
      <figcaption><b>Sarah · member</b><span>RSVP confirmed — you're going</span></figcaption>
    </figure>
    <figure class="cell">
      <div class="phone"><img src="panels/panel-3.png" alt="Marcus · 45"></div>
      <figcaption><b>Marcus · 45</b><span>My events — promoted off waitlist</span></figcaption>
    </figure>
    <figure class="cell">
      <div class="phone"><img src="panels/panel-4.png" alt="Priya · premium"></div>
      <figcaption><b>Priya · premium</b><span>Browsing the events feed</span></figcaption>
    </figure>
    <figure class="cell">
      <div class="phone"><img src="panels/panel-5.png" alt="Group chat"></div>
      <figcaption><b>Group chat</b><span>Event thread — 'see you at the boathouse'</span></figcaption>
    </figure>
    <figure class="cell">
      <div class="phone"><img src="panels/panel-6.png" alt="Everyone"></div>
      <figcaption><b>Everyone</b><span>Notifications — the confirmations</span></figcaption>
    </figure>
    <figure class="cell">
      <div class="phone"><img src="panels/panel-7.png" alt="Aisha · admin"></div>
      <figcaption><b>Aisha · admin</b><span>Event roster — eyeballing attendance</span></figcaption>
    </figure>
    <figure class="cell">
      <div class="phone"><img src="panels/panel-8.png" alt="On the day"></div>
      <figcaption><b>On the day</b><span>GPS check-in at the lake</span></figcaption>
    </figure></div>
</div></body></html>
