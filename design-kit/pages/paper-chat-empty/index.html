<!doctype html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Chat empty (paper)</title><link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Inter:wght@500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--ink:#1B1B1B;--white:#fff;--g1:#EEEEEE;--g2:#D8D8D8;--g4:#929292;--g5:#696969;--accent:#37D4AD;--accent-light:#DAFCF3}
*{box-sizing:border-box}body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#d6d6d6;padding:24px;font-family:"Patrick Hand",ui-rounded,system-ui,sans-serif;color:var(--ink)}
.phone{width:384px;min-height:788px;overflow:hidden;display:flex;flex-direction:column;background:var(--white);border:3px solid var(--ink);border-radius:42px}
.statusbar{display:flex;justify-content:space-between;padding:12px 22px 0;font-size:12.5px;color:var(--g5);font-family:"Inter",sans-serif;font-weight:500}
.topbar{display:flex;align-items:center;gap:10px;padding:8px 16px 10px;border-bottom:2px solid var(--ink)}.back{width:36px;height:36px;display:grid;place-items:center;border:2px solid var(--ink);border-radius:50%}.back svg{width:18px;height:18px;stroke:var(--ink);fill:none;stroke-width:2.2}.topbar h1{font-size:20px;margin:0}.topbar .sub{font-family:"Inter",sans-serif;font-weight:500;font-size:11.5px;color:var(--g4)}
main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:0 40px;background:var(--g1)}
.ic{width:96px;height:96px;border:2.5px dashed var(--ink);border-radius:22px;display:grid;place-items:center;background:var(--white);margin-bottom:16px}.ic svg{width:48px;height:48px;stroke:var(--g4);fill:none;stroke-width:1.6}
h2{font-size:24px;margin:0 0 6px}p{font-family:"Inter",sans-serif;font-weight:500;color:var(--g5);font-size:14px;margin:0}
.composer{display:flex;gap:8px;align-items:center;padding:10px 12px;border-top:2px solid var(--ink);background:var(--white)}.inp{flex:1;border:2px solid var(--ink);border-radius:999px;padding:8px 14px;font-family:"Inter",sans-serif;font-size:14px;color:var(--g4)}
.send{width:42px;height:42px;border:2px solid var(--ink);border-radius:50%;background:var(--accent);display:grid;place-items:center;box-shadow:2px 2px 0 var(--ink)}.send svg{width:18px;height:18px;stroke:var(--ink);fill:none;stroke-width:2}
</style></head><body>
<div class="phone">
<div class="statusbar"><span>9:41</span><span>wifi · 84%</span></div>
<div class="topbar"><span class="back"><svg viewBox="0 0 24 24"><path d="M15 5l-7 7 7 7"/></svg></span><div><h1>Park Picnic</h1><div class="sub">6 going</div></div></div>
<main>
<div class="ic"><svg viewBox="0 0 24 24"><path d="M5 5h14v10H9l-4 4z"/></svg></div>
<h2>No messages yet</h2>
<p>Be the first to say hi 👋 — break the ice with the group.</p>
</main>
<div class="composer"><div class="inp">Say hi…</div><span class="send"><svg viewBox="0 0 24 24"><path d="M4 12l16-7-7 16-2-7-7-2z"/></svg></span></div>
</div>
<svg width="0" height="0" style="position:absolute"><filter id="wobble-soft"><feTurbulence type="fractalNoise" baseFrequency=".012" numOctaves="3" result="n"/><feDisplacementMap id="__disp" in="SourceGraphic" in2="n" scale="2"/></filter></svg>
<script>addEventListener('message',function(e){var d=e.data||{},r=document.documentElement;if(d.__vars){for(var k in d.__vars)r.style.setProperty(k,d.__vars[k]);var s=document.getElementById('__acc');if(!s){s=document.createElement('style');s.id='__acc';document.head.appendChild(s)}s.textContent=d.__dark?".send svg{stroke:#fff!important}":""}if('__sketch' in d){var a=+d.__sketch||0,p=document.getElementById('__disp');if(p)p.setAttribute('scale',a);var ph=document.querySelector('.phone');if(ph)ph.style.filter=a>0?'url(#wobble-soft)':''}});</script>
</body></html>
