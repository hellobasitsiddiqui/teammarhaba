<!-- @dsCard group="App screens · paper" name="Complete profile (paper)" -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TeamMarhaba — Complete profile (paper)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Inter:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root{--ink:#1B1B1B;--white:#FFFFFF;--g1:#EEEEEE;--g2:#D8D8D8;--g4:#929292;--g5:#696969;--accent:#37D4AD;--accent-light:#DAFCF3;}
    *{box-sizing:border-box;}
    body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#d6d6d6;padding:24px;font-family:"Patrick Hand",ui-rounded,system-ui,sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased;}
    .phone{width:384px;min-height:788px;overflow:hidden;display:flex;flex-direction:column;background:var(--white);border:3px solid var(--ink);border-radius:42px;}
    .statusbar{display:flex;justify-content:space-between;padding:12px 22px 0;font-size:12.5px;color:var(--g5);font-family:"Inter",sans-serif;font-weight:500;}
    .prog{display:flex;gap:6px;padding:14px 24px 0;}
    .prog i{flex:1;height:6px;border:1.5px solid var(--ink);border-radius:999px;background:var(--white);}
    .prog i.on{background:var(--accent);}
    main{flex:1;padding:16px 26px 30px;}
    .step{font-family:"Inter",sans-serif;font-weight:600;color:var(--g4);font-size:12px;margin-bottom:6px;letter-spacing:.04em;}
    h1{font-size:30px;margin:0 0 4px;}
    .sub{font-family:"Inter",sans-serif;font-weight:500;color:var(--g5);font-size:14px;margin:0 0 22px;}
    label{display:block;font-family:"Inter",sans-serif;font-weight:500;font-size:12.5px;color:var(--g5);margin:14px 0 5px;}
    .inp{border:2px solid var(--ink);border-radius:11px;padding:11px 14px;font-family:"Inter",sans-serif;font-size:15px;color:var(--g5);background:var(--white);width:100%;}
    .two{display:flex;gap:12px;}.two>div{flex:1;}
    .btn{font-size:17px;border:2px solid var(--ink);border-radius:12px;background:var(--accent);color:var(--ink);padding:12px 18px;width:100%;margin-top:26px;box-shadow:2px 2px 0 var(--ink);}
  </style>
</head>
<body>
  <div class="phone">
    <div class="statusbar"><span>9:41</span><span>wifi · 84%</span></div>
    <div class="prog"><i class="on"></i><i></i></div>
    <main>
      <div class="step">STEP 1 OF 2</div>
      <h1>Complete your profile</h1>
      <div class="sub">A few details so people know who's coming.</div>
      <label>Full name</label>
      <div class="inp">Basit Siddiqui</div>
      <div class="two">
        <div><label>Age</label><div class="inp">29</div></div>
        <div><label>City</label><div class="inp">Milton Keynes</div></div>
      </div>
      <button class="btn">Continue</button>
    </main>
  </div>
  <svg width="0" height="0" style="position:absolute" aria-hidden="true"><filter id="wobble-soft"><feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="3" result="noise"/><feDisplacementMap id="__disp" in="SourceGraphic" in2="noise" scale="2"/></filter></svg>
  <script>
  addEventListener('message',function(e){var d=e.data||{},r=document.documentElement;
    if(d.__vars){for(var k in d.__vars)r.style.setProperty(k,d.__vars[k]);var s=document.getElementById('__acc');if(!s){s=document.createElement('style');s.id='__acc';document.head.appendChild(s);}s.textContent=d.__dark?".btn:not(.ghost):not(.soon):not(.done){color:#fff!important}.cbadge,.nbadge,.dot,.chip.on,.chip.pri,.seg span.on,.tier .flag{color:#fff!important}.send svg{stroke:#fff!important}":"";}
    if('__sketch' in d){var amt=+d.__sketch||0,disp=document.getElementById('__disp');if(disp)disp.setAttribute('scale',amt);var ph=document.querySelector('.phone');if(ph)ph.style.filter=amt>0?'url(#wobble-soft)':'';}});
  </script>
</body>
</html>
