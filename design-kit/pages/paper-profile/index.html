<!-- @dsCard group="App screens · paper" name="Profile (paper)" -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TeamMarhaba — Profile (paper)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Inter:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root{--ink:#1B1B1B;--white:#FFFFFF;--g1:#EEEEEE;--g2:#D8D8D8;--g4:#929292;--g5:#696969;--accent:#37D4AD;--accent-light:#DAFCF3;}
    *{box-sizing:border-box;}
    body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#d6d6d6;padding:24px;font-family:"Patrick Hand",ui-rounded,system-ui,sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased;}
    .phone{width:384px;min-height:788px;position:relative;overflow:hidden;display:flex;flex-direction:column;background:var(--white);border:3px solid var(--ink);border-radius:42px;}
    .statusbar{display:flex;justify-content:space-between;padding:12px 22px 0;font-size:12.5px;color:var(--g5);font-family:"Inter",sans-serif;font-weight:500;}
    .topbar{display:flex;align-items:center;padding:8px 18px 4px;}
    .topbar h1{font-size:24px;margin:0;flex:1;}
    .gear{width:34px;height:34px;display:grid;place-items:center;border:2px solid var(--ink);border-radius:50%;background:var(--white);}
    .gear svg{width:17px;height:17px;stroke:var(--ink);fill:none;stroke-width:1.8;}
    main{padding:6px 16px 14px;flex:1;}
    .id{display:flex;gap:14px;align-items:center;margin:4px 2px 12px;}
    .avatar{width:66px;height:66px;border:2.5px solid var(--ink);border-radius:50%;background:var(--g1);display:grid;place-items:center;font-size:27px;}
    .id .nm{font-size:23px;}
    .id .sub{font-family:"Inter",sans-serif;font-weight:500;color:var(--g5);font-size:13px;}
    .card{background:var(--white);border:2px solid var(--ink);border-radius:15px;box-shadow:3px 3px 0 var(--g2);padding:13px 15px;margin-bottom:13px;}
    .ctitle{font-size:17px;margin:0 0 8px;}
    .bar{height:14px;border:2px solid var(--ink);border-radius:999px;background:var(--white);overflow:hidden;}
    .bar i{display:block;height:100%;width:70%;background:var(--accent);}
    .barlbl{display:flex;justify-content:space-between;font-family:"Inter",sans-serif;font-weight:500;font-size:12.5px;color:var(--g5);margin-top:6px;}
    .chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:4px;}
    .chip{border:2px solid var(--ink);border-radius:999px;padding:3px 12px;font-size:14px;background:var(--white);}
    .chip.pri{background:var(--accent);}
    .chip.add{border-style:dashed;color:var(--g4);}
    .memb{display:flex;justify-content:space-between;align-items:center;}
    .memb .go{font-family:"Inter",sans-serif;font-weight:600;font-size:13px;color:var(--g5);}
    .menu a{display:flex;justify-content:space-between;align-items:center;padding:11px 2px;border-bottom:1.5px solid var(--g2);text-decoration:none;color:var(--ink);font-size:16px;}
    .menu a:last-child{border:0;color:var(--g5);}
    .menu .chev{color:var(--g4);}
    nav.tabbar{display:flex;border-top:2px solid var(--ink);background:var(--white);margin-top:auto;}
    nav.tabbar a{flex:1;text-decoration:none;color:var(--g4);position:relative;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0 12px;font-size:13px;}
    nav.tabbar a svg{width:25px;height:25px;stroke:currentColor;fill:none;stroke-width:1.9;}
    nav.tabbar a.active{color:var(--ink);}
    nav.tabbar a.active::before{content:"";position:absolute;top:0;left:50%;transform:translateX(-50%);width:40px;height:3px;background:var(--accent);border-radius:2px;}
    nav.tabbar .nbadge{position:absolute;top:6px;right:calc(50% - 26px);min-width:18px;height:18px;padding:0 3px;background:var(--accent);border:1.4px solid var(--ink);color:var(--ink);border-radius:999px;font-size:10.5px;display:grid;place-items:center;font-family:"Inter",sans-serif;font-weight:700;}
  </style>
</head>
<body>
  <div class="phone">
    <div class="statusbar"><span>9:41</span><span>wifi · 84%</span></div>
    <div class="topbar"><h1>Profile</h1><span class="gear"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 3v3M12 18v3M3 12h3M18 12h3M6 6l2 2M16 16l2 2M6 18l2-2M16 8l2-2"/></svg></span></div>
    <main>
      <div class="id"><span class="avatar">B</span><div><div class="nm">Basit S.</div><div class="sub">Milton Keynes · 29</div></div></div>
      <div class="card"><div class="ctitle">Profile strength</div><div class="bar"><i></i></div><div class="barlbl"><span>70% complete</span><span>Add a photo + bio →</span></div></div>
      <div class="card"><div class="ctitle">Interests</div><div class="chips"><span class="chip pri">Hiking</span><span class="chip pri">Coffee</span><span class="chip pri">Coding</span><span class="chip">Bouldering</span><span class="chip">Dogs</span><span class="chip add">+ add</span></div></div>
      <div class="card memb"><div><div class="ctitle" style="margin:0 0 2px">Membership</div><div style="font-family:'Inter',sans-serif;font-weight:500;color:var(--g5);font-size:13px">Pay as you go · first event free</div></div><span class="go">Manage →</span></div>
      <div class="card menu"><a href="#">My events <span class="chev">›</span></a><a href="#">Notifications <span class="chev">›</span></a><a href="#">Privacy &amp; my data <span class="chev">›</span></a><a href="#">Sign out</a></div>
    </main>
    <nav class="tabbar">
      <a href="#"><svg viewBox="0 0 24 24"><path d="M4 11l8-6 8 6"/><path d="M6 10v9h12v-9"/></svg>Home</a>
      <a href="#"><svg viewBox="0 0 24 24"><rect x="4" y="5" width="16" height="15" rx="2"/><path d="M4 9h16M9 3v4M15 3v4"/></svg>Events</a>
      <a href="#"><svg viewBox="0 0 24 24"><path d="M5 5h14v10H9l-4 4z"/></svg>Chat<span class="nbadge">2</span></a>
      <a class="active" href="#"><svg viewBox="0 0 24 24"><circle cx="12" cy="9" r="3.2"/><path d="M6 19c0-3.3 2.7-5 6-5s6 1.7 6 5"/></svg>Profile</a>
    </nav>
  </div>
  <script>
  /* showcase.html accent picker: apply an accent posted from the parent to this screen's own :root
     (postMessage avoids the file:// cross-frame DOM block). */
  addEventListener('message', function(e){
    var d = e.data || {};
    if(!d || !d.__accent) return;
    var r = document.documentElement;
    r.style.setProperty('--accent', d.__accent);
    r.style.setProperty('--accent-light', d.__accentLight);
    var s = document.getElementById('__acc');
    if(!s){ s = document.createElement('style'); s.id = '__acc'; document.head.appendChild(s); }
    s.textContent = d.__dark
      ? ".btn:not(.ghost):not(.soon):not(.done){color:#fff!important}.cbadge,.nbadge,.dot,.chip.on,.chip.pri,.seg span.on,.tier .flag{color:#fff!important}.send svg{stroke:#fff!important}"
      : "";
  });
  </script>
  <svg width="0" height="0" style="position:absolute" aria-hidden="true"><filter id="wobble-soft"><feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="3" result="noise"/><feDisplacementMap id="__disp" in="SourceGraphic" in2="noise" scale="2"/></filter></svg>
  <script>
  /* sketchiness control from the showcase: __sketch = 0 (crisp) .. ~4 (very wavy) */
  addEventListener('message', function(e){
    var d = e.data || {};
    if(!('__sketch' in d)) return;
    var amt = +d.__sketch || 0;
    var disp = document.getElementById('__disp');
    if(disp) disp.setAttribute('scale', amt);
    var ph = document.querySelector('.phone');
    if(ph) ph.style.filter = amt > 0 ? 'url(#wobble-soft)' : '';
  });
  </script>
  <script>
  /* generic theme-token setter from the showcase (sets any CSS vars posted in __vars) */
  addEventListener('message', function(e){
    var d = e.data || {};
    if(!d.__vars) return;
    var r = document.documentElement;
    for(var k in d.__vars) r.style.setProperty(k, d.__vars[k]);
    var s = document.getElementById('__acc');
    if(!s){ s = document.createElement('style'); s.id='__acc'; document.head.appendChild(s); }
    s.textContent = d.__dark ? ".btn:not(.ghost):not(.soon):not(.done){color:#fff!important}.cbadge,.nbadge,.dot,.chip.on,.chip.pri,.seg span.on,.tier .flag{color:#fff!important}.send svg{stroke:#fff!important}" : "";
  });
  </script>
</body>
</html>
