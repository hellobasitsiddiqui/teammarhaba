<!-- @dsCard group="App screens · paper" name="Cancelled event (paper)" -->
<!doctype html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Cancelled event (paper)</title><link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Inter:wght@500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--ink:#1B1B1B;--white:#fff;--g1:#EEEEEE;--g2:#D8D8D8;--g4:#929292;--g5:#696969;--accent:#37D4AD;--accent-light:#DAFCF3}
*{box-sizing:border-box}body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#d6d6d6;padding:24px;font-family:"Patrick Hand",ui-rounded,system-ui,sans-serif;color:var(--ink)}
.phone{width:384px;min-height:788px;overflow:hidden;display:flex;flex-direction:column;background:var(--white);border:3px solid var(--ink);border-radius:42px}
.statusbar{display:flex;justify-content:space-between;padding:12px 22px 0;font-size:12.5px;color:var(--g5);font-family:"Inter",sans-serif;font-weight:500}
.topbar{display:flex;align-items:center;gap:10px;padding:8px 16px}.back{width:36px;height:36px;display:grid;place-items:center;border:2px solid var(--ink);border-radius:50%;background:var(--white)}.back svg{width:18px;height:18px;stroke:var(--ink);fill:none;stroke-width:2.2}
main{flex:1;padding:4px 20px 20px}
.banner{border:2px solid var(--ink);border-radius:12px;background:var(--g1);padding:10px 14px;font-family:"Inter",sans-serif;font-weight:700;font-size:13px;text-align:center;margin-bottom:16px}
h1{font-size:26px;margin:0 0 6px;text-decoration:line-through;text-decoration-thickness:2px;color:var(--g5)}
.meta{color:var(--g5);font-size:15px;font-family:"Inter",sans-serif;font-weight:500;margin:3px 0}
.note{margin:16px 0;font-size:15px;line-height:1.4}
.btn{font-size:16px;border:2px solid var(--ink);border-radius:12px;background:var(--accent);color:var(--ink);padding:11px 18px;width:100%;margin-top:8px;box-shadow:2px 2px 0 var(--ink)}
.btn.ghost{background:var(--white);box-shadow:none;margin-top:10px}
</style></head><body>
<div class="phone">
<div class="statusbar"><span>9:41</span><span>wifi · 84%</span></div>
<div class="topbar"><span class="back"><svg viewBox="0 0 24 24"><path d="M15 5l-7 7 7 7"/></svg></span></div>
<main>
<div class="banner">⚠ This event was cancelled</div>
<h1>Thursday Bouldering Social</h1>
<div class="meta">Thu 16 Jul · 19:00 · Big Rock</div>
<div class="note">The host cancelled this event. If you'd paid or used a free credit, it's been returned — no strike on your record.</div>
<button class="btn">Find similar events</button>
<button class="btn ghost">Message the host</button>
</main>
</div>
<svg width="0" height="0" style="position:absolute"><filter id="wobble-soft"><feTurbulence type="fractalNoise" baseFrequency=".012" numOctaves="3" result="n"/><feDisplacementMap id="__disp" in="SourceGraphic" in2="n" scale="2"/></filter></svg>
<script>addEventListener('message',function(e){var d=e.data||{},r=document.documentElement;if(d.__vars){for(var k in d.__vars)r.style.setProperty(k,d.__vars[k]);var s=document.getElementById('__acc');if(!s){s=document.createElement('style');s.id='__acc';document.head.appendChild(s)}s.textContent=d.__dark?".btn:not(.ghost):not(.soon):not(.done),.cbadge,.nbadge,.dot,.chip.pri,.seg span.on,.tier .flag{color:#fff!important}.send svg{stroke:#fff!important}":""}if('__sketch' in d){var a=+d.__sketch||0,p=document.getElementById('__disp');if(p)p.setAttribute('scale',a);var ph=document.querySelector('.phone');if(ph)ph.style.filter=a>0?'url(#wobble-soft)':''}});</script>
</body></html>
