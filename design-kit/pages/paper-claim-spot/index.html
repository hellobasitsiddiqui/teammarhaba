<!-- @dsCard group="App screens · paper" name="Spot opened — claim (paper)" -->
<!doctype html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Claim spot (paper)</title><link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Inter:wght@500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--ink:#1B1B1B;--white:#fff;--g1:#EEEEEE;--g2:#D8D8D8;--g4:#929292;--g5:#696969;--accent:#37D4AD;--accent-light:#DAFCF3;--overlay:rgba(27,27,27,.5)}
*{box-sizing:border-box}body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#d6d6d6;padding:24px;font-family:"Patrick Hand",ui-rounded,system-ui,sans-serif;color:var(--ink)}
.phone{width:384px;min-height:788px;overflow:hidden;display:flex;flex-direction:column;background:var(--white);border:3px solid var(--ink);border-radius:42px;position:relative}
.statusbar{display:flex;justify-content:space-between;padding:12px 22px 0;font-size:12.5px;color:var(--g5);font-family:"Inter",sans-serif;font-weight:500}
.bg{padding:14px 18px;opacity:.5}.bg h2{font-size:22px;margin:20px 4px 10px}.bg .card{background:var(--white);border:2px solid var(--ink);border-radius:15px;height:86px;margin-bottom:14px}
.dim{position:absolute;inset:0;background:var(--overlay);z-index:2}
.modal{position:absolute;z-index:3;left:20px;right:20px;top:50%;transform:translateY(-50%);background:var(--white);border:3px solid var(--ink);border-radius:20px;box-shadow:5px 5px 0 var(--ink);padding:22px 18px;text-align:center}
.big{font-size:30px;margin:2px 0 2px}.sub{font-family:"Inter",sans-serif;font-weight:500;color:var(--g5);font-size:14px;margin:0 0 6px}.sub b{color:var(--ink)}
.timer{font-family:"Inter",sans-serif;font-weight:700;font-size:15px;border:2px solid var(--ink);border-radius:999px;display:inline-block;padding:4px 14px;background:var(--accent-light);margin:8px 0 16px}
.btn{font-size:17px;border:2px solid var(--ink);border-radius:12px;background:var(--accent);color:var(--ink);padding:12px 18px;width:100%;box-shadow:2px 2px 0 var(--ink)}
.btn.ghost{background:var(--white);box-shadow:none;margin-top:10px;color:var(--g5)}
</style></head><body>
<div class="phone">
<div class="statusbar"><span>16:00</span><span>wifi · 84%</span></div>
<div class="bg"><h2>Thursday Bouldering Social</h2><div class="card"></div><div class="card"></div></div>
<div class="dim"></div>
<div class="modal">
<div class="big">🎉 A spot opened up!</div>
<div class="sub">You're next on the waitlist for <b>Bouldering Social</b>.</div>
<div class="timer">Claim within 4:32</div>
<button class="btn">Claim my spot</button>
<button class="btn ghost">Pass to next person</button>
</div>
</div>
<svg width="0" height="0" style="position:absolute"><filter id="wobble-soft"><feTurbulence type="fractalNoise" baseFrequency=".012" numOctaves="3" result="n"/><feDisplacementMap id="__disp" in="SourceGraphic" in2="n" scale="2"/></filter></svg>
<script>addEventListener('message',function(e){var d=e.data||{},r=document.documentElement;if(d.__vars){for(var k in d.__vars)r.style.setProperty(k,d.__vars[k]);var s=document.getElementById('__acc');if(!s){s=document.createElement('style');s.id='__acc';document.head.appendChild(s)}s.textContent=d.__dark?".btn:not(.ghost):not(.soon):not(.done),.cbadge,.nbadge,.dot,.chip.pri,.seg span.on,.tier .flag{color:#fff!important}.send svg{stroke:#fff!important}":""}if('__sketch' in d){var a=+d.__sketch||0,p=document.getElementById('__disp');if(p)p.setAttribute('scale',a);var ph=document.querySelector('.modal');if(ph)ph.style.filter=a>0?'url(#wobble-soft)':''}});</script>
</body></html>
