<!-- @dsCard group="App screens" name="Chat thread (ticks + reactions)" -->
<!doctype html>
<html lang="en" data-theme="sketch">
<head>
  <meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TeamMarhaba — Chat thread</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Gochi+Hand&family=Patrick+Hand&family=Shadows+Into+Light&display=swap" rel="stylesheet" />
  <style>
    :root{--ink:#1a1a2e;--paper:#f7f7f3;--card:#fffef9;--muted:color-mix(in srgb,var(--ink) 52%,transparent);
      --shadow:2px 2px 0 color-mix(in srgb,var(--ink) 18%,transparent);--shadow-lg:4px 4px 0 color-mix(in srgb,var(--ink) 22%,transparent);}
    *{box-sizing:border-box;}
    body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#e7e7ea;padding:24px;
      font-family:"Patrick Hand","Bradley Hand",ui-rounded,system-ui,sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased;}
    .wob{filter:url(#wobble-soft);}@media (prefers-reduced-motion:reduce){.wob{filter:none;}}
    .phone{width:384px;min-height:788px;position:relative;overflow:hidden;display:flex;flex-direction:column;
      background-color:var(--paper);border:2px solid var(--ink);border-radius:30px;box-shadow:var(--shadow-lg);}
    .statusbar{display:flex;justify-content:space-between;padding:11px 20px 0;font-size:12.5px;color:var(--muted);font-family:system-ui,sans-serif;}
    .topbar{display:flex;align-items:center;gap:10px;padding:8px 16px 10px;border-bottom:1.5px solid color-mix(in srgb,var(--ink) 14%,transparent);}
    .topbar .back{width:34px;height:34px;display:grid;place-items:center;border:1.5px solid var(--ink);border-radius:50%;background:var(--card);}
    .topbar .back svg{width:18px;height:18px;stroke:var(--ink);fill:none;stroke-width:2;}
    .topbar h1{font-family:"Gochi Hand",cursive;font-weight:400;font-size:20px;margin:0;line-height:1;}
    .topbar .sub{font-size:12px;color:var(--muted);}
    main{padding:14px 14px 8px;flex:1;overflow:auto;display:flex;flex-direction:column;gap:4px;}
    .day{align-self:center;font-family:"Shadows Into Light",cursive;color:var(--muted);font-size:13px;margin-bottom:6px;}
    .msg{max-width:78%;margin-bottom:9px;}
    .msg .who{font-size:12px;color:var(--muted);margin:0 0 2px 6px;font-family:"Gochi Hand",cursive;}
    .bub{border:1.5px solid var(--ink);border-radius:14px;padding:8px 12px;font-size:15px;line-height:1.3;background:var(--card);box-shadow:var(--shadow);position:relative;}
    .in{align-self:flex-start;}
    .out{align-self:flex-end;}
    .out .bub{background:color-mix(in srgb,var(--ink) 9%,var(--card));}
    .stamp{font-size:11px;color:var(--muted);margin-top:3px;text-align:right;}
    .tick{letter-spacing:-1px;}
    .react{display:inline-flex;gap:3px;align-items:center;border:1.3px solid var(--ink);border-radius:999px;
      background:var(--paper);padding:1px 7px;font-size:12px;margin:4px 0 0 6px;box-shadow:var(--shadow);}
    .composer{display:flex;gap:8px;align-items:center;padding:10px 12px;border-top:2px solid var(--ink);background:var(--card);}
    .composer .inp{flex:1;border:1.5px solid var(--ink);border-radius:999px;padding:8px 14px;font-family:inherit;font-size:14px;color:var(--muted);background:var(--paper);}
    .composer .send{width:40px;height:40px;flex:none;border:1.5px solid var(--ink);border-radius:50%;background:var(--ink);color:var(--paper);
      display:grid;place-items:center;}
    .composer .send svg{width:18px;height:18px;stroke:var(--paper);fill:none;stroke-width:2;}
  </style>
</head>
<body>
  <svg width="0" height="0" style="position:absolute" aria-hidden="true"><filter id="wobble-soft"><feTurbulence type="fractalNoise" baseFrequency="0.013" numOctaves="3" result="noise" /><feDisplacementMap in="SourceGraphic" in2="noise" scale="2.5" /></filter></svg>
  <div class="phone">
    <div class="statusbar"><span>9:41</span><span>wifi · 84%</span></div>
    <div class="topbar">
      <span class="back wob"><svg viewBox="0 0 24 24"><path d="M15 5l-7 7 7 7"/></svg></span>
      <div><h1>Sunday Dog Walk</h1><div class="sub">12 going</div></div>
    </div>
    <main>
      <div class="day">Today</div>
      <div class="msg in"><div class="who">Sarah</div><div class="bub wob">Morning! Meeting at the main car park ☀️</div><span class="react wob">👍 3</span></div>
      <div class="msg in"><div class="who">Mike</div><div class="bub wob">Perfect — I'll bring treats for the dogs 🦴</div></div>
      <div class="msg out"><div class="bub wob">See you all at 10!</div><div class="stamp">09:58 · <span class="tick">✓✓</span></div><span class="react wob">❤️ 2</span></div>
      <div class="msg in"><div class="who">Sarah</div><div class="bub wob">Can't wait 🐶</div></div>
      <div class="msg out"><div class="bub wob">On my way now</div><div class="stamp">10:01 · <span class="tick">✓</span></div></div>
    </main>
    <div class="composer">
      <div class="inp">Message…</div>
      <span class="send wob"><svg viewBox="0 0 24 24"><path d="M4 12l16-7-7 16-2-7-7-2z"/></svg></span>
    </div>
  </div>
</body>
</html>
