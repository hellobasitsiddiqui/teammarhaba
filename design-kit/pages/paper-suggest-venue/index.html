<!-- @dsCard group="App screens · paper" name="Suggest a venue (paper)" -->
<!doctype html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Suggest venue (paper)</title><link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Inter:wght@500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--ink:#1B1B1B;--white:#fff;--g1:#EEEEEE;--g2:#D8D8D8;--g4:#929292;--g5:#696969;--accent:#37D4AD;--accent-light:#DAFCF3}
*{box-sizing:border-box}body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#d6d6d6;padding:24px;font-family:"Patrick Hand",ui-rounded,system-ui,sans-serif;color:var(--ink)}
.phone{width:384px;min-height:788px;overflow:hidden;display:flex;flex-direction:column;background:var(--white);border:3px solid var(--ink);border-radius:42px}
.statusbar{display:flex;justify-content:space-between;padding:12px 22px 0;font-size:12.5px;color:var(--g5);font-family:"Inter",sans-serif;font-weight:500}
.topbar{display:flex;align-items:center;gap:10px;padding:8px 16px 6px}.back{width:36px;height:36px;display:grid;place-items:center;border:2px solid var(--ink);border-radius:50%;background:var(--white)}.back svg{width:18px;height:18px;stroke:var(--ink);fill:none;stroke-width:2.2}.topbar h1{font-size:22px;margin:0}
main{flex:1;padding:2px 16px 16px}
.sub{font-family:"Inter",sans-serif;font-weight:500;color:var(--g5);font-size:13px;margin:2px 2px 8px}
label{display:block;font-family:"Inter",sans-serif;font-weight:500;font-size:12.5px;color:var(--g5);margin:12px 0 5px}
.inp,.ta{border:2px solid var(--ink);border-radius:11px;padding:10px 13px;font-family:"Inter",sans-serif;font-size:14px;color:var(--g5);background:var(--white);width:100%}.ta{min-height:56px}
.photo{height:80px;border:2px dashed var(--ink);border-radius:12px;background:var(--g1);display:grid;place-items:center;color:var(--g5);font-family:"Inter",sans-serif;font-weight:500;font-size:13px;margin-top:5px}
.btn{font-size:17px;border:2px solid var(--ink);border-radius:12px;background:var(--accent);color:var(--ink);padding:11px 18px;width:100%;margin-top:18px;box-shadow:2px 2px 0 var(--ink)}
</style></head><body>
<div class="phone">
<div class="statusbar"><span>9:41</span><span>wifi · 84%</span></div>
<div class="topbar"><span class="back"><svg viewBox="0 0 24 24"><path d="M15 5l-7 7 7 7"/></svg></span><h1>Suggest a venue</h1></div>
<main>
<div class="sub">For "Coffee &amp; Code Meetup" — the group votes on suggestions.</div>
<label>Venue name</label><div class="inp">The Quiet Corner Café</div>
<label>Address</label><div class="inp">14 High St, Central MK</div>
<label>Why it's good</label><div class="ta">Quiet, plenty of plugs, good for ~8 people.</div>
<label>Photo (optional)</label><div class="photo">＋ Add a photo</div>
<button class="btn">Submit suggestion</button>
</main>
</div>
<svg width="0" height="0" style="position:absolute"><filter id="wobble-soft"><feTurbulence type="fractalNoise" baseFrequency=".012" numOctaves="3" result="n"/><feDisplacementMap id="__disp" in="SourceGraphic" in2="n" scale="2"/></filter></svg>
<script>addEventListener('message',function(e){var d=e.data||{},r=document.documentElement;if(d.__vars){for(var k in d.__vars)r.style.setProperty(k,d.__vars[k]);var s=document.getElementById('__acc');if(!s){s=document.createElement('style');s.id='__acc';document.head.appendChild(s)}s.textContent=d.__dark?".btn:not(.ghost):not(.soon):not(.done),.cbadge,.nbadge,.dot,.chip.pri,.seg span.on,.tier .flag{color:#fff!important}.send svg{stroke:#fff!important}":""}if('__sketch' in d){var a=+d.__sketch||0,p=document.getElementById('__disp');if(p)p.setAttribute('scale',a);var ph=document.querySelector('.phone');if(ph)ph.style.filter=a>0?'url(#wobble-soft)':''}});</script>
</body></html>
