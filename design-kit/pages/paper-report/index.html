<!doctype html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Report (paper)</title><link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Inter:wght@500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--ink:#1B1B1B;--white:#fff;--g1:#EEEEEE;--g2:#D8D8D8;--g4:#929292;--g5:#696969;--accent:#37D4AD;--danger:#E23274;--overlay:rgba(27,27,27,.5)}
*{box-sizing:border-box}body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#d6d6d6;padding:24px;font-family:"Patrick Hand",ui-rounded,system-ui,sans-serif;color:var(--ink)}
.phone{width:384px;min-height:788px;overflow:hidden;display:flex;flex-direction:column;background:var(--white);border:3px solid var(--ink);border-radius:42px;position:relative}
.statusbar{display:flex;justify-content:space-between;padding:12px 22px 0;font-size:12.5px;color:var(--g5);font-family:"Inter",sans-serif;font-weight:500}
.bg{padding:14px 20px;opacity:.5}.bg .av{width:90px;height:90px;border:2.5px solid var(--ink);border-radius:50%;background:var(--g1);margin:20px auto}
.dim{position:absolute;inset:0;background:var(--overlay);z-index:2}
.sheet{position:absolute;z-index:3;left:0;right:0;bottom:0;background:var(--white);border-top:3px solid var(--ink);border-radius:22px 22px 0 0;padding:18px 20px 24px}
.sheet h2{font-size:23px;margin:0 0 3px}.sheet .s{font-family:"Inter",sans-serif;font-weight:500;color:var(--g5);font-size:13px;margin:0 0 14px}
.opt{display:flex;align-items:center;gap:11px;padding:11px 2px;border-bottom:1.5px solid var(--g2);font-size:16px}
.rd{width:22px;height:22px;border:2px solid var(--ink);border-radius:50%;flex:none;display:grid;place-items:center}.rd.on::after{content:"";width:11px;height:11px;border-radius:50%;background:var(--accent)}
.btn{font-size:16px;border:2px solid var(--ink);border-radius:12px;background:var(--accent);color:var(--ink);padding:11px 18px;width:100%;margin-top:14px;box-shadow:2px 2px 0 var(--ink)}
.btn.danger{background:var(--white);color:var(--danger);border-color:var(--danger);box-shadow:none;margin-top:9px}
</style></head><body>
<div class="phone">
<div class="statusbar"><span>9:41</span><span>wifi · 84%</span></div>
<div class="bg"><div class="av"></div></div>
<div class="dim"></div>
<div class="sheet">
<h2>Report Sarah K.</h2>
<div class="s">Reports are anonymous. Help us keep meetups safe.</div>
<div class="opt"><span class="rd on"></span>Inappropriate behaviour</div>
<div class="opt"><span class="rd"></span>Spam or scam</div>
<div class="opt"><span class="rd"></span>Fake profile</div>
<div class="opt"><span class="rd"></span>Something else</div>
<button class="btn">Submit report</button>
<button class="btn danger">Block this person</button>
</div>
</div>
<svg width="0" height="0" style="position:absolute"><filter id="wobble-soft"><feTurbulence type="fractalNoise" baseFrequency=".012" numOctaves="3" result="n"/><feDisplacementMap id="__disp" in="SourceGraphic" in2="n" scale="2"/></filter></svg>
<script>addEventListener('message',function(e){var d=e.data||{},r=document.documentElement;if(d.__vars){for(var k in d.__vars)r.style.setProperty(k,d.__vars[k]);var s=document.getElementById('__acc');if(!s){s=document.createElement('style');s.id='__acc';document.head.appendChild(s)}s.textContent=d.__dark?".btn:not(.ghost):not(.soon):not(.danger){color:#fff!important}":""}if('__sketch' in d){var a=+d.__sketch||0,p=document.getElementById('__disp');if(p)p.setAttribute('scale',a);var ph=document.querySelector('.sheet');if(ph)ph.style.filter=a>0?'url(#wobble-soft)':''}});</script>
</body></html>
