<!-- @dsCard group="App screens · paper" name="Admin dashboard (paper)" -->
<!doctype html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Admin dashboard (paper)</title><link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Inter:wght@500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--ink:#1B1B1B;--white:#fff;--g1:#EEEEEE;--g2:#D8D8D8;--g4:#929292;--g5:#696969;--accent:#37D4AD;--accent-light:#DAFCF3}
*{box-sizing:border-box}body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#d6d6d6;padding:24px;font-family:"Patrick Hand",ui-rounded,system-ui,sans-serif;color:var(--ink)}
.phone{width:384px;min-height:788px;overflow:hidden;display:flex;flex-direction:column;background:var(--white);border:3px solid var(--ink);border-radius:42px}
.statusbar{display:flex;justify-content:space-between;padding:12px 22px 0;font-size:12.5px;color:var(--g5);font-family:"Inter",sans-serif;font-weight:500}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:8px 18px 6px}.topbar h1{font-size:24px;margin:0}.admin{font-family:"Inter",sans-serif;font-weight:700;font-size:10.5px;border:1.5px solid var(--ink);border-radius:999px;padding:3px 9px;background:var(--accent-light)}
main{flex:1;padding:6px 16px 16px;overflow:auto}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.stat{border:2px solid var(--ink);border-radius:14px;box-shadow:3px 3px 0 var(--g2);padding:13px 15px}.stat .n{font-size:32px;line-height:1}.stat .l{font-family:"Inter",sans-serif;font-weight:500;color:var(--g5);font-size:12.5px}
.lbl{font-family:"Inter",sans-serif;font-weight:600;font-size:12px;color:var(--g4);margin:16px 2px 8px;letter-spacing:.04em}
.act{display:flex;gap:10px}.btn{flex:1;font-size:15px;border:2px solid var(--ink);border-radius:12px;background:var(--accent);color:var(--ink);padding:11px 12px;box-shadow:2px 2px 0 var(--ink)}.btn.ghost{background:var(--white);box-shadow:none}
.row{display:flex;justify-content:space-between;padding:9px 2px;border-bottom:1.5px solid var(--g2);font-family:"Inter",sans-serif;font-weight:500;font-size:13.5px;color:var(--g5)}
</style></head><body>
<div class="phone">
<div class="statusbar"><span>9:41</span><span>wifi · 84%</span></div>
<div class="topbar"><h1>Dashboard</h1><span class="admin">ADMIN</span></div>
<main>
<div class="grid">
<div class="stat"><div class="n">1,240</div><div class="l">Users</div></div>
<div class="stat"><div class="n">48</div><div class="l">Live events</div></div>
<div class="stat"><div class="n">312</div><div class="l">Going this week</div></div>
<div class="stat"><div class="n">£1.5k</div><div class="l">Revenue (mo)</div></div>
</div>
<div class="lbl">QUICK ACTIONS</div>
<div class="act"><button class="btn">＋ New event</button><button class="btn ghost">Send push</button></div>
<div class="lbl">RECENT</div>
<div class="row"><span>New event: Dog Walk</span><span>2m</span></div>
<div class="row"><span>18 RSVPs · 5-a-side</span><span>1h</span></div>
<div class="row"><span>Broadcast sent · 1,240</span><span>3h</span></div>
</main>
</div>
<svg width="0" height="0" style="position:absolute"><filter id="wobble-soft"><feTurbulence type="fractalNoise" baseFrequency=".012" numOctaves="3" result="n"/><feDisplacementMap id="__disp" in="SourceGraphic" in2="n" scale="2"/></filter></svg>
<script>addEventListener('message',function(e){var d=e.data||{},r=document.documentElement;if(d.__vars){for(var k in d.__vars)r.style.setProperty(k,d.__vars[k]);var s=document.getElementById('__acc');if(!s){s=document.createElement('style');s.id='__acc';document.head.appendChild(s)}s.textContent=d.__dark?".btn:not(.ghost):not(.soon):not(.done){color:#fff!important}":""}if('__sketch' in d){var a=+d.__sketch||0,p=document.getElementById('__disp');if(p)p.setAttribute('scale',a);var ph=document.querySelector('.phone');if(ph)ph.style.filter=a>0?'url(#wobble-soft)':''}});</script>
</body></html>
