<!doctype html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Invite (paper)</title><link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Inter:wght@500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--ink:#1B1B1B;--white:#fff;--g1:#EEEEEE;--g2:#D8D8D8;--g4:#929292;--g5:#696969;--accent:#37D4AD;--accent-light:#DAFCF3}
*{box-sizing:border-box}body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#d6d6d6;padding:24px;font-family:"Patrick Hand",ui-rounded,system-ui,sans-serif;color:var(--ink)}
.phone{width:384px;min-height:788px;overflow:hidden;display:flex;flex-direction:column;background:var(--white);border:3px solid var(--ink);border-radius:42px}
.statusbar{display:flex;justify-content:space-between;padding:12px 22px 0;font-size:12.5px;color:var(--g5);font-family:"Inter",sans-serif;font-weight:500}
.topbar{display:flex;align-items:center;gap:10px;padding:8px 16px 6px}.back{width:36px;height:36px;display:grid;place-items:center;border:2px solid var(--ink);border-radius:50%}.back svg{width:18px;height:18px;stroke:var(--ink);fill:none;stroke-width:2.2}.topbar h1{font-size:22px;margin:0}
main{flex:1;padding:6px 20px 16px;text-align:center}
.hero{font-size:52px;margin:8px 0 2px}h2{font-size:26px;margin:0 0 6px}.sub{font-family:"Inter",sans-serif;font-weight:500;color:var(--g5);font-size:14px;margin:0 0 18px;line-height:1.4}.sub b{color:var(--ink)}
.link{display:flex;align-items:center;gap:10px;border:2px solid var(--ink);border-radius:12px;background:var(--g1);padding:10px 14px;margin-bottom:14px}
.link .u{flex:1;text-align:left;font-family:"Inter",sans-serif;font-weight:600;font-size:14px}.link .cp{font-family:"Inter",sans-serif;font-weight:700;font-size:13px;border:1.5px solid var(--ink);border-radius:8px;padding:4px 10px;background:var(--accent)}
.btn{font-size:16px;border:2px solid var(--ink);border-radius:12px;background:var(--accent);color:var(--ink);padding:11px 18px;width:100%;box-shadow:2px 2px 0 var(--ink)}
.stat{border:2px solid var(--ink);border-radius:14px;box-shadow:3px 3px 0 var(--g2);padding:12px;margin-top:16px;display:flex;justify-content:space-around}
.stat .n{font-size:28px}.stat .l{font-family:"Inter",sans-serif;font-weight:500;font-size:12px;color:var(--g5)}
</style></head><body>
<div class="phone">
<div class="statusbar"><span>9:41</span><span>wifi · 84%</span></div>
<div class="topbar"><span class="back"><svg viewBox="0 0 24 24"><path d="M15 5l-7 7 7 7"/></svg></span><h1>Invite friends</h1></div>
<main>
<div class="hero">🎁</div>
<h2>Give a free event, get one</h2>
<div class="sub">When a friend joins and attends their first paid event, you <b>both</b> get a free-event credit.</div>
<div class="link"><span class="u">marhaba.app/i/basit</span><span class="cp">Copy</span></div>
<button class="btn">Share invite link</button>
<div class="stat"><div><div class="n">3</div><div class="l">invited</div></div><div><div class="n">2</div><div class="l">joined</div></div><div><div class="n">2</div><div class="l">credits earned</div></div></div>
</main>
</div>
<svg width="0" height="0" style="position:absolute"><filter id="wobble-soft"><feTurbulence type="fractalNoise" baseFrequency=".012" numOctaves="3" result="n"/><feDisplacementMap id="__disp" in="SourceGraphic" in2="n" scale="2"/></filter></svg>
<script>addEventListener('message',function(e){var d=e.data||{},r=document.documentElement;if(d.__vars){for(var k in d.__vars)r.style.setProperty(k,d.__vars[k]);var s=document.getElementById('__acc');if(!s){s=document.createElement('style');s.id='__acc';document.head.appendChild(s)}s.textContent=d.__dark?".btn:not(.ghost):not(.soon):not(.done),.link .cp{color:#fff!important}":""}if('__sketch' in d){var a=+d.__sketch||0,p=document.getElementById('__disp');if(p)p.setAttribute('scale',a);var ph=document.querySelector('.phone');if(ph)ph.style.filter=a>0?'url(#wobble-soft)':''}});</script>
</body></html>
