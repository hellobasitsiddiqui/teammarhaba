<!doctype html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Edit profile (paper)</title><link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Inter:wght@500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--ink:#1B1B1B;--white:#fff;--g1:#EEEEEE;--g2:#D8D8D8;--g4:#929292;--g5:#696969;--accent:#37D4AD;--accent-light:#DAFCF3}
*{box-sizing:border-box}body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#d6d6d6;padding:24px;font-family:"Patrick Hand",ui-rounded,system-ui,sans-serif;color:var(--ink)}
.phone{width:384px;min-height:788px;overflow:hidden;display:flex;flex-direction:column;background:var(--white);border:3px solid var(--ink);border-radius:42px}
.statusbar{display:flex;justify-content:space-between;padding:12px 22px 0;font-size:12.5px;color:var(--g5);font-family:"Inter",sans-serif;font-weight:500}
.topbar{display:flex;align-items:center;gap:10px;padding:8px 16px 6px}.back{width:36px;height:36px;display:grid;place-items:center;border:2px solid var(--ink);border-radius:50%}.back svg{width:18px;height:18px;stroke:var(--ink);fill:none;stroke-width:2.2}.topbar h1{font-size:22px;margin:0;flex:1}.save{font-family:"Inter",sans-serif;font-weight:700;font-size:14px}
main{flex:1;padding:6px 18px 16px;overflow:auto}
.av{width:84px;height:84px;border:2.5px solid var(--ink);border-radius:50%;background:var(--g1);display:grid;place-items:center;font-size:34px;margin:6px auto 4px;position:relative}
.av .cam{position:absolute;bottom:-2px;right:-2px;width:30px;height:30px;border:2px solid var(--ink);border-radius:50%;background:var(--accent);display:grid;place-items:center;font-size:14px}
.chg{text-align:center;font-family:"Inter",sans-serif;font-weight:600;font-size:13px;color:var(--g5);margin-bottom:12px}
label{display:block;font-family:"Inter",sans-serif;font-weight:500;font-size:12.5px;color:var(--g5);margin:12px 0 5px}
.inp,.ta{border:2px solid var(--ink);border-radius:11px;padding:10px 13px;font-family:"Inter",sans-serif;font-size:14px;color:var(--g5);background:var(--white);width:100%}.ta{min-height:52px}
.chips{display:flex;gap:7px;flex-wrap:wrap}.chip{border:2px solid var(--ink);border-radius:999px;padding:4px 12px;font-size:14px;background:var(--white)}.chip.pri{background:var(--accent)}.chip.add{border-style:dashed;color:var(--g4)}
</style></head><body>
<div class="phone">
<div class="statusbar"><span>9:41</span><span>wifi · 84%</span></div>
<div class="topbar"><span class="back"><svg viewBox="0 0 24 24"><path d="M15 5l-7 7 7 7"/></svg></span><h1>Edit profile</h1><span class="save">Save</span></div>
<main>
<div class="av">B<span class="cam">✎</span></div><div class="chg">Change photo</div>
<label>Name</label><div class="inp">Basit S.</div>
<div style="display:flex;gap:10px"><div style="flex:1"><label>Age</label><div class="inp">29</div></div><div style="flex:1"><label>City</label><div class="inp">Milton Keynes</div></div></div>
<label>Bio</label><div class="ta">Builder, hiker, occasional bouldering.</div>
<label>Interests</label><div class="chips"><span class="chip pri">Coffee</span><span class="chip pri">Hiking</span><span class="chip pri">Coding</span><span class="chip add">＋ add</span></div>
</main>
</div>
<svg width="0" height="0" style="position:absolute"><filter id="wobble-soft"><feTurbulence type="fractalNoise" baseFrequency=".012" numOctaves="3" result="n"/><feDisplacementMap id="__disp" in="SourceGraphic" in2="n" scale="2"/></filter></svg>
<script>addEventListener('message',function(e){var d=e.data||{},r=document.documentElement;if(d.__vars){for(var k in d.__vars)r.style.setProperty(k,d.__vars[k]);var s=document.getElementById('__acc');if(!s){s=document.createElement('style');s.id='__acc';document.head.appendChild(s)}s.textContent=d.__dark?".chip.pri{color:#fff!important}.av .cam{color:#fff!important}":""}if('__sketch' in d){var a=+d.__sketch||0,p=document.getElementById('__disp');if(p)p.setAttribute('scale',a);var ph=document.querySelector('.phone');if(ph)ph.style.filter=a>0?'url(#wobble-soft)':''}});</script>
</body></html>
