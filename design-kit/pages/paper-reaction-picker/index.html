<!-- @dsCard group="App screens · paper" name="Chat reaction picker (paper)" -->
<!doctype html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Reaction picker (paper)</title><link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Inter:wght@500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--ink:#1B1B1B;--white:#fff;--g1:#EEEEEE;--g2:#D8D8D8;--g4:#929292;--g5:#696969;--accent:#37D4AD;--accent-light:#DAFCF3;--overlay:rgba(27,27,27,.35)}
*{box-sizing:border-box}body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#d6d6d6;padding:24px;font-family:"Patrick Hand",ui-rounded,system-ui,sans-serif;color:var(--ink)}
.phone{width:384px;min-height:788px;overflow:hidden;display:flex;flex-direction:column;background:var(--white);border:3px solid var(--ink);border-radius:42px;position:relative}
.statusbar{display:flex;justify-content:space-between;padding:12px 22px 0;font-size:12.5px;color:var(--g5);font-family:"Inter",sans-serif;font-weight:500}
.topbar{display:flex;align-items:center;gap:10px;padding:8px 16px 10px;border-bottom:2px solid var(--ink)}.back{width:36px;height:36px;display:grid;place-items:center;border:2px solid var(--ink);border-radius:50%}.back svg{width:18px;height:18px;stroke:var(--ink);fill:none;stroke-width:2.2}.topbar h1{font-size:20px;margin:0}
main{flex:1;padding:14px;display:flex;flex-direction:column;gap:9px;background:var(--g1);position:relative}
.msg{max-width:78%}.who{font-family:"Inter",sans-serif;font-weight:600;font-size:11.5px;color:var(--g5);margin:0 0 2px 6px}
.bub{border:2px solid var(--ink);border-radius:14px;padding:8px 12px;font-size:16px;background:var(--white)}
.in{align-self:flex-start}.sel .bub{box-shadow:0 0 0 3px var(--accent)}
.dim{position:absolute;inset:0;background:var(--overlay);z-index:2}
.picker{position:absolute;z-index:3;top:120px;left:24px;background:var(--white);border:2px solid var(--ink);border-radius:999px;box-shadow:3px 3px 0 var(--ink);padding:6px 10px;display:flex;gap:8px;font-size:24px}
.picker span{cursor:pointer}.picker .more{font-size:18px;color:var(--g5)}
</style></head><body>
<div class="phone">
<div class="statusbar"><span>9:41</span><span>wifi · 84%</span></div>
<div class="topbar"><span class="back"><svg viewBox="0 0 24 24"><path d="M15 5l-7 7 7 7"/></svg></span><h1>Sunday Dog Walk</h1></div>
<main>
<div class="msg in sel"><div class="who">Sarah</div><div class="bub">Morning! Meeting at the main car park ☀️</div></div>
<div class="msg in"><div class="who">Mike</div><div class="bub">Perfect — bringing treats 🦴</div></div>
</main>
<div class="dim"></div>
<div class="picker"><span>👍</span><span>❤️</span><span>😂</span><span>🎉</span><span>🙌</span><span class="more">＋</span></div>
</div>
<svg width="0" height="0" style="position:absolute"><filter id="wobble-soft"><feTurbulence type="fractalNoise" baseFrequency=".012" numOctaves="3" result="n"/><feDisplacementMap id="__disp" in="SourceGraphic" in2="n" scale="2"/></filter></svg>
<script>addEventListener('message',function(e){var d=e.data||{},r=document.documentElement;if(d.__vars){for(var k in d.__vars)r.style.setProperty(k,d.__vars[k]);var s=document.getElementById('__acc');if(!s){s=document.createElement('style');s.id='__acc';document.head.appendChild(s)}s.textContent=d.__dark?".btn:not(.ghost):not(.soon):not(.done),.cbadge,.nbadge,.dot,.chip.pri,.seg span.on,.tier .flag{color:#fff!important}":""}if('__sketch' in d){var a=+d.__sketch||0,p=document.getElementById('__disp');if(p)p.setAttribute('scale',a);var ph=document.querySelector('.phone');if(ph)ph.style.filter=a>0?'url(#wobble-soft)':''}});</script>
</body></html>
