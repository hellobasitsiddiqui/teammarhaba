<!-- @dsCard group="App screens · paper" name="Chat thread (paper)" -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TeamMarhaba — Chat thread (paper)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Inter:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root{--ink:#1B1B1B;--white:#FFFFFF;--g1:#EEEEEE;--g2:#D8D8D8;--g4:#929292;--g5:#696969;--accent:#37D4AD;--accent-light:#DAFCF3;}
    *{box-sizing:border-box;}
    body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#d6d6d6;padding:24px;font-family:"Patrick Hand",ui-rounded,system-ui,sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased;}
    .phone{width:384px;min-height:788px;position:relative;overflow:hidden;display:flex;flex-direction:column;background:var(--white);border:3px solid var(--ink);border-radius:42px;}
    .statusbar{display:flex;justify-content:space-between;padding:12px 22px 0;font-size:12.5px;color:var(--g5);font-family:"Inter",sans-serif;font-weight:500;}
    .topbar{display:flex;align-items:center;gap:10px;padding:8px 16px 10px;border-bottom:2px solid var(--ink);}
    .topbar .back{width:36px;height:36px;display:grid;place-items:center;border:2px solid var(--ink);border-radius:50%;background:var(--white);}
    .topbar .back svg{width:18px;height:18px;stroke:var(--ink);fill:none;stroke-width:2.2;}
    .topbar h1{font-size:21px;font-weight:400;margin:0;line-height:1;}
    .topbar .sub{font-family:"Inter",sans-serif;font-weight:500;font-size:11.5px;color:var(--g4);}
    main{padding:14px 14px 8px;flex:1;display:flex;flex-direction:column;gap:4px;background:var(--g1);}
    .day{align-self:center;font-family:"Inter",sans-serif;font-weight:500;color:var(--g5);font-size:12px;margin-bottom:6px;}
    .msg{max-width:78%;margin-bottom:9px;}
    .msg .who{font-family:"Inter",sans-serif;font-weight:600;font-size:11.5px;color:var(--g5);margin:0 0 2px 6px;}
    .bub{border:2px solid var(--ink);border-radius:14px;padding:8px 12px;font-size:16px;line-height:1.3;background:var(--white);}
    .in{align-self:flex-start;} .out{align-self:flex-end;}
    .out .bub{background:var(--accent-light);}
    .stamp{font-family:"Inter",sans-serif;font-weight:500;font-size:10.5px;color:var(--g5);margin-top:3px;text-align:right;}
    .tick{color:var(--accent);font-weight:700;letter-spacing:-1px;}
    .react{display:inline-flex;gap:3px;align-items:center;border:1.5px solid var(--ink);border-radius:999px;background:var(--white);padding:1px 8px;font-size:13px;margin:4px 0 0 6px;}
    .composer{display:flex;gap:8px;align-items:center;padding:10px 12px;border-top:2px solid var(--ink);background:var(--white);}
    .composer .inp{flex:1;border:2px solid var(--ink);border-radius:999px;padding:8px 14px;font-family:"Inter",sans-serif;font-size:14px;color:var(--g4);background:var(--white);}
    .composer .send{width:42px;height:42px;flex:none;border:2px solid var(--ink);border-radius:50%;background:var(--accent);display:grid;place-items:center;box-shadow:2px 2px 0 var(--ink);}
    .composer .send svg{width:18px;height:18px;stroke:var(--ink);fill:none;stroke-width:2;}
  </style>
</head>
<body>
  <div class="phone">
    <div class="statusbar"><span>9:41</span><span>wifi · 84%</span></div>
    <div class="topbar"><span class="back"><svg viewBox="0 0 24 24"><path d="M15 5l-7 7 7 7"/></svg></span><div><h1>Sunday Dog Walk</h1><div class="sub">12 going</div></div></div>
    <main>
      <div class="day">Today</div>
      <div class="msg in"><div class="who">Sarah</div><div class="bub">Morning! Meeting at the main car park ☀️</div><span class="react">👍 3</span></div>
      <div class="msg in"><div class="who">Mike</div><div class="bub">Perfect — I'll bring treats for the dogs 🦴</div></div>
      <div class="msg out"><div class="bub">See you all at 10!</div><div class="stamp">09:58 · <span class="tick">✓✓</span></div><span class="react">❤️ 2</span></div>
      <div class="msg in"><div class="who">Sarah</div><div class="bub">Can't wait 🐶</div></div>
      <div class="msg out"><div class="bub">On my way now</div><div class="stamp">10:01 · <span class="tick">✓</span></div></div>
    </main>
    <div class="composer"><div class="inp">Message…</div><span class="send"><svg viewBox="0 0 24 24"><path d="M4 12l16-7-7 16-2-7-7-2z"/></svg></span></div>
  </div>
  <script>
  /* showcase.html accent picker: apply an accent posted from the parent to this screen's own :root
     (postMessage avoids the file:// cross-frame DOM block). */
  addEventListener('message', function(e){
    var d = e.data || {};
    if(!d || !d.__accent) return;
    var r = document.documentElement;
    r.style.setProperty('--accent', d.__accent);
    r.style.setProperty('--accent-light', d.__accentLight);
    var s = document.getElementById('__acc');
    if(!s){ s = document.createElement('style'); s.id = '__acc'; document.head.appendChild(s); }
    s.textContent = d.__dark
      ? ".btn:not(.ghost):not(.soon):not(.done){color:#fff!important}.cbadge,.nbadge,.dot,.chip.on,.chip.pri,.seg span.on,.tier .flag{color:#fff!important}.send svg{stroke:#fff!important}"
      : "";
  });
  </script>
  <svg width="0" height="0" style="position:absolute" aria-hidden="true"><filter id="wobble-soft"><feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="3" result="noise"/><feDisplacementMap id="__disp" in="SourceGraphic" in2="noise" scale="2"/></filter></svg>
  <script>
  /* sketchiness control from the showcase: __sketch = 0 (crisp) .. ~4 (very wavy) */
  addEventListener('message', function(e){
    var d = e.data || {};
    if(!('__sketch' in d)) return;
    var amt = +d.__sketch || 0;
    var disp = document.getElementById('__disp');
    if(disp) disp.setAttribute('scale', amt);
    var ph = document.querySelector('.phone');
    if(ph) ph.style.filter = amt > 0 ? 'url(#wobble-soft)' : '';
  });
  </script>
  <script>
  /* generic theme-token setter from the showcase (sets any CSS vars posted in __vars) */
  addEventListener('message', function(e){
    var d = e.data || {};
    if(!d.__vars) return;
    var r = document.documentElement;
    for(var k in d.__vars) r.style.setProperty(k, d.__vars[k]);
    var s = document.getElementById('__acc');
    if(!s){ s = document.createElement('style'); s.id='__acc'; document.head.appendChild(s); }
    s.textContent = d.__dark ? ".btn:not(.ghost):not(.soon):not(.done){color:#fff!important}.cbadge,.nbadge,.dot,.chip.on,.chip.pri,.seg span.on,.tier .flag{color:#fff!important}.send svg{stroke:#fff!important}" : "";
  });
  </script>
</body>
</html>
