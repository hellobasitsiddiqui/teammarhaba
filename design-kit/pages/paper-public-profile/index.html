<!doctype html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Public profile (paper)</title><link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Inter:wght@500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--ink:#1B1B1B;--white:#fff;--g1:#EEEEEE;--g2:#D8D8D8;--g4:#929292;--g5:#696969;--accent:#37D4AD;--accent-light:#DAFCF3}
*{box-sizing:border-box}body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#d6d6d6;padding:24px;font-family:"Patrick Hand",ui-rounded,system-ui,sans-serif;color:var(--ink)}
.phone{width:384px;min-height:788px;overflow:hidden;display:flex;flex-direction:column;background:var(--white);border:3px solid var(--ink);border-radius:42px}
.statusbar{display:flex;justify-content:space-between;padding:12px 22px 0;font-size:12.5px;color:var(--g5);font-family:"Inter",sans-serif;font-weight:500}
.topbar{display:flex;align-items:center;gap:10px;padding:8px 16px}.back{width:36px;height:36px;display:grid;place-items:center;border:2px solid var(--ink);border-radius:50%}.back svg{width:18px;height:18px;stroke:var(--ink);fill:none;stroke-width:2.2}
main{flex:1;padding:6px 20px 16px;text-align:center}
.av{width:96px;height:96px;border:2.5px solid var(--ink);border-radius:50%;background:var(--g1);display:grid;place-items:center;font-size:40px;margin:8px auto 8px}
h1{font-size:28px;margin:0 0 2px}.meta{font-family:"Inter",sans-serif;font-weight:500;color:var(--g5);font-size:14px;margin-bottom:14px}
.chips{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;margin-bottom:16px}.chip{border:2px solid var(--ink);border-radius:999px;padding:4px 12px;font-size:14px;background:var(--white)}
.mut{border:2px solid var(--ink);border-radius:14px;box-shadow:3px 3px 0 var(--g2);padding:12px 15px;text-align:left;font-family:"Inter",sans-serif;font-weight:500;color:var(--g5);font-size:14px;margin-bottom:18px}.mut b{color:var(--ink)}
.btn{font-size:16px;border:2px solid var(--ink);border-radius:12px;background:var(--accent);color:var(--ink);padding:11px 18px;width:100%;box-shadow:2px 2px 0 var(--ink)}
.btn.ghost{background:var(--white);box-shadow:none;margin-top:10px;color:var(--g5)}
</style></head><body>
<div class="phone">
<div class="statusbar"><span>9:41</span><span>wifi · 84%</span></div>
<div class="topbar"><span class="back"><svg viewBox="0 0 24 24"><path d="M15 5l-7 7 7 7"/></svg></span></div>
<main>
<div class="av">S</div>
<h1>Sarah K.</h1>
<div class="meta">Milton Keynes · joined Jun 2026</div>
<div class="chips"><span class="chip">Dog walks</span><span class="chip">Coffee</span><span class="chip">Running</span></div>
<div class="mut"><b>3 events</b> in common · you're both going to <b>Sunday Dog Walk</b></div>
<button class="btn">Message</button>
<button class="btn ghost">Block or report</button>
</main>
</div>
<svg width="0" height="0" style="position:absolute"><filter id="wobble-soft"><feTurbulence type="fractalNoise" baseFrequency=".012" numOctaves="3" result="n"/><feDisplacementMap id="__disp" in="SourceGraphic" in2="n" scale="2"/></filter></svg>
<script>addEventListener('message',function(e){var d=e.data||{},r=document.documentElement;if(d.__vars){for(var k in d.__vars)r.style.setProperty(k,d.__vars[k]);var s=document.getElementById('__acc');if(!s){s=document.createElement('style');s.id='__acc';document.head.appendChild(s)}s.textContent=d.__dark?".btn:not(.ghost):not(.soon):not(.done){color:#fff!important}":""}if('__sketch' in d){var a=+d.__sketch||0,p=document.getElementById('__disp');if(p)p.setAttribute('scale',a);var ph=document.querySelector('.phone');if(ph)ph.style.filter=a>0?'url(#wobble-soft)':''}});</script>
</body></html>
