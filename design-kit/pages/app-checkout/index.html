<!-- @dsCard group="App screens" name="Dummy checkout" -->
<!doctype html>
<html lang="en" data-theme="sketch">
<head>
  <meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TeamMarhaba — Checkout</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Gochi+Hand&family=Patrick+Hand&family=Shadows+Into+Light&display=swap" rel="stylesheet" />
  <style>
    :root{--ink:#1a1a2e;--paper:#f7f7f3;--card:#fffef9;--muted:color-mix(in srgb,var(--ink) 52%,transparent);
      --shadow:2px 2px 0 color-mix(in srgb,var(--ink) 18%,transparent);--shadow-lg:4px 4px 0 color-mix(in srgb,var(--ink) 22%,transparent);}
    *{box-sizing:border-box;}
    body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#e7e7ea;padding:24px;
      font-family:"Patrick Hand","Bradley Hand",ui-rounded,system-ui,sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased;}
    .wob{filter:url(#wobble-soft);}@media (prefers-reduced-motion:reduce){.wob{filter:none;}}
    .phone{width:384px;min-height:788px;position:relative;overflow:hidden;display:flex;flex-direction:column;
      background-color:var(--paper);border:2px solid var(--ink);border-radius:30px;box-shadow:var(--shadow-lg);}
    .statusbar{display:flex;justify-content:space-between;padding:11px 20px 0;font-size:12.5px;color:var(--muted);font-family:system-ui,sans-serif;}
    .topbar{display:flex;align-items:center;gap:10px;padding:8px 16px 8px;}
    .topbar .back{width:34px;height:34px;display:grid;place-items:center;border:1.5px solid var(--ink);border-radius:50%;background:var(--card);}
    .topbar .back svg{width:18px;height:18px;stroke:var(--ink);fill:none;stroke-width:2;}
    .topbar h1{font-family:"Gochi Hand",cursive;font-weight:400;font-size:23px;margin:0;flex:1;}
    main{padding:2px 16px 14px;flex:1;overflow:auto;}
    .dummy{font-family:"Shadows Into Light",cursive;text-align:center;border:1.5px dashed var(--ink);border-radius:10px;
      padding:5px;margin:0 0 14px;font-size:13px;color:var(--muted);}
    .card{background:var(--card);border:1.5px solid var(--ink);border-radius:15px;box-shadow:var(--shadow);padding:14px 16px;margin-bottom:14px;}
    .card h3{font-family:"Gochi Hand",cursive;font-weight:400;font-size:18px;margin:0 0 8px;}
    .li{display:flex;justify-content:space-between;font-size:15px;margin:6px 0;}
    .li .muted{color:var(--muted);}
    .li.total{font-family:"Gochi Hand",cursive;font-size:19px;border-top:1.5px solid color-mix(in srgb,var(--ink) 20%,transparent);padding-top:8px;margin-top:8px;}
    .strike{text-decoration:line-through;color:var(--muted);}
    .free{font-family:"Gochi Hand",cursive;}
    label{display:block;font-size:13px;color:var(--muted);margin:10px 0 4px;}
    .inp{border:1.5px solid var(--ink);border-radius:10px;padding:9px 12px;font-family:inherit;font-size:15px;color:var(--muted);background:var(--paper);}
    .field2{display:flex;gap:10px;}.field2 .inp{flex:1;}
    .btn{font-family:"Gochi Hand",cursive;font-size:17px;border:1.5px solid var(--ink);border-radius:11px;background:var(--ink);color:var(--paper);padding:10px 18px;cursor:pointer;width:100%;margin-top:6px;}
  </style>
</head>
<body>
  <svg width="0" height="0" style="position:absolute" aria-hidden="true"><filter id="wobble-soft"><feTurbulence type="fractalNoise" baseFrequency="0.013" numOctaves="3" result="noise" /><feDisplacementMap in="SourceGraphic" in2="noise" scale="2.5" /></filter></svg>
  <div class="phone">
    <div class="statusbar"><span>9:41</span><span>wifi · 84%</span></div>
    <div class="topbar">
      <span class="back wob"><svg viewBox="0 0 24 24"><path d="M15 5l-7 7 7 7"/></svg></span>
      <h1>Checkout</h1>
    </div>
    <main>
      <div class="dummy wob">Dummy checkout — no real payment is taken</div>

      <div class="card wob">
        <h3>Coffee &amp; Code Meetup</h3>
        <div class="li"><span class="muted">Tue 14 Jul · 18:30</span></div>
        <div class="li"><span>Event fee</span><span class="strike">£5.00</span></div>
        <div class="li"><span>First event</span><span class="free">FREE</span></div>
        <div class="li total"><span>Total</span><span>£0.00</span></div>
      </div>

      <div class="card wob">
        <label>Card number</label>
        <div class="inp wob">4242 4242 4242 4242</div>
        <div class="field2">
          <div style="flex:1"><label>Expiry</label><div class="inp wob">12 / 28</div></div>
          <div style="flex:1"><label>CVC</label><div class="inp wob">123</div></div>
        </div>
        <label>Name on card</label>
        <div class="inp wob">B. Siddiqui</div>
      </div>

      <button class="btn wob">Confirm &amp; join — free</button>
    </main>
  </div>
</body>
</html>
