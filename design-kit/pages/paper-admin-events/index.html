<!-- @dsCard group="App screens · paper" name="Admin: manage events (paper)" -->
<!doctype html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Manage events (paper)</title><link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Inter:wght@500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--ink:#1B1B1B;--white:#fff;--g1:#EEEEEE;--g2:#D8D8D8;--g4:#929292;--g5:#696969;--accent:#37D4AD;--accent-light:#DAFCF3}
*{box-sizing:border-box}body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#d6d6d6;padding:24px;font-family:"Patrick Hand",ui-rounded,system-ui,sans-serif;color:var(--ink)}
.phone{width:384px;min-height:788px;overflow:hidden;display:flex;flex-direction:column;background:var(--white);border:3px solid var(--ink);border-radius:42px}
.statusbar{display:flex;justify-content:space-between;padding:12px 22px 0;font-size:12.5px;color:var(--g5);font-family:"Inter",sans-serif;font-weight:500}
.topbar{display:flex;align-items:center;gap:10px;padding:8px 16px 6px}.back{width:36px;height:36px;display:grid;place-items:center;border:2px solid var(--ink);border-radius:50%}.back svg{width:18px;height:18px;stroke:var(--ink);fill:none;stroke-width:2.2}.topbar h1{font-size:22px;margin:0;flex:1}.plus{font-size:22px}
main{flex:1;padding:6px 16px 16px;overflow:auto}
.card{display:flex;align-items:center;gap:12px;border:2px solid var(--ink);border-radius:14px;box-shadow:3px 3px 0 var(--g2);padding:12px 14px;margin-bottom:11px}
.mid{flex:1}.mid h3{font-size:18px;font-weight:400;margin:0 0 2px}.mid .m{font-family:"Inter",sans-serif;font-weight:500;color:var(--g5);font-size:12.5px}
.st{font-family:"Inter",sans-serif;font-weight:700;font-size:10px;border:1.5px solid var(--ink);border-radius:999px;padding:2px 8px}.st.live{background:var(--accent-light)}.st.draft{background:var(--g1);color:var(--g5)}
.dots{font-size:20px;color:var(--g5);letter-spacing:1px}
</style></head><body>
<div class="phone">
<div class="statusbar"><span>9:41</span><span>wifi · 84%</span></div>
<div class="topbar"><span class="back"><svg viewBox="0 0 24 24"><path d="M15 5l-7 7 7 7"/></svg></span><h1>Manage events</h1><span class="plus">＋</span></div>
<main>
<div class="card"><div class="mid"><h3>Sunday Dog Walk</h3><div class="m">12 going · Sun 12 Jul</div></div><span class="st live">LIVE</span><span class="dots">⋯</span></div>
<div class="card"><div class="mid"><h3>Coffee &amp; Code</h3><div class="m">8 going · Tue 14 Jul</div></div><span class="st live">LIVE</span><span class="dots">⋯</span></div>
<div class="card"><div class="mid"><h3>5-a-side League</h3><div class="m">18 going · Sun 19 Jul</div></div><span class="st live">LIVE</span><span class="dots">⋯</span></div>
<div class="card"><div class="mid"><h3>Board Games Night</h3><div class="m">Draft · not published</div></div><span class="st draft">DRAFT</span><span class="dots">⋯</span></div>
</main>
</div>
<svg width="0" height="0" style="position:absolute"><filter id="wobble-soft"><feTurbulence type="fractalNoise" baseFrequency=".012" numOctaves="3" result="n"/><feDisplacementMap id="__disp" in="SourceGraphic" in2="n" scale="2"/></filter></svg>
<script>addEventListener('message',function(e){var d=e.data||{},r=document.documentElement;if(d.__vars){for(var k in d.__vars)r.style.setProperty(k,d.__vars[k]);var s=document.getElementById('__acc');if(!s){s=document.createElement('style');s.id='__acc';document.head.appendChild(s)}s.textContent=""}if('__sketch' in d){var a=+d.__sketch||0,p=document.getElementById('__disp');if(p)p.setAttribute('scale',a);var ph=document.querySelector('.phone');if(ph)ph.style.filter=a>0?'url(#wobble-soft)':''}});</script>
</body></html>
