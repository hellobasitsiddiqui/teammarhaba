<!-- @dsCard group="App screens · paper" name="Admin: send notification (paper)" -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TeamMarhaba — Send notification (paper)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Inter:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root{--ink:#1B1B1B;--white:#FFFFFF;--g1:#EEEEEE;--g2:#D8D8D8;--g4:#929292;--g5:#696969;--accent:#37D4AD;--accent-light:#DAFCF3;}
    *{box-sizing:border-box;}
    body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#d6d6d6;padding:24px;font-family:"Patrick Hand",ui-rounded,system-ui,sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased;}
    .phone{width:384px;min-height:788px;position:relative;overflow:hidden;display:flex;flex-direction:column;background:var(--white);border:3px solid var(--ink);border-radius:42px;}
    .statusbar{display:flex;justify-content:space-between;padding:12px 22px 0;font-size:12.5px;color:var(--g5);font-family:"Inter",sans-serif;font-weight:500;}
    .topbar{display:flex;align-items:center;gap:10px;padding:8px 16px 6px;}
    .topbar .back{width:36px;height:36px;display:grid;place-items:center;border:2px solid var(--ink);border-radius:50%;background:var(--white);}
    .topbar .back svg{width:18px;height:18px;stroke:var(--ink);fill:none;stroke-width:2.2;}
    .topbar h1{font-size:22px;margin:0;flex:1;}
    .admin{font-family:"Inter",sans-serif;font-weight:700;font-size:10.5px;border:1.5px solid var(--ink);border-radius:999px;padding:3px 9px;background:var(--accent-light);}
    main{padding:6px 16px 14px;flex:1;}
    label{display:block;font-family:"Inter",sans-serif;font-weight:500;font-size:12.5px;color:var(--g5);margin:12px 0 5px;}
    .seg{display:flex;border:2px solid var(--ink);border-radius:11px;overflow:hidden;}
    .seg span{flex:1;text-align:center;padding:8px 0;font-size:14px;}
    .seg span.on{background:var(--accent);}
    .inp,.ta{border:2px solid var(--ink);border-radius:11px;padding:10px 12px;font-family:"Inter",sans-serif;font-size:14px;color:var(--g5);background:var(--white);width:100%;}
    .ta{min-height:76px;}
    .preview{margin-top:16px;border:2px dashed var(--ink);border-radius:13px;padding:11px 13px;background:var(--g1);}
    .preview .p-t{font-family:"Inter",sans-serif;font-weight:700;font-size:10.5px;color:var(--g5);margin-bottom:6px;letter-spacing:.05em;}
    .push{display:flex;gap:10px;align-items:flex-start;}
    .push .ic{width:32px;height:32px;flex:none;border:1.6px solid var(--ink);border-radius:8px;display:grid;place-items:center;background:var(--white);}
    .push .txt .h{font-family:"Inter",sans-serif;font-weight:700;font-size:14px;}
    .push .txt .b{font-family:"Inter",sans-serif;font-weight:500;font-size:13px;color:var(--g5);}
    .btn{font-size:17px;border:2px solid var(--ink);border-radius:12px;background:var(--accent);color:var(--ink);padding:11px 18px;width:100%;margin-top:16px;box-shadow:2px 2px 0 var(--ink);}
  </style>
</head>
<body>
  <div class="phone">
    <div class="statusbar"><span>9:41</span><span>wifi · 84%</span></div>
    <div class="topbar"><span class="back"><svg viewBox="0 0 24 24"><path d="M15 5l-7 7 7 7"/></svg></span><h1>Send notification</h1><span class="admin">ADMIN</span></div>
    <main>
      <label>Audience</label>
      <div class="seg"><span class="on">All users</span><span>Event attendees</span></div>
      <label>Title</label>
      <div class="inp">New events this weekend 🎉</div>
      <label>Message</label>
      <div class="ta">3 fresh meetups just dropped near you — dog walks, coffee &amp; code and a 5-a-side. Tap to RSVP before they fill up.</div>
      <label>Opens (deep link)</label>
      <div class="inp">/events</div>
      <div class="preview"><div class="p-t">PREVIEW · PUSH</div><div class="push"><span class="ic">M</span><div class="txt"><div class="h">New events this weekend 🎉</div><div class="b">3 fresh meetups just dropped near you…</div></div></div></div>
      <button class="btn">Send to 1,240 people</button>
    </main>
  </div>
  <script>
  /* showcase.html accent picker: apply an accent posted from the parent to this screen's own :root
     (postMessage avoids the file:// cross-frame DOM block). */
  addEventListener('message', function(e){
    var d = e.data || {};
    if(!d || !d.__accent) return;
    var r = document.documentElement;
    r.style.setProperty('--accent', d.__accent);
    r.style.setProperty('--accent-light', d.__accentLight);
    var s = document.getElementById('__acc');
    if(!s){ s = document.createElement('style'); s.id = '__acc'; document.head.appendChild(s); }
    s.textContent = d.__dark
      ? ".btn:not(.ghost):not(.soon):not(.done){color:#fff!important}.cbadge,.nbadge,.dot,.chip.on,.chip.pri,.seg span.on,.tier .flag{color:#fff!important}.send svg{stroke:#fff!important}"
      : "";
  });
  </script>
  <svg width="0" height="0" style="position:absolute" aria-hidden="true"><filter id="wobble-soft"><feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="3" result="noise"/><feDisplacementMap id="__disp" in="SourceGraphic" in2="noise" scale="2"/></filter></svg>
  <script>
  /* sketchiness control from the showcase: __sketch = 0 (crisp) .. ~4 (very wavy) */
  addEventListener('message', function(e){
    var d = e.data || {};
    if(!('__sketch' in d)) return;
    var amt = +d.__sketch || 0;
    var disp = document.getElementById('__disp');
    if(disp) disp.setAttribute('scale', amt);
    var ph = document.querySelector('.phone');
    if(ph) ph.style.filter = amt > 0 ? 'url(#wobble-soft)' : '';
  });
  </script>
  <script>
  /* generic theme-token setter from the showcase (sets any CSS vars posted in __vars) */
  addEventListener('message', function(e){
    var d = e.data || {};
    if(!d.__vars) return;
    var r = document.documentElement;
    for(var k in d.__vars) r.style.setProperty(k, d.__vars[k]);
    var s = document.getElementById('__acc');
    if(!s){ s = document.createElement('style'); s.id='__acc'; document.head.appendChild(s); }
    s.textContent = d.__dark ? ".btn:not(.ghost):not(.soon):not(.done){color:#fff!important}.cbadge,.nbadge,.dot,.chip.on,.chip.pri,.seg span.on,.tier .flag{color:#fff!important}.send svg{stroke:#fff!important}" : "";
  });
  </script>
</body>
</html>
