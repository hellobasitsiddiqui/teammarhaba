<!-- @dsCard group="App screens · paper" name="Payment result (paper)" -->
<!doctype html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Payment result (paper)</title><link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Inter:wght@500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--ink:#1B1B1B;--white:#fff;--g1:#EEEEEE;--g2:#D8D8D8;--g4:#929292;--g5:#696969;--accent:#37D4AD;--accent-light:#DAFCF3}
*{box-sizing:border-box}body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#d6d6d6;padding:24px;font-family:"Patrick Hand",ui-rounded,system-ui,sans-serif;color:var(--ink)}
.phone{width:384px;min-height:788px;overflow:hidden;display:flex;flex-direction:column;background:var(--white);border:3px solid var(--ink);border-radius:42px}
.statusbar{display:flex;justify-content:space-between;padding:12px 22px 0;font-size:12.5px;color:var(--g5);font-family:"Inter",sans-serif;font-weight:500}
main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:0 28px}
.check{width:88px;height:88px;border:3px solid var(--ink);border-radius:50%;display:grid;place-items:center;background:var(--accent);margin-bottom:16px}.check svg{width:46px;height:46px;stroke:var(--ink);fill:none;stroke-width:3}
h1{font-size:30px;margin:0 0 6px}.sub{font-family:"Inter",sans-serif;font-weight:500;color:var(--g5);font-size:15px;margin:0 0 18px}
.rc{width:100%;background:var(--white);border:2px solid var(--ink);border-radius:15px;box-shadow:3px 3px 0 var(--g2);padding:13px 16px;text-align:left;margin-bottom:20px}
.li{display:flex;justify-content:space-between;font-size:15px;margin:5px 0}.li .m{font-family:"Inter",sans-serif;font-weight:500;color:var(--g5);font-size:13px}
.li.t{border-top:2px solid var(--g2);padding-top:7px;margin-top:7px;font-size:18px}
.btn{font-size:16px;border:2px solid var(--ink);border-radius:12px;background:var(--accent);color:var(--ink);padding:11px 18px;width:100%;box-shadow:2px 2px 0 var(--ink)}
</style></head><body>
<div class="phone">
<div class="statusbar"><span>9:41</span><span>wifi · 84%</span></div>
<main>
<div class="check"><svg viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg></div>
<h1>Payment successful</h1>
<div class="sub">Dummy receipt — you're all set.</div>
<div class="rc"><div class="li"><span>Coffee &amp; Code Meetup</span></div><div class="li"><span class="m">Tue 14 Jul · 18:30</span></div><div class="li"><span>Event fee</span><span>£5.00</span></div><div class="li t"><span>Paid</span><span>£5.00</span></div></div>
<button class="btn">View my ticket</button>
</main>
</div>
<svg width="0" height="0" style="position:absolute"><filter id="wobble-soft"><feTurbulence type="fractalNoise" baseFrequency=".012" numOctaves="3" result="n"/><feDisplacementMap id="__disp" in="SourceGraphic" in2="n" scale="2"/></filter></svg>
<script>addEventListener('message',function(e){var d=e.data||{},r=document.documentElement;if(d.__vars){for(var k in d.__vars)r.style.setProperty(k,d.__vars[k]);var s=document.getElementById('__acc');if(!s){s=document.createElement('style');s.id='__acc';document.head.appendChild(s)}s.textContent=d.__dark?".btn:not(.ghost):not(.soon):not(.done){color:#fff!important}.check svg{stroke:#fff!important}":""}if('__sketch' in d){var a=+d.__sketch||0,p=document.getElementById('__disp');if(p)p.setAttribute('scale',a);var ph=document.querySelector('.phone');if(ph)ph.style.filter=a>0?'url(#wobble-soft)':''}});</script>
</body></html>
