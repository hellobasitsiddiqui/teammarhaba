<!-- @dsCard group="App screens · paper" name="Settings (paper)" -->
<!doctype html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Settings (paper)</title><link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Inter:wght@500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--ink:#1B1B1B;--white:#fff;--g1:#EEEEEE;--g2:#D8D8D8;--g4:#929292;--g5:#696969;--accent:#37D4AD;--accent-light:#DAFCF3}
*{box-sizing:border-box}body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#d6d6d6;padding:24px;font-family:"Patrick Hand",ui-rounded,system-ui,sans-serif;color:var(--ink)}
.phone{width:384px;min-height:788px;overflow:hidden;display:flex;flex-direction:column;background:var(--white);border:3px solid var(--ink);border-radius:42px}
.statusbar{display:flex;justify-content:space-between;padding:12px 22px 0;font-size:12.5px;color:var(--g5);font-family:"Inter",sans-serif;font-weight:500}
.topbar{display:flex;align-items:center;gap:10px;padding:8px 16px 6px}.back{width:36px;height:36px;display:grid;place-items:center;border:2px solid var(--ink);border-radius:50%}.back svg{width:18px;height:18px;stroke:var(--ink);fill:none;stroke-width:2.2}.topbar h1{font-size:22px;margin:0}
main{flex:1;padding:6px 16px 16px}
.lbl{font-family:"Inter",sans-serif;font-weight:600;font-size:12px;color:var(--g4);margin:14px 2px 6px;letter-spacing:.04em}
.grp{border:2px solid var(--ink);border-radius:14px;box-shadow:3px 3px 0 var(--g2);overflow:hidden}
.row{display:flex;align-items:center;justify-content:space-between;padding:12px 15px;border-bottom:1.5px solid var(--g2);font-size:16px}.row:last-child{border:0}
.tgl{width:40px;height:22px;border:2px solid var(--ink);border-radius:999px;background:var(--white);position:relative}.tgl::after{content:"";position:absolute;top:1px;left:1px;width:16px;height:16px;border-radius:50%;background:var(--ink)}.tgl.on{background:var(--accent)}.tgl.on::after{left:auto;right:1px}
.val{font-family:"Inter",sans-serif;font-weight:500;color:var(--g5);font-size:14px}.chev{color:var(--g4)}
</style></head><body>
<div class="phone">
<div class="statusbar"><span>9:41</span><span>wifi · 84%</span></div>
<div class="topbar"><span class="back"><svg viewBox="0 0 24 24"><path d="M15 5l-7 7 7 7"/></svg></span><h1>Settings</h1></div>
<main>
<div class="lbl">NOTIFICATIONS</div>
<div class="grp"><div class="row">Push notifications<span class="tgl on"></span></div><div class="row">Email updates<span class="tgl"></span></div><div class="row">Event reminders<span class="tgl on"></span></div></div>
<div class="lbl">APPEARANCE</div>
<div class="grp"><div class="row">Theme<span class="val">Paper ›</span></div></div>
<div class="lbl">ACCOUNT</div>
<div class="grp"><div class="row">Privacy &amp; my data<span class="chev">›</span></div><div class="row">Blocked users<span class="chev">›</span></div><div class="row" style="color:var(--g5)">Sign out</div></div>
</main>
</div>
<svg width="0" height="0" style="position:absolute"><filter id="wobble-soft"><feTurbulence type="fractalNoise" baseFrequency=".012" numOctaves="3" result="n"/><feDisplacementMap id="__disp" in="SourceGraphic" in2="n" scale="2"/></filter></svg>
<script>addEventListener('message',function(e){var d=e.data||{},r=document.documentElement;if(d.__vars){for(var k in d.__vars)r.style.setProperty(k,d.__vars[k]);var s=document.getElementById('__acc');if(!s){s=document.createElement('style');s.id='__acc';document.head.appendChild(s)}s.textContent=""}if('__sketch' in d){var a=+d.__sketch||0,p=document.getElementById('__disp');if(p)p.setAttribute('scale',a);var ph=document.querySelector('.phone');if(ph)ph.style.filter=a>0?'url(#wobble-soft)':''}});</script>
</body></html>
