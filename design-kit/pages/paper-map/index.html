<!doctype html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Map (paper)</title><link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Inter:wght@500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--ink:#1B1B1B;--white:#fff;--g1:#EEEEEE;--g2:#D8D8D8;--g4:#929292;--g5:#696969;--accent:#37D4AD;--accent-light:#DAFCF3}
*{box-sizing:border-box}body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#d6d6d6;padding:24px;font-family:"Patrick Hand",ui-rounded,system-ui,sans-serif;color:var(--ink)}
.phone{width:384px;min-height:788px;overflow:hidden;display:flex;flex-direction:column;background:var(--white);border:3px solid var(--ink);border-radius:42px;position:relative}
.statusbar{display:flex;justify-content:space-between;padding:12px 22px 0;font-size:12.5px;color:var(--g5);font-family:"Inter",sans-serif;font-weight:500;position:relative;z-index:2}
.map{position:absolute;inset:0;background:var(--g1);background-image:repeating-linear-gradient(0deg,var(--g2) 0 1px,transparent 1px 40px),repeating-linear-gradient(90deg,var(--g2) 0 1px,transparent 1px 40px)}
.pin{position:absolute;width:30px;height:30px;border:2px solid var(--ink);border-radius:50% 50% 50% 0;transform:rotate(-45deg);background:var(--white);display:grid;place-items:center}
.pin.on{background:var(--accent)}.pin b{transform:rotate(45deg);font-size:12px}
.sheet{position:absolute;left:16px;right:16px;bottom:16px;z-index:2;background:var(--white);border:2px solid var(--ink);border-radius:16px;box-shadow:3px 3px 0 var(--g2);padding:13px 15px}
.tag{display:inline-block;font-size:12.5px;background:var(--g1);border:1.5px solid var(--ink);border-radius:999px;padding:1px 9px;margin-bottom:5px}
.sheet h3{font-size:19px;font-weight:400;margin:0 0 3px}.meta{color:var(--g5);font-size:14px;font-family:"Inter",sans-serif;font-weight:500;margin-bottom:9px}
.btn{font-size:15px;border:2px solid var(--ink);border-radius:10px;background:var(--accent);color:var(--ink);padding:6px 16px;box-shadow:2px 2px 0 var(--ink)}
</style></head><body>
<div class="phone">
<div class="map"></div>
<div class="statusbar"><span>9:41</span><span>wifi · 84%</span></div>
<div class="pin" style="top:180px;left:90px"><b>2</b></div>
<div class="pin on" style="top:300px;left:220px"><b>1</b></div>
<div class="pin" style="top:430px;left:120px"><b>5</b></div>
<div class="sheet">
<span class="tag">Tech &amp; coffee</span><h3>Coffee &amp; Code Meetup</h3><div class="meta">Tue 14 Jul · 18:30 · 0.4 mi away · 8 going</div>
<button class="btn">View event</button>
</div>
</div>
<svg width="0" height="0" style="position:absolute"><filter id="wobble-soft"><feTurbulence type="fractalNoise" baseFrequency=".012" numOctaves="3" result="n"/><feDisplacementMap id="__disp" in="SourceGraphic" in2="n" scale="2"/></filter></svg>
<script>addEventListener('message',function(e){var d=e.data||{},r=document.documentElement;if(d.__vars){for(var k in d.__vars)r.style.setProperty(k,d.__vars[k]);var s=document.getElementById('__acc');if(!s){s=document.createElement('style');s.id='__acc';document.head.appendChild(s)}s.textContent=d.__dark?".btn:not(.ghost):not(.soon):not(.done),.cbadge,.nbadge,.dot,.chip.pri,.seg span.on,.tier .flag{color:#fff!important}.send svg{stroke:#fff!important}":""}if('__sketch' in d){var a=+d.__sketch||0,p=document.getElementById('__disp');if(p)p.setAttribute('scale',a);var ph=document.querySelector('.sheet');if(ph)ph.style.filter=a>0?'url(#wobble-soft)':''}});</script>
</body></html>
