<!-- @dsCard group="App screens · paper" name="Dummy checkout (paper)" -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TeamMarhaba — Checkout (paper)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Inter:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root{--ink:#1B1B1B;--white:#FFFFFF;--g1:#EEEEEE;--g2:#D8D8D8;--g4:#929292;--g5:#696969;--accent:#37D4AD;--accent-light:#DAFCF3;}
    *{box-sizing:border-box;}
    body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#d6d6d6;padding:24px;font-family:"Patrick Hand",ui-rounded,system-ui,sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased;}
    .phone{width:384px;min-height:788px;position:relative;overflow:hidden;display:flex;flex-direction:column;background:var(--white);border:3px solid var(--ink);border-radius:42px;}
    .statusbar{display:flex;justify-content:space-between;padding:12px 22px 0;font-size:12.5px;color:var(--g5);font-family:"Inter",sans-serif;font-weight:500;}
    .topbar{display:flex;align-items:center;gap:10px;padding:8px 16px 8px;}
    .topbar .back{width:36px;height:36px;display:grid;place-items:center;border:2px solid var(--ink);border-radius:50%;background:var(--white);}
    .topbar .back svg{width:18px;height:18px;stroke:var(--ink);fill:none;stroke-width:2.2;}
    .topbar h1{font-size:24px;margin:0;flex:1;}
    main{padding:2px 16px 14px;flex:1;}
    .dummy{font-family:"Inter",sans-serif;font-weight:600;text-align:center;border:2px dashed var(--ink);border-radius:10px;padding:6px;margin:0 0 14px;font-size:12.5px;color:var(--g5);background:var(--g1);}
    .card{background:var(--white);border:2px solid var(--ink);border-radius:15px;box-shadow:3px 3px 0 var(--g2);padding:14px 16px;margin-bottom:14px;}
    .card h3{font-size:19px;font-weight:400;margin:0 0 8px;}
    .li{display:flex;justify-content:space-between;font-size:16px;margin:6px 0;}
    .li .muted{font-family:"Inter",sans-serif;font-weight:500;font-size:13px;color:var(--g5);}
    .li.total{font-size:20px;border-top:2px solid var(--g2);padding-top:8px;margin-top:8px;}
    .strike{text-decoration:line-through;color:var(--g4);}
    .free{color:var(--ink);}
    label{display:block;font-family:"Inter",sans-serif;font-weight:500;font-size:12.5px;color:var(--g5);margin:10px 0 4px;}
    .inp{border:2px solid var(--ink);border-radius:10px;padding:9px 12px;font-family:"Inter",sans-serif;font-size:15px;color:var(--g4);background:var(--white);}
    .field2{display:flex;gap:10px;}.field2>div{flex:1;}
    .btn{font-size:17px;border:2px solid var(--ink);border-radius:12px;background:var(--accent);color:var(--ink);padding:11px 18px;width:100%;margin-top:8px;box-shadow:2px 2px 0 var(--ink);}
  </style>
</head>
<body>
  <div class="phone">
    <div class="statusbar"><span>9:41</span><span>wifi · 84%</span></div>
    <div class="topbar"><span class="back"><svg viewBox="0 0 24 24"><path d="M15 5l-7 7 7 7"/></svg></span><h1>Checkout</h1></div>
    <main>
      <div class="dummy">Dummy checkout — no real payment is taken</div>
      <div class="card"><h3>Coffee &amp; Code Meetup</h3><div class="li"><span class="muted">Tue 14 Jul · 18:30</span></div><div class="li"><span>Event fee</span><span class="strike">£5.00</span></div><div class="li"><span>First event</span><span class="free">FREE</span></div><div class="li total"><span>Total</span><span>£0.00</span></div></div>
      <div class="card"><label>Card number</label><div class="inp">4242 4242 4242 4242</div><div class="field2"><div><label>Expiry</label><div class="inp">12 / 28</div></div><div><label>CVC</label><div class="inp">123</div></div></div><label>Name on card</label><div class="inp">B. Siddiqui</div></div>
      <button class="btn">Confirm &amp; join — free</button>
    </main>
  </div>
  <script>
  /* showcase.html accent picker: apply an accent posted from the parent to this screen's own :root
     (postMessage avoids the file:// cross-frame DOM block). */
  addEventListener('message', function(e){
    var d = e.data || {};
    if(!d || !d.__accent) return;
    var r = document.documentElement;
    r.style.setProperty('--accent', d.__accent);
    r.style.setProperty('--accent-light', d.__accentLight);
    var s = document.getElementById('__acc');
    if(!s){ s = document.createElement('style'); s.id = '__acc'; document.head.appendChild(s); }
    s.textContent = d.__dark
      ? ".btn:not(.ghost):not(.soon):not(.done){color:#fff!important}.cbadge,.nbadge,.dot,.chip.on,.chip.pri,.seg span.on,.tier .flag{color:#fff!important}.send svg{stroke:#fff!important}"
      : "";
  });
  </script>
  <svg width="0" height="0" style="position:absolute" aria-hidden="true"><filter id="wobble-soft"><feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="3" result="noise"/><feDisplacementMap id="__disp" in="SourceGraphic" in2="noise" scale="2"/></filter></svg>
  <script>
  /* sketchiness control from the showcase: __sketch = 0 (crisp) .. ~4 (very wavy) */
  addEventListener('message', function(e){
    var d = e.data || {};
    if(!('__sketch' in d)) return;
    var amt = +d.__sketch || 0;
    var disp = document.getElementById('__disp');
    if(disp) disp.setAttribute('scale', amt);
    var ph = document.querySelector('.phone');
    if(ph) ph.style.filter = amt > 0 ? 'url(#wobble-soft)' : '';
  });
  </script>
  <script>
  /* generic theme-token setter from the showcase (sets any CSS vars posted in __vars) */
  addEventListener('message', function(e){
    var d = e.data || {};
    if(!d.__vars) return;
    var r = document.documentElement;
    for(var k in d.__vars) r.style.setProperty(k, d.__vars[k]);
    var s = document.getElementById('__acc');
    if(!s){ s = document.createElement('style'); s.id='__acc'; document.head.appendChild(s); }
    s.textContent = d.__dark ? ".btn:not(.ghost):not(.soon):not(.done){color:#fff!important}.cbadge,.nbadge,.dot,.chip.on,.chip.pri,.seg span.on,.tier .flag{color:#fff!important}.send svg{stroke:#fff!important}" : "";
  });
  </script>
</body>
</html>
