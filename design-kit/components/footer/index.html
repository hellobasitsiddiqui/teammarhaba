<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1"><title>Footer</title>
<style>
  :root{--bg:#f1f1f1;--fg:#111;--muted:#666;--maxw:1080px}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--fg);background:#fff}
  footer{background:var(--bg);padding:56px 48px}
  .wrap{max-width:var(--maxw);margin:0 auto}
  .logo{font-weight:800;font-size:22px}
  .cols{display:grid;grid-template-columns:1.4fr repeat(4,1fr);gap:24px}
  .cols h4{margin:0 0 14px;font-size:15px}
  .cols a{display:block;color:var(--fg);text-decoration:none;font-size:14px;line-height:2.2}
  .fine{color:var(--muted);font-size:13px;line-height:1.9}
  .center{text-align:center}
  .navrow{display:flex;align-items:center;justify-content:center;gap:34px;font-weight:600}
  .navrow a{color:var(--fg);text-decoration:none}
  hr{border:0;border-top:1px solid #111;margin:26px 0}
  .socials{display:flex;justify-content:center;gap:18px;margin:22px 0}
  .socials i{width:44px;height:44px;border:1.5px solid #111;border-radius:50%;display:block}
  @media(max-width:760px){.cols{grid-template-columns:1fr 1fr}}
</style></head>
<body>
  <!-- columns footer -->
  <footer><div class="wrap cols">
    <div><div class="logo">TRADE</div><div class="fine" style="margin-top:14px">&copy; 2010 &mdash; 2020<br>Privacy &mdash; Terms</div></div>
    <div><h4>Product</h4><a>Product</a><a>Product</a><a>Product</a></div>
    <div><h4>Features</h4><a>Feature</a><a>Feature</a><a>Feature</a></div>
    <div><h4>Resources</h4><a>Resource</a><a>Resource</a><a>Resource</a></div>
    <div><h4>Company</h4><a>Company</a><a>Company</a><a>Company</a></div>
  </div></footer>

  <!-- centered social footer -->
  <footer><div class="wrap center">
    <div class="navrow"><a>Product</a><a>Features</a><a>Resources</a><span class="logo">TRADE</span><a>About</a><a>Blog</a><a>Support</a></div>
    <hr>
    <div class="socials"><i></i><i></i><i></i><i></i><i></i></div>
    <div class="fine">&copy; 2010 &mdash; 2020 &nbsp; Privacy &mdash; Terms</div>
  </div></footer>
</body></html>
