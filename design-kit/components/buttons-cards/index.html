<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Buttons & Cards</title>
<style>
  :root{--bg:#f1f1f1;--fg:#111;--muted:#8a8a8a;--surface:#fff;--line:#111;--border:#d9d9d9;--r:8px}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--fg);background:#fff;padding:40px}
  h2.sec{font-size:13px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin:0 0 16px}
  .btn{display:inline-flex;align-items:center;justify-content:center;padding:15px 30px;border-radius:var(--r);font-size:15px;font-weight:600;border:1.5px solid var(--line);cursor:pointer;text-decoration:none}
  .btn--primary{background:var(--fg);color:#fff;border-color:var(--fg)}
  .btn--secondary{background:transparent;color:var(--fg)}
  .row{display:flex;gap:20px;flex-wrap:wrap;align-items:center;margin-bottom:44px}
  .cards{display:grid;grid-template-columns:repeat(3,1fr);gap:28px}
  .card-media{background:var(--surface);border-radius:6px;overflow:hidden;box-shadow:0 1px 2px rgba(0,0,0,.06)}
  .card-media .img{background:#111;aspect-ratio:1/1;display:grid;place-items:center}
  .card-media .img span{width:64px;height:64px;background:#fff;border-radius:10px}
  .card-media .body{padding:22px}
  .card-media h3{margin:0 0 26px;font-size:20px}
  .card-media a{color:var(--fg);text-decoration:none;font-size:14px}
  .card-price{border:1.5px solid var(--border);border-radius:8px;background:var(--surface);padding:28px;text-align:center}
  .card-price .avatar{width:64px;height:64px;border-radius:50%;background:#111;margin:0 auto 14px}
  .card-price h3{margin:0;font-size:20px}
  .card-price .sub{color:var(--fg);font-size:14px;margin:2px 0 22px}
  .card-price ul{list-style:none;padding:0;margin:0 0 26px;color:var(--muted);font-size:14px;line-height:2.4}
  .card-imgtext .img{background:#111;aspect-ratio:16/11;border-radius:2px}
  .card-imgtext h3{font-size:24px;line-height:1.3;margin:20px 0 12px}
  .card-imgtext a{color:var(--fg);text-decoration:none;font-size:14px}
  @media(max-width:760px){.cards{grid-template-columns:1fr}}
</style></head>
<body>
  <h2 class="sec">Buttons</h2>
  <div class="row">
    <a class="btn btn--primary">See More</a>
    <a class="btn btn--secondary">See More</a>
  </div>

  <h2 class="sec">Cards</h2>
  <div class="cards">
    <article class="card-media">
      <div class="img"><span></span></div>
      <div class="body"><h3>Special Feature</h3><a>See More &rsaquo;</a></div>
    </article>
    <article class="card-price">
      <div class="avatar"></div>
      <h3>Title</h3><div class="sub">Subtitle</div>
      <ul><li>Feature 1</li><li>Feature 2</li><li>Feature 3</li></ul>
      <a class="btn btn--secondary" style="width:100%">Start Now</a>
    </article>
    <article class="card-imgtext">
      <div class="img"></div>
      <h3>Lorem ipsum dolor sit amet, consectetur adipiscing elit</h3>
      <a>Learn More</a>
    </article>
  </div>
</body></html>
