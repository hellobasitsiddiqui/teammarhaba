<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1"><title>Navigation</title>
<style>
  :root{--bg:#f1f1f1;--fg:#111;--line:#111;--r:8px}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--fg);background:#fff}
  .nav{display:flex;align-items:center;gap:32px;padding:20px 40px;background:#fff;border-bottom:8px solid var(--bg)}
  .logo{font-weight:800;font-size:22px;letter-spacing:.02em}
  .links{display:flex;gap:34px;font-size:15px}
  .links a{color:var(--fg);text-decoration:none}
  .spacer{flex:1}
  .btn{padding:12px 22px;border-radius:var(--r);border:1.5px solid var(--line);font-size:14px;font-weight:600;text-decoration:none;color:var(--fg)}
  .btn--primary{background:var(--fg);color:#fff}
  .center{justify-content:center}
</style></head>
<body>
  <!-- logo · centered links · Sign Up -->
  <nav class="nav">
    <div class="logo">TRADE</div>
    <div class="spacer"></div>
    <div class="links"><a>Link 1</a><a>Link 2</a><a>Link 3</a><a>Link 4</a></div>
    <div class="spacer"></div>
    <a class="btn">Sign Up</a>
  </nav>

  <!-- logo · right links · Sign Up -->
  <nav class="nav">
    <div class="logo">TRADE</div>
    <div class="spacer"></div>
    <div class="links"><a>Link 1</a><a>Link 2</a><a>Link 3</a><a>Link 4</a></div>
    <a class="btn">Sign Up</a>
  </nav>

  <!-- logo · links · utility · primary Sign Up -->
  <nav class="nav">
    <div class="logo">TRADE</div>
    <div class="links"><a>Link 1</a><a>Link 2</a><a>Link 3</a><a>Link 4</a></div>
    <div class="spacer"></div>
    <div class="links"><a>API</a><a>Help</a><a>Login</a></div>
    <a class="btn btn--primary">Sign Up</a>
  </nav>

  <!-- links · centered logo · Free Trial -->
  <nav class="nav">
    <div class="links"><a>Link 1</a><a>Link 2</a><a>Link 3</a><a>Link 4</a></div>
    <div class="spacer"></div>
    <div class="logo">TRADE</div>
    <div class="spacer"></div>
    <a class="btn btn--primary">Free Trial</a>
  </nav>
</body></html>
