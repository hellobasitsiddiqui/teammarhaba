<?xml version="1.0" encoding="UTF-8"?>
<!-- Circle app mark (TM-383): white hollow ring on a full-bleed brand-teal tile.
     App/launcher + iOS AppIcon variant. Teal (#0f9d8c) matches the native splash
     backgroundColor in capacitor.config.json so icon -> splash is seamless.
     Shared source; same ring geometry as ring-teal.svg. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <rect x="0" y="0" width="100" height="100" fill="#0f9d8c" />
  <circle cx="50" cy="50" r="32"
          fill="none"
          stroke="#ffffff" stroke-width="6.5"
          stroke-linecap="round" stroke-linejoin="round" />
</svg>
