apply plugin: 'com.android.application'
apply plugin: 'org.jetbrains.kotlin.android'

// ---- App version --------------------------------------------------------------------------------
// versionName is the human-readable app version, compared by the auto-update check against the
// hosted web `buildVersion`. OVERRIDABLE at build time so the release CI (android-release.yml) can
// STAMP the APK's versionName to match the web buildVersion it was cut from, and bump versionCode
// (monotonic int) so Android treats a new sideloaded APK as an upgrade. Falls back to committed
// defaults for a plain local `assembleDebug` (no -P needed). Ported from the TM-231 shell so the
// existing release workflow's `-PtmVersionName`/`-PtmVersionCode` contract keeps working.
def tmVersionName = (project.findProperty('tmVersionName') ?: '').toString().trim()
if (tmVersionName.isEmpty()) { tmVersionName = '1.0.0' }
def tmVersionCodeProp = (project.findProperty('tmVersionCode') ?: '').toString().trim()
def tmVersionCode = tmVersionCodeProp.isInteger() ? tmVersionCodeProp.toInteger() : 1

// The hosted web origin the WebView loads (kept consistent with capacitor.config.json server.url).
def tmAppUrl = 'https://teammarhaba.web.app'

android {
    namespace = "app.teammarhaba.webview"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "app.teammarhaba.webview"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode tmVersionCode
        versionName tmVersionName
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
        // Surfaced to Kotlin via BuildConfig so the shell never hardcodes the URL inline.
        buildConfigField "String", "APP_URL", "\"${tmAppUrl}\""
    }

    // ---- Signing ---------------------------------------------------------------------------------
    // Release signing reads the keystore + passwords from Gradle properties OR plain env vars
    // (ANDROID_KEYSTORE_PATH / ANDROID_KEYSTORE_PASSWORD / ANDROID_KEY_ALIAS / ANDROID_KEY_PASSWORD) —
    // NEVER committed (see loadReleaseSigningProps below + android/README "Signing & release"). If
    // nothing is configured (a plain dev checkout with zero secrets), the `release` build type falls
    // back to the auto-generated debug keystore (below), so `assembleRelease` still produces an
    // INSTALLABLE APK for local testing. The release CI (TM-287/android-release.yml) requires the real
    // secrets and fails loud without them, so a debug-signed APK is never shipped as a real release.
    def keystoreProps = loadReleaseSigningProps()
    signingConfigs {
        if (keystoreProps != null) {
            release {
                storeFile file(keystoreProps.getProperty('storeFile'))
                storePassword keystoreProps.getProperty('storePassword')
                keyAlias keystoreProps.getProperty('keyAlias')
                keyPassword keystoreProps.getProperty('keyPassword')
            }
        }
    }

    buildTypes {
        debug {
            applicationIdSuffix ".debug"
            minifyEnabled false
            // Debug builds are signed with the auto-generated Android debug keystore — no secrets.
        }
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            // Signing precedence (TM-286):
            //   1. The real `release` config when its keystore props/env were supplied (CI + local
            //      release builds) — produces the properly-signed, distributable APK.
            //   2. SAFE FALLBACK to the auto-generated `debug` keystore when NO secrets are present
            //      (a plain dev checkout) — so `assembleRelease` still yields an INSTALLABLE APK for
            //      local testing instead of a non-installable unsigned one. This is dev-only; the CI
            //      release job (TM-287/android-release.yml) fails loud if the real secrets are absent,
            //      so a debug-signed APK can never be shipped as a real release.
            signingConfig signingConfigs.findByName('release') ?: signingConfigs.getByName('debug')
        }
    }

    buildFeatures {
        buildConfig = true
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}

/**
 * Load the release signing properties WITHOUT ever committing them. Sources are tried in order; the
 * first that supplies a keystore path wins:
 *   1. -P Gradle properties (or ~/.gradle/gradle.properties / ORG_GRADLE_PROJECT_* env), keyed
 *      `teammarhaba.releaseStoreFile` / `…StorePassword` / `…KeyAlias` / `…KeyPassword`. This is the
 *      contract the release CI (TM-287/android-release.yml) already feeds via ORG_GRADLE_PROJECT_*.
 *   2. Plain ENVIRONMENT VARIABLES (TM-286): `ANDROID_KEYSTORE_PATH` / `ANDROID_KEYSTORE_PASSWORD` /
 *      `ANDROID_KEY_ALIAS` / `ANDROID_KEY_PASSWORD`. Lets any CI / local shell that exports the
 *      keystore path + passwords sign without learning Gradle's ORG_GRADLE_PROJECT_* prefix.
 *   3. A `keystore.properties` file next to this module (gitignored) for local convenience.
 * Returns null when nothing is configured, so debug builds and secret-free checkouts still work
 * (the release build type then falls back to debug signing — see the `release` buildType above).
 */
def loadReleaseSigningProps() {
    def prop = { String name ->
        def v = project.findProperty(name)
        (v != null && !v.toString().trim().isEmpty()) ? v.toString() : null
    }
    def env = { String name ->
        def v = System.getenv(name)
        (v != null && !v.trim().isEmpty()) ? v : null
    }

    // 1. Gradle-property contract (CI passes these via ORG_GRADLE_PROJECT_*; or -P / ~/.gradle).
    def storeFileProp = prop('teammarhaba.releaseStoreFile')
    if (storeFileProp != null) {
        def p = new Properties()
        p.setProperty('storeFile', storeFileProp)
        p.setProperty('storePassword', prop('teammarhaba.releaseStorePassword') ?: '')
        p.setProperty('keyAlias', prop('teammarhaba.releaseKeyAlias') ?: '')
        p.setProperty('keyPassword', prop('teammarhaba.releaseKeyPassword') ?: '')
        return p
    }

    // 2. Plain environment variables (TM-286 named contract).
    def envStoreFile = env('ANDROID_KEYSTORE_PATH')
    if (envStoreFile != null) {
        def p = new Properties()
        p.setProperty('storeFile', envStoreFile)
        p.setProperty('storePassword', env('ANDROID_KEYSTORE_PASSWORD') ?: '')
        p.setProperty('keyAlias', env('ANDROID_KEY_ALIAS') ?: '')
        // Key password defaults to the store password when unset (common single-password keystores).
        p.setProperty('keyPassword', env('ANDROID_KEY_PASSWORD') ?: env('ANDROID_KEYSTORE_PASSWORD') ?: '')
        return p
    }

    // 3. Local gitignored keystore.properties for convenience.
    def localFile = rootProject.file('app/keystore.properties')
    if (localFile.exists()) {
        def p = new Properties()
        localFile.withInputStream { p.load(it) }
        return p
    }
    return null
}
