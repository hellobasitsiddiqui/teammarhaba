# TM-314 — Warm restart / session persistence (Maestro)
#
# Verifies a signed-in session survives an app relaunch: sign in, relaunch WITHOUT clearing state,
# and confirm the app lands back on the signed-in home (no re-login). This exercises the WebView-safe
# persistence fallback chain (localStorage → IndexedDB → in-memory) wired in auth.js (TM-307).
#
# Note on persistence: if the WebView falls all the way back to in-memory persistence (a locked-down
# WebView), the session will NOT survive a relaunch by design — see auth.js TM-307. On a normal
# emulator/device the localStorage backend is used and the session persists, which is what this flow
# asserts. If you see this flow fail on a constrained device, check the persistence backend in the
# WebView console rather than treating it as a regression.
#
# Reuses login-sms.yaml as a subflow to establish the session (it relies on the same e2e-flag
# pre-injection contract — see login-sms.yaml / README).
appId: app.teammarhaba.webview
---
# 1. Establish a signed-in session via the SMS happy path (clears state + signs in).
- runFlow: login-sms.yaml
- assertVisible:
    id: "signout-btn"
- takeScreenshot: 01-signed-in-before-restart

# 2. Relaunch WITHOUT clearing state — simulates the user re-opening the app.
- launchApp:
    clearState: false
- takeScreenshot: 02-after-relaunch

# 3. End state: still signed in — the signed-in panel is shown and the signed-out form never reappears.
#    No email/SMS step is presented; the session was restored from persistence.
- assertVisible:
    id: "signout-btn"
- assertVisible:
    text: ".*You are signed in as.*"
- assertNotVisible:
    id: "auth-signed-out"
- takeScreenshot: 03-home-after-warm-restart
