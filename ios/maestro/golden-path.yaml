# TM-354 — Golden-path smoke (Maestro, iOS Simulator)
#
# The iOS-Simulator run of the shared golden journey (mirrors web/e2e/tests/golden-path.spec.mjs):
#   sign in → [onboarding] → [terms] → profile → avatar (GALLERY) → home → help/visual-guide → sign out
# on the SAME native Capacitor WebView app loading the SAME hosted SPA. This is the iOS automated-test
# gate: living, screenshotted evidence the iOS shell loads the SPA and the core journey works on the
# Simulator (within Simulator limits).
#
# ── Auth: SMS test number (not the web spec's fresh email-code) ────────────────────────────────────
# The web golden-path signs in a FRESH email-code address so it always hits both first-run gates. On
# the Simulator we sign in via Firebase's fixed TEST PHONE NUMBER (+16505550100 / 123456, TM-241) — the
# carrier-independent path that needs no real SMS — reusing login-sms.yaml, which carries the iOS
# reCAPTCHA-bypass launch-arg injection (see that file / the README). Because that number is a REUSED
# account, it may already be onboarded + terms-accepted from a prior run, so the ONBOARDING and TERMS
# steps below are GUARDED (`runFlow: when: visible`): they complete the gate when it fires (fresh
# account) and are skipped when it doesn't (already-onboarded) — landing on #/home either way. This is
# the honest posture for a shared test account; the web spec's fresh-user guarantee doesn't hold here.
#
# ── Avatar: GALLERY path (camera capture is NOT testable on the Simulator) ─────────────────────────
# The Simulator has no camera, so we exercise the "Choose from gallery" branch of the native picker
# (native-camera.js Camera.getPhoto source PROMPT, promptLabelPhoto "Choose from gallery"). We drive to
# the avatar control (profile-avatar-camera) and open the picker; picking a real gallery image
# end-to-end from a system sheet is non-deterministic on a headless Simulator, so the gallery-selection
# tail is best-effort/guarded (matching android/maestro/camera.yaml's posture) — we never assert a
# completed capture. A seeded photo is added to the Simulator library by ci-run.sh (simctl addmedia)
# so the library is non-empty when the picker opens.
appId: app.teammarhaba.webview
---
# ── STEP 1: sign in via the SMS test-number happy path (reuses login-sms.yaml, which passes the iOS
#    e2e-flag launch argument on its launchApp so reCAPTCHA is bypassed). Lands signed-in on #/home. ─
- runFlow: login-sms.yaml
- assertVisible:
    id: "auth-signed-in"
- takeScreenshot: 01-signed-in

# ── STEP 2: first-login ONBOARDING gate (TM-250) — GUARDED. Fires only for a not-yet-onboarded
#    account; complete it if present, otherwise skip (reused test number is likely already onboarded). ─
- runFlow:
    when:
      visible:
        id: "onboarding-view"
    commands:
      - assertVisible:
          id: "onboarding-form"
      - takeScreenshot: 02-onboarding-gate
      - tapOn:
          id: "onboarding-name"
      - inputText: "Golden Tester"
      - tapOn:
          id: "onboarding-location"
      - inputText: "Goldenville"
      - tapOn:
          id: "onboarding-age"
      - inputText: "29"
      - hideKeyboard
      - tapOn: "Continue"   # onboarding-form submit; label is best-effort within the guarded block

# ── STEP 3: TERMS gate (TM-170) — GUARDED, same rationale. terms-accept enables once the version
#    loads (async from /me); accept it if the gate is shown. ────────────────────────────────────────
- runFlow:
    when:
      visible:
        id: "terms-view"
    commands:
      - assertVisible:
          id: "terms-version"
      - takeScreenshot: 03-terms-gate
      - tapOn:
          id: "terms-accept"

# Both gates cleared (or skipped) → we're in the app on the signed-in home.
- assertVisible:
    id: "auth-signed-in"
- assertNotVisible:
    id: "auth-signed-out"
- takeScreenshot: 04-entered-app

# ── STEP 4: edit PROFILE (TM-167) — open profile, change the city, save, assert the success toast. ──
# Open the account nav (collapsed behind the hamburger at phone width) then the profile link.
- tapOn:
    id: "nav-toggle"
    optional: true   # no-op / already open on some widths
- tapOn:
    id: "nav-profile"
- assertVisible:
    id: "profile-form"
- takeScreenshot: 05-profile
- tapOn:
    id: "profile-city"
- inputText: "Golden-City"
- hideKeyboard
- tapOn:
    text: "Save changes"
# The success toast follows an async PUT /profile and auto-dismisses, so wait for it with an extended
# timeout (backend round-trip is slower on the Simulator) rather than racing the default 7s window.
- extendedWaitUntil:
    visible:
      text: ".*Profile saved.*"
    timeout: 30000
- takeScreenshot: 06-profile-saved

# ── STEP 5: AVATAR via the GALLERY path (TM-166) — open the native picker and choose "from gallery".
#    Camera capture is OUT of Simulator scope; we assert the picker opens, not a completed capture. ──
- tapOn:
    id: "profile-avatar-camera"   # "Take or choose photo"
- takeScreenshot: 07-avatar-picker-opening
# The OS action sheet offers "Choose from gallery" (promptLabelPhoto) vs "Take a photo". Pick gallery.
# Best-effort: the exact sheet chrome is system/locale-dependent, so guard it and never hard-fail here.
- tapOn:
    text: ".*(Choose from gallery|Photo Library|Photos|Choose Photo).*"
    optional: true
- takeScreenshot: 08-gallery-open
# If a gallery grid appears, tapping the first cell selects the seeded image; both are best-effort
# because a headless Simulator's Photos UI is non-deterministic. We do NOT assert the avatar updated —
# a completed pick from a system sheet isn't reliable here (see the header note).
- tapOn:
    point: "50%,45%"
    optional: true
- takeScreenshot: 09-gallery-picked
# Return to a known state whether or not the pick completed (dismiss any lingering sheet/grid).
- tapOn:
    text: ".*(Cancel|Done|Back).*"
    optional: true

# ── STEP 6: browse HOME. There's no "Home" nav link — home is #/home (the signed-in landing). Ensure
#    we're back on it and the signed-in home is shown. ─────────────────────────────────────────────
- assertVisible:
    id: "auth-signed-in"
- takeScreenshot: 10-home

# ── STEP 7: open HELP + the annotated VISUAL guide (TM-255 / TM-178). ──────────────────────────────
- tapOn:
    id: "nav-toggle"
    optional: true
- tapOn:
    id: "nav-help-link"
- assertVisible:
    id: "help-view"
- assertVisible:
    text: "Visual guide"
- takeScreenshot: 11-help-visual-guide

# ── STEP 8: SIGN OUT. On the public #/help route, sign-out doesn't force a route change (matches the
#    web spec) — assert the signed-out state via the nav returning the sign-in control. ─────────────
- tapOn:
    id: "nav-toggle"
    optional: true
- tapOn:
    id: "signout-btn"
# signOut() is async (Firebase) → router re-renders the nav; wait for the sign-in control to return
# with an extended timeout rather than the default 7s so the core sign-out step passes reliably.
- extendedWaitUntil:
    visible:
      id: "nav-signin"
    timeout: 30000
- assertNotVisible:
    id: "auth-signed-in"
- takeScreenshot: 12-signed-out
