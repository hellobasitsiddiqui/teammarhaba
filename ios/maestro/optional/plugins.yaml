# TM-354 — Per-plugin Simulator smokes (Maestro, iOS Simulator, best-effort/guarded) — NON-GATING
#
# This flow lives under ios/maestro/optional/, which ci-run.sh runs BEST-EFFORT: its pass/fail never
# affects the lane's green/red. The GATE is ../golden-path.yaml (launch + WKWebView render). It also
# reuses ./login-sms.yaml, whose "Try another way" reveal Maestro-on-iOS can't reliably drive on the
# Simulator — another reason this is non-gating. See ../README.md ("Scope & Simulator limitation").
#
# Exercises the native plugins against #/diagnostics + #/profile on the Simulator, mirroring the
# best-effort posture of android/maestro/{permissions,camera,biometric}.yaml. Every Simulator-degraded
# step is guarded (`optional: true` / `runFlow: when: visible`) so a Simulator limitation is never a
# hard fail (AC5) — the harness (ci-run.sh) primes the Simulator state (location fix, seeded media,
# Face-ID enrolment where the runtime supports it) before this flow runs.
#
# IN SCOPE (Simulator):
#   • Geolocation — set a Simulator location (ci-run.sh: `xcrun simctl location set`), open
#     #/diagnostics, tap "Get my location", expect the coords readout (Latitude row) — diagnostics.js
#     renders Latitude/Longitude on status "ok".
#   • Face ID app-lock — toggle "Require fingerprint to open the app" (id=biometric-app-lock) in the
#     profile Security section; enabling raises the biometric prompt. Match (Features>Face ID>Matching)
#     → success; the enrol/match itself is Simulator-UI-driven and not scriptable headlessly, so the
#     prompt-outcome steps are best-effort.
#   • App-lock resume — background + foreground (ci-run.sh sends the app to background between flows;
#     within a flow we can't reliably home-out on a headless Simulator) re-locks via
#     biometric-lock.js appStateChange; asserted best-effort.
#
# OUT OF SCOPE (explicitly, per the ticket): live CAMERA capture (no Simulator camera) and real-APNs
# delivery. The push DEEP-LINK is exercised via `xcrun simctl push` in ci-run.sh (local payload, not a
# real APNs round-trip); this flow asserts the resulting in-app navigation best-effort.
#
# Requires a signed-in session (reuses login-sms.yaml, which carries the iOS e2e-flag launch arg).
appId: app.teammarhaba.webview
---
# 1. Sign in, then open the profile page (where the Diagnostics link + Security section live).
- runFlow: login-sms.yaml
- assertVisible:
    id: "auth-signed-in"
- takeScreenshot: 01-signed-in
- tapOn:
    id: "nav-toggle"
    optional: true
- tapOn:
    id: "nav-profile"
- assertVisible:
    id: "profile-form"
- takeScreenshot: 02-profile

# 2. GEOLOCATION — follow the QA "Diagnostics" link (profile.js href=#/diagnostics), request a fix,
#    expect the coords readout. The fix is served from the Simulator location ci-run.sh set; if the
#    runtime returns no location, the readout shows a status instead — guarded so it never hard-fails.
- tapOn:
    text: "Diagnostics"
    optional: true
- assertVisible:
    id: "diagnostics-view"
    optional: true
- takeScreenshot: 03-diagnostics
- tapOn:
    text: "Get my location"
    optional: true
# On a served fix, diagnostics.js renders a "Latitude" row (status "ok"). Best-effort: absent if the
# Simulator returned no location this run.
- assertVisible:
    text: ".*Latitude.*"
    optional: true
- takeScreenshot: 04-location-result

# 3. FACE ID app-lock — back to profile, reveal the Security section, flip the app-lock switch ON. This
#    raises the biometric prompt; a Matching enrolment succeeds, Non-matching fails gracefully. The
#    enrol/match is Simulator-UI-driven (Features>Face ID), not scriptable headlessly, so every step
#    here is best-effort and never hard-fails on the Simulator's biometric limits.
- tapOn:
    id: "nav-toggle"
    optional: true
- tapOn:
    id: "nav-profile"
    optional: true
- assertVisible:
    id: "security-settings"
    optional: true
- assertVisible:
    text: ".*Require fingerprint.*"
    optional: true
- takeScreenshot: 05-security-section
- tapOn:
    id: "biometric-app-lock"
    optional: true
- takeScreenshot: 06-app-lock-toggled
# The biometric system prompt / lock overlay is Simulator-degraded; assert loosely and move on.
- assertVisible:
    text: ".*(Face ID|fingerprint|PIN|Cancel|Verify|Confirm).*"
    optional: true
- takeScreenshot: 07-biometric-prompt

# 4. PUSH DEEP-LINK — ci-run.sh delivers a local `simctl push` with route /profile just before this
#    step's screenshot window (best-effort; a headless Simulator's notification handling is
#    non-deterministic). We assert the resulting in-app navigation loosely; real-APNs is OUT of scope.
- assertVisible:
    text: ".*(Profile|profile).*"
    optional: true
- takeScreenshot: 08-after-push-deeplink
