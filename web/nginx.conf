# nginx server config for the TeamMarhaba static web surface.
# Copied into the runtime image at /etc/nginx/conf.d/default.conf.
server {
    # Container port. Cloud Run / most platforms default to 8080.
    listen       8080;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # SPA routing: serve real files when present, otherwise fall back to
    # index.html so client-side routes survive a hard refresh / deep link.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Fingerprinted static assets can be cached aggressively.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # The HTML entrypoint must never be cached, so new deploys take effect.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Basic hardening: don't leak the nginx version.
    server_tokens off;
}
