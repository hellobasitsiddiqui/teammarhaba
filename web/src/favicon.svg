<?xml version="1.0" encoding="UTF-8"?>
<!-- Circle app favicon (TM-383): hollow brand-teal ring, transparent background, so it
     reads on both light and dark browser tabs. Served at /favicon.svg from web/dist
     (deploy copies web/src -> web/dist verbatim; this lives OUTSIDE /assets/ so the
     fingerprinter, which only hashes /assets/*.{js,css}, leaves its URL stable).
     Source of truth is resources/icon/ring-teal.svg — regenerate via scripts/gen-icon.sh. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <circle cx="50" cy="50" r="32"
          fill="none"
          stroke="#0f9d8c" stroke-width="6.5"
          stroke-linecap="round" stroke-linejoin="round" />
</svg>
