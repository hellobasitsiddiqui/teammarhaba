<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TeamMarhaba</title>
    <!-- Hand-lettered fonts for the "doodle" theme family (TM-213). Loaded for every page but only
         referenced under [data-theme="doodle"] (see styles.css); other themes never use them, so
         this is inert for "clean". If the request fails the doodle skin degrades to the system font
         stack declared in --font-sans. preconnect warms the Google Fonts hosts. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Gochi+Hand&family=Patrick+Hand&family=Shadows+Into+Light&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/assets/styles.css" />
</head>
<body>
    <!-- Hidden inline SVG defs for the doodle theme's "wobble" skin (TM-213). These feTurbulence +
         feDisplacementMap filters make straight CSS edges look hand-drawn; styles.css applies them
         via filter:url(#wobble…) only under [data-theme="doodle"], to decorative chrome (cards,
         inputs, buttons, dividers) — never to text — and drops them under prefers-reduced-motion.
         Inert for every other theme. aria-hidden + zero box so it never affects layout or a11y. -->
    <svg width="0" height="0" style="position:absolute" aria-hidden="true" focusable="false">
        <filter id="wobble">
            <feTurbulence type="fractalNoise" baseFrequency="0.013" numOctaves="3" result="noise" />
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="4.5" />
        </filter>
        <filter id="wobble-soft">
            <feTurbulence type="fractalNoise" baseFrequency="0.013" numOctaves="3" result="noise" />
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.5" />
        </filter>
    </svg>

    <main class="app">
        <h1>TeamMarhaba</h1>
        <p class="tagline">Walking skeleton — web surface.</p>
        <p id="status" class="status">loading…</p>

        <!-- Account nav (TM-109): router.js reflects auth state — sign-in link vs sign-out. -->
        <nav class="app-nav" aria-label="Account">
            <a id="nav-signin" href="#/login" hidden>Sign in</a>
            <!-- Edit-profile link (TM-167): shown by router.js for any signed-in user. -->
            <a id="nav-profile" href="#/profile" hidden>Profile</a>
            <!-- Admin console link (TM-133): shown by router.js only for a signed-in ADMIN. -->
            <a id="nav-admin" href="#/admin" hidden>Admin</a>
            <!-- Help / replay tours (TM-135): tours.js shows this when signed in + opens a menu
                 to re-run the whole-site walkthrough or the current page's tour. -->
            <button id="nav-help" type="button" hidden>Help</button>
            <!-- Avatar (TM-166): nav-avatar.js paints the signed-in user's Firebase photoURL here. -->
            <span id="nav-avatar" class="tm-nav-avatar" hidden></span>
            <button id="signout-btn" type="button" hidden>Sign out</button>
        </nav>

        <!-- Auth views (TM-106 panels, routed by TM-109): #auth-signed-out = #/login,
             #auth-signed-in = #/home. router.js owns their visibility. -->
        <section class="auth" aria-label="Account">
            <form class="auth-card" id="auth-signed-out" novalidate>
                <h2>Sign in</h2>
                <label class="field">
                    <span>Email</span>
                    <input id="email" type="email" autocomplete="email" required />
                </label>
                <label class="field">
                    <span>Password</span>
                    <input id="password" type="password" autocomplete="current-password" required minlength="6" />
                </label>
                <p id="auth-error" class="auth-error" role="alert" hidden></p>
                <div class="auth-actions">
                    <button id="signin-btn" type="submit" form="auth-signed-out">Sign in</button>
                    <button id="signup-btn" type="button" class="secondary">Sign up</button>
                </div>
                <button id="google-btn" type="button" class="google">Continue with Google</button>
            </form>

            <div class="auth-card" id="auth-signed-in" hidden>
                <h2>Signed in</h2>
                <p>You are signed in as <strong id="user-email"></strong>.</p>
                <!-- Backend-verified identity from GET /api/v1/me via the authenticated API client (TM-108). -->
                <p id="me" class="status"></p>
                <!-- Admins reach the users console here (router shows the link only for ADMINs). -->
                <p class="home-links"><a href="#/admin" id="home-admin-link" hidden>Open the admin users console →</a></p>
            </div>
        </section>

        <!-- Admin users console (TM-133): ADMIN-only #/admin view. admin.js (imported by router.js)
             builds the table/filters/actions into this container; router.js owns its visibility. -->
        <section id="admin-view" class="admin-console" aria-label="Admin users console" hidden></section>

        <!-- Edit-profile view (TM-167): self-service #/profile view for any signed-in user. profile.js
             (imported by router.js) builds the edit form into this container; router.js owns visibility. -->
        <section id="profile-view" class="profile-view" aria-label="Edit profile" hidden></section>

        <!-- Build/version stamp (TM-142): build-info.js fills this with the web build SHA + the
             backend's /version, so you can see which build is live (and spot a stale surface). -->
        <footer class="app-footer">
            <span id="build-info" class="build-info" aria-label="Build version"></span>
        </footer>
    </main>
    <script src="/assets/config.js"></script>
    <!-- Theme system core (TM-210). Classic script, runs right after config.js + before paint:
         reads window.TEAMMARHABA_CONFIG.theme and sets data-theme on <html> (default/fallback
         "clean"). Picks the visual family; the dark/light axis (TM-133) still follows the OS. -->
    <script src="/assets/theme.js"></script>
    <!-- Build/version stamp (TM-142). Classic script: reads config.js + fetches the backend /version. -->
    <script src="/assets/build-info.js"></script>
    <!-- Firebase Auth bootstrap (TM-105). ES module: initialises Firebase + exposes window.tmAuth. -->
    <script type="module" src="/assets/auth.js"></script>
    <!-- Auth UI controller (TM-106). -->
    <script type="module" src="/assets/login.js"></script>
    <script src="/assets/app.js"></script>
    <!-- Authenticated API client demo (TM-108): calls GET /api/v1/me and renders the
         verified caller into #me. api.js attaches the Bearer token to every API call. -->
    <script type="module" src="/assets/me.js"></script>
    <!-- Client auth guard + hash router (TM-109): gates #/home behind sign-in, redirects
         signed-out users to #/login and returns them after sign-in, drives the nav. -->
    <script type="module" src="/assets/router.js"></script>
    <!-- Nav avatar (TM-166): paints the signed-in user's Firebase photoURL into #nav-avatar. -->
    <script type="module" src="/assets/nav-avatar.js"></script>
    <!-- Onboarding product tour (TM-135): auto-runs the whole-site walkthrough on first login and
         each page's tour on first visit; replayable from the Help menu. -->
    <script type="module" src="/assets/tours.js"></script>
    <!-- Doodle decoration for the static panels (TM-215): mounts a few tasteful TM-214 doodles into
         the landing/login/home headers + dividers. Visual only; CSS gates them to the doodle theme. -->
    <script type="module" src="/assets/doodle-decor.js"></script>
</body>
</html>
