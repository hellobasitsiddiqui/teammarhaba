<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TeamMarhaba</title>
    <link rel="stylesheet" href="/assets/styles.css" />
</head>
<body>
    <main class="app">
        <h1>TeamMarhaba</h1>
        <p class="tagline">Walking skeleton — web surface.</p>
        <p id="status" class="status">loading…</p>

        <!-- Account nav (TM-109): router.js reflects auth state — sign-in link vs sign-out. -->
        <nav class="app-nav" aria-label="Account">
            <a id="nav-signin" href="#/login" hidden>Sign in</a>
            <button id="signout-btn" type="button" hidden>Sign out</button>
        </nav>

        <!-- Auth views (TM-106 panels, routed by TM-109): #auth-signed-out = #/login,
             #auth-signed-in = #/home. router.js owns their visibility. -->
        <section class="auth" aria-label="Account">
            <form class="auth-card" id="auth-signed-out" novalidate>
                <h2>Sign in</h2>
                <label class="field">
                    <span>Email</span>
                    <input id="email" type="email" autocomplete="email" required />
                </label>
                <label class="field">
                    <span>Password</span>
                    <input id="password" type="password" autocomplete="current-password" required minlength="6" />
                </label>
                <p id="auth-error" class="auth-error" role="alert" hidden></p>
                <div class="auth-actions">
                    <button id="signin-btn" type="submit" form="auth-signed-out">Sign in</button>
                    <button id="signup-btn" type="button" class="secondary">Sign up</button>
                </div>
                <button id="google-btn" type="button" class="google">Continue with Google</button>
            </form>

            <div class="auth-card" id="auth-signed-in" hidden>
                <h2>Signed in</h2>
                <p>You are signed in as <strong id="user-email"></strong>.</p>
                <!-- Backend-verified identity from GET /api/v1/me via the authenticated API client (TM-108). -->
                <p id="me" class="status"></p>
            </div>
        </section>
    </main>
    <script src="/assets/config.js"></script>
    <!-- Firebase Auth bootstrap (TM-105). ES module: initialises Firebase + exposes window.tmAuth. -->
    <script type="module" src="/assets/auth.js"></script>
    <!-- Auth UI controller (TM-106). -->
    <script type="module" src="/assets/login.js"></script>
    <script src="/assets/app.js"></script>
    <!-- Authenticated API client demo (TM-108): calls GET /api/v1/me and renders the
         verified caller into #me. api.js attaches the Bearer token to every API call. -->
    <script type="module" src="/assets/me.js"></script>
    <!-- Client auth guard + hash router (TM-109): gates #/home behind sign-in, redirects
         signed-out users to #/login and returns them after sign-in, drives the nav. -->
    <script type="module" src="/assets/router.js"></script>
</body>
</html>
