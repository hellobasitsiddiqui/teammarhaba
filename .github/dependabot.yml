# Dependabot (TM-56) — keeps dependencies patched by opening weekly update PRs.
# Free on private repos (unlike CodeQL / dependency-review, which need GitHub Advanced
# Security). Only ecosystems with a manifest in the repo are listed; add Gradle for
# /android once it has a build.gradle (it's a stub today).
#
# Routine minor/patch bumps are grouped into one PR per ecosystem (low-noise, safe to
# merge when green). MAJOR bumps are treated as framework migrations, not chores, and are
# IGNORED in EVERY ecosystem (maven, github-actions, docker) — do them deliberately by hand.
# Rationale (TM-136): an investigation found the open Actions/Docker majors all passed CI, so
# auto-opening them caught no breakage — it only generated noise (5 major PRs landed at once)
# and a false sense of safety: `github/codeql-action` 3→4 was *green* only because the PR gate
# path-skips CodeQL on workflow-only changes, so its major was never actually exercised. The
# real breakage history is maven (Spring Boot 4 / springdoc 3 broke main once, #56). So we make
# the policy consistent: minor/patch flows everywhere (keeps SHA pins fresh — TM-59); majors are
# deliberate, human-initiated migrations. `.github/workflows/dependabot-auto-label.yml` stays as
# a backstop — it tags `semver-major` any major that still surfaces (e.g. a security update,
# which the version-update ignore below does not suppress).
version: 2
updates:
  # Backend Java dependencies (Maven).
  - package-ecosystem: maven
    directory: /backend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - backend
    commit-message:
      prefix: "chore(deps)"
    groups:
      backend-minor-patch:
        update-types:
          - minor
          - patch
    ignore:
      # Major bumps for backend Java deps are framework migrations (Spring Boot 4,
      # springdoc 3, …), not safe chores — bump them deliberately, not via auto-PRs.
      - dependency-name: "*"
        update-types:
          - version-update:semver-major

  # GitHub Actions used by our workflows — keeps the SHA pins current (pairs with the
  # supply-chain SHA-pinning policy, TM-59 / docs/supply-chain.md).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: "chore(deps)"
    groups:
      actions-minor-patch:
        update-types:
          - minor
          - patch
    ignore:
      # Major Action bumps are deliberate, not auto-PRs (TM-136). They didn't break CI, but
      # auto-opening them only added noise + a false-green blind spot (codeql-action 3→4 isn't
      # exercised by the PR gate). Bump a major by hand when you actually want it.
      - dependency-name: "*"
        update-types:
          - version-update:semver-major

  # Backend container base image.
  - package-ecosystem: docker
    directory: /backend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: "chore(deps)"
    groups:
      docker-minor-patch:
        update-types:
          - minor
          - patch
    ignore:
      # Major base-image bumps are deliberate, not auto-PRs (TM-136) — same policy as maven and
      # github-actions. Minor/patch (security + routine) still flow above.
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
