name: E2E

# Browser e2e (Playwright) — TM-134. Runs on the long-lived branch + manual dispatch ONLY, never
# on the PR gate: it's slow (real browser, full stack + Firebase Auth emulator) and would blow up
# PR latency. The fast PR gate stays in ci.yml. Keep this trigger list exactly as below.
on:
  # Nightly + on demand, NOT per-merge (TM-153). The browser suite is slow (real browser + full
  # stack + Auth emulator) and doesn't need to gate every merge — the fast PR gate (ci.yml) does
  # that. Run it once a night, and manually whenever (e.g. before a release/sprint-end deploy).
  schedule:
    - cron: '0 3 * * *'   # ~03:00 UTC nightly
  workflow_dispatch:
    inputs:
      evidence_ticket:
        description: "Jira ticket key to attach screenshot evidence to (e.g. TM-190). Blank = skip."
        required: false
        default: ""

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  e2e:
    name: Browser walkthrough (Playwright)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: teammarhaba
          POSTGRES_USER: app
          POSTGRES_PASSWORD: devpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app -d teammarhaba"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # DB (matches the postgres service above).
      DB_NAME: teammarhaba
      DB_USER: app
      DB_PASSWORD: devpassword
      DB_HOST: 127.0.0.1
      DB_PORT: "5432"
      # Firebase Auth emulator — both the backend (Admin SDK) and the browser talk to it on the host.
      FIREBASE_PROJECT_ID: teammarhaba
      FIREBASE_AUTH_EMULATOR_HOST: 127.0.0.1:9099
      # Firebase Storage emulator (TM-166) — the browser uploads avatars to it.
      FIREBASE_STORAGE_EMULATOR_HOST: 127.0.0.1:9199
      # Where the e2e harness finds the backend + points the web app's injected config.
      E2E_API_BASE_URL: http://127.0.0.1:8080
      E2E_AUTH_EMULATOR_HOST: 127.0.0.1:9099
      E2E_STORAGE_EMULATOR_HOST: 127.0.0.1:9199

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 21 (Temurin) + Maven cache
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Set up Node 20
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'

      - name: Build backend jar
        working-directory: backend
        run: ./mvnw -B -DskipTests package

      - name: Install e2e dependencies
        working-directory: web/e2e
        run: npm install --no-audit --no-fund

      - name: Install Playwright browser (Chromium)
        working-directory: web/e2e
        run: npx playwright install --with-deps chromium

      - name: Start Firebase Auth + Storage emulators
        working-directory: web/e2e
        # The Storage emulator (TM-166) loads the repo-root storage.rules via the root firebase.json
        # (passed with --config, since the Firebase CLI won't reference a rules file outside the
        # config's own directory), so the avatar walkthrough exercises the real owner/type/size rules.
        run: |
          npx firebase emulators:start --only auth,storage --project teammarhaba --config ../../firebase.json > /tmp/firebase-emulator.log 2>&1 &
          echo "Waiting for the Auth emulator on :9099…"
          for i in $(seq 1 60); do
            curl -sf "http://127.0.0.1:9099/" > /dev/null && { echo "auth emulator up"; break; }
            sleep 2
          done
          echo "Waiting for the Storage emulator on :9199…"
          for i in $(seq 1 60); do
            curl -sf "http://127.0.0.1:9199/" > /dev/null && { echo "storage emulator up"; break; }
            sleep 2
          done

      - name: Start backend (pointed at the emulator + Postgres)
        env:
          SPRING_PROFILES_ACTIVE: dev
          SPRING_DATASOURCE_URL: jdbc:postgresql://127.0.0.1:5432/teammarhaba
          SPRING_DATASOURCE_USERNAME: app
          SPRING_DATASOURCE_PASSWORD: devpassword
          # Disable the per-client API rate limiter (TM-158) for the browser-e2e backend (TM-595). The
          # limiter defaults to 120 req/min PER CLIENT, keyed by uid. The browser suite is a synthetic
          # load, not a real user: EVERY admin spec (admin-walkthrough, broadcast-admin, theme-visual,
          # admin-events, …) signs in as the ONE seeded `e2e-admin` uid, so they all share a single
          # bucket, and each authenticated page-load bursts several parallel /me + badge + unread-total
          # calls on auth-resolve. Cumulatively that blows the 120/min budget — the tests running LAST
          # (mobile admin-events) then get a 429 on the edit-PATCH / list-reload and fail. This mirrors
          # exactly what application-test.yml already does for the integration suite (rate-limit off so
          # the shared MockMvc client isn't throttled); the limiter itself keeps its own dedicated
          # coverage in RateLimitFilterIntegrationTest, so nothing is lost by exempting the UI journeys.
          API_RATE_LIMIT_ENABLED: "false"
          # Events e2e (TM-400): run the waitlist offer-cascade sweep (TM-397) on a FAST cadence so the
          # "un-RSVP → a freed spot is offered → claim" path lands within seconds instead of the ~60s
          # prod default. The events spec still polls (bounded) for the claim affordance, so this only
          # tightens the timing; it never makes the run depend on an exact interval.
          OFFER_CASCADE_SCAN_INTERVAL_MS: "3000"
          OFFER_CASCADE_INITIAL_DELAY_MS: "2000"
        run: |
          java -jar backend/target/*.jar > /tmp/backend.log 2>&1 &
          echo "Waiting for the backend on :8080…"
          for i in $(seq 1 60); do
            curl -sf "http://127.0.0.1:8080/health" > /dev/null && { echo "backend up"; break; }
            sleep 2
          done
          curl -sf "http://127.0.0.1:8080/health" > /dev/null || { echo "backend failed to start"; tail -n 100 /tmp/backend.log; exit 1; }

      - name: Run Playwright walkthrough
        working-directory: web/e2e
        run: npm test

      - name: Upload Playwright report + screenshots (always — evidence)
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: |
            web/e2e/playwright-report
            web/e2e/test-results
          if-no-files-found: warn

      # Best-effort, non-fatal: attach the run's screenshots/report to a Jira ticket when the run was
      # dispatched with an `evidence_ticket` (e.g. the sprint test ticket TM-190). Skips silently if
      # no ticket was given or the JIRA_* secrets aren't set — never fails the e2e job.
      - name: Post screenshot evidence to the Jira ticket (best-effort)
        if: ${{ always() && github.event.inputs.evidence_ticket != '' }}
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          TICKET: ${{ github.event.inputs.evidence_ticket }}
        run: |
          set -o pipefail
          if [ -z "$JIRA_BASE_URL" ] || [ -z "$JIRA_USER_EMAIL" ] || [ -z "$JIRA_API_TOKEN" ]; then
            echo "::warning::Jira secrets not set — skipping evidence post for $TICKET."; exit 0
          fi
          if [ ! -d web/e2e/playwright-report ] && [ ! -d web/e2e/test-results ]; then
            echo "::warning::no Playwright report/screenshots found — nothing to post."; exit 0
          fi
          # Evidence = the INDIVIDUAL viewable screenshots (never zip-only — a reviewer must not have to
          # download + unzip to see them) PLUS the full zip bundle (report + traces). Attach BOTH, but
          # in BATCHES: a single multipart request with every file is rejected 413 (Payload Too Large),
          # so cap each POST at a handful of files.
          ZIP="/tmp/playwright-evidence-${GITHUB_RUN_ID}.zip"
          ( cd web/e2e && zip -qr "$ZIP" playwright-report test-results ) || true
          ATT="$JIRA_BASE_URL/rest/api/3/issue/$TICKET/attachments"
          post() { # POST the given -F args; echo the HTTP code (never throws)
            curl -sS -o /tmp/jira-att.txt -w '%{http_code}' \
              -u "$JIRA_USER_EMAIL:$JIRA_API_TOKEN" -H "X-Atlassian-Token: no-check" "$@" "$ATT" || echo "000"
          }
          ok=0; bad=0; batch=(); n=0
          flush() {
            [ ${#batch[@]} -eq 0 ] && return 0
            c="$(post "${batch[@]}")"
            case "$c" in
              200|201) ok=$((ok + ${#batch[@]})) ;;
              *) bad=$((bad + ${#batch[@]})); echo "::warning::screenshot batch failed (HTTP $c): $(head -c 200 /tmp/jira-att.txt 2>/dev/null)" ;;
            esac
            batch=()
          }
          # 1) individual PNGs, 15 per request to stay under the per-request size cap.
          while IFS= read -r png; do
            batch+=(-F "file=@${png}"); n=$((n + 1))
            [ $(( n % 15 )) -eq 0 ] && flush
          done < <(find web/e2e/test-results web/e2e/playwright-report -type f -name '*.png' 2>/dev/null | sort)
          flush
          # 2) the full zip bundle, on its own request.
          if [ -f "$ZIP" ]; then
            c="$(post -F "file=@${ZIP}")"
            case "$c" in 200|201) : ;; *) echo "::warning::zip attach failed (HTTP $c)" ;; esac
          fi
          echo "Posted $ok individual screenshot(s) to $TICKET ($bad failed) + the evidence zip."
          exit 0

      - name: Upload service logs (on failure)
        if: ${{ failure() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-logs
          path: |
            /tmp/backend.log
            /tmp/firebase-emulator.log
          if-no-files-found: warn
