name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel superseded runs on the same ref (e.g. new push to a PR branch).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege by default; widen per-job where needed.
permissions:
  contents: read

jobs:
  backend:
    name: Backend build + test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write          # publish the JUnit check run
      pull-requests: write   # annotate the PR with results
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 21 (Temurin) + Maven cache
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Format/lint check (Spotless)
        run: ./mvnw -B spotless:check

      - name: Build & test
        run: ./mvnw -B -Dspotless.check.skip=true verify

      - name: Publish test report
        uses: mikepenz/action-junit-report@3585e9575db828022551b4231f165eb59a0e74e3 # v5
        if: ${{ always() }}
        with:
          report_paths: backend/target/surefire-reports/TEST-*.xml
          check_name: Backend test report

      # Supply-chain SBOM (TM-59) — the cyclonedx-maven-plugin writes target/bom.json during the
      # verify build above; publish it as a build artifact for CVE-exposure / provenance checks.
      - name: Upload CycloneDX SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ always() }}
        with:
          name: backend-sbom
          path: backend/target/bom.json
          if-no-files-found: warn

      # Coverage report (TM-54). The JaCoCo gate runs inside the `verify` above (the build fails
      # if coverage drops below LINE 0.85 / BRANCH 0.70); this publishes the HTML/XML report for
      # inspection. Uploaded even on failure so a gate breach is diagnosable.
      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: ${{ always() }}
        with:
          name: backend-coverage
          path: backend/target/site/jacoco
          if-no-files-found: warn

  backend-image:
    name: Backend image (build; push to Artifact Registry on main)
    needs: backend            # only build/push an image that passed build + tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write         # keyless OIDC token for GCP (used only on the main push)
    env:
      # Artifact Registry repo `containers` (region europe-west2), provisioned for TM-55.
      # Single source of truth: infra/gcp/artifact-registry.md + infra/gcp/config.yaml.
      IMAGE: europe-west2-docker.pkg.dev/teammarhaba/containers/backend
      # True only on a real merge to main — gates the push (PRs build but never push).
      PUSH: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      # Keyless auth (Workload Identity Federation, TM-67) — only when we will push.
      # token_format=access_token lets us log into Artifact Registry without a JSON key.
      - name: Authenticate to GCP (Workload Identity Federation, keyless)
        if: ${{ env.PUSH == 'true' }}
        id: auth
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          project_id: teammarhaba
          workload_identity_provider: projects/58443206078/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: gha-deployer@teammarhaba.iam.gserviceaccount.com
          token_format: access_token

      - name: Log in to Artifact Registry
        if: ${{ env.PUSH == 'true' }}
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: europe-west2-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      # On main: build + push :<sha> and :latest. On PRs: build only (push=false).
      - name: Build backend image (push on main)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: backend
          file: backend/Dockerfile
          push: ${{ env.PUSH == 'true' }}
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
