name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Concurrency is scoped by EVENT (TM-146):
#   • pull_request → group per branch ref + cancel-in-progress: a new push to a PR
#     supersedes its older run, keeping the PR gate fast.
#   • push to main → group per COMMIT (github.sha) + NO cancel: two merges in quick
#     succession must NOT cancel each other, or the first merge's `backend-image` push job
#     is killed, its `:<sha>` image never reaches Artifact Registry, and that commit's
#     deploy then strands ~10 min waiting for an image that never arrives. Every merged
#     SHA must produce its pushed image.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event_name == 'push' && github.sha || github.ref }}
  cancel-in-progress: ${{ github.event_name != 'push' }}

# Least privilege by default; widen per-job where needed.
permissions:
  contents: read

jobs:
  # Cheap pre-gate (TM-151): does this push/PR touch anything but docs? A docs-only change (every
  # file ends in .md or lives under docs/) skips the expensive backend build/test, image build and
  # web checks below — that's the GitHub-Actions-minutes win. Gated at the JOB level on purpose,
  # NOT via workflow-level `paths-ignore`: CI must still RUN and conclude `success` on docs-only
  # PRs so (a) the docs auto-merge — which fires on this workflow's `workflow_run` success — still
  # triggers, and (b) any required status check still reports (a skipped job satisfies branch
  # protection, whereas a never-started workflow strands a required check forever).
  changes:
    name: Detect non-docs changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0   # full history so we can diff against the base

      - name: Determine whether any non-docs file changed
        id: filter
        env:
          EVENT: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
          BEFORE: ${{ github.event.before }}
        run: |
          set -uo pipefail
          # Resolve the diff range for either event. Fail SAFE: on any uncertainty we treat the
          # change as code (run the full CI) rather than risk skipping a real build.
          if [ "$EVENT" = "pull_request" ]; then
            git fetch --no-tags origin "$BASE_REF" 2>/dev/null || true
            RANGE="origin/${BASE_REF}...HEAD"
          elif [ -n "${BEFORE:-}" ] && [ "$BEFORE" != "0000000000000000000000000000000000000000" ]; then
            RANGE="${BEFORE}...HEAD"
          else
            RANGE="HEAD^...HEAD"
          fi
          echo "Event: $EVENT | diff range: $RANGE"
          if ! FILES="$(git diff --name-only $RANGE 2>/dev/null)"; then
            echo "diff failed — running full CI (fail-safe)."
            echo "code=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          echo "Changed files:"; printf '%s\n' "$FILES"
          if [ -z "$FILES" ]; then
            echo "No files in range — running full CI (fail-safe)."
            echo "code=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          # "docs" = every changed file ends in .md OR lives under docs/. If ANY file falls outside
          # that set, this is a code change and the full pipeline runs. Print-and-test (not `grep
          # -q`) so the result is identical under GNU grep and non-GNU variants.
          NONDOCS="$(printf '%s\n' "$FILES" | grep -vE '(\.md$)|(^docs/)' || true)"
          if [ -n "$NONDOCS" ]; then
            echo "Non-docs change detected → code=true (full CI). Triggering files:"; printf '%s\n' "$NONDOCS"
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            echo "Docs-only change → code=false (skip backend/image/web build)."
            echo "code=false" >> "$GITHUB_OUTPUT"
          fi

  # Fast PR gate for the web build tooling (TM-144) + the browser JS parse gate (TM-584). No
  # browser/cloud — just Node, so it stays on the PR gate (unlike the e2e suite, which runs on main
  # only). Skipped on docs-only changes (TM-151).
  web-build:
    name: Web asset fingerprinting check
    needs: changes
    if: ${{ needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'

      # Parse gate (TM-584): syntax-check every browser JS module under web/src in ES-module goal.
      # Fails on a SyntaxError or a DUPLICATE export/declaration — the class of bug that white-
      # screened main when TM-438 + TM-439 each added the same `export … listMyConversations` to
      # api.js and git merged both with no conflict (fixed in TM-583). The old gate below only
      # `node --test`s the *-core modules, so it never parsed api.js. Seconds-fast, no runtime.
      # Runs first so a parse-level breakage fails the job immediately.
      - name: Syntax-check browser JS modules (TM-584)
        run: node web/tools/check-syntax.mjs

      - name: Test the asset fingerprinter
        # Unquoted so the shell expands the glob to the actual file(s) — portable across Node
        # versions (node's own --test glob support varies; passing explicit files always works).
        run: node --test web/tools/*.test.mjs

  backend:
    name: Backend build + test
    needs: changes
    if: ${{ needs.changes.outputs.code == 'true' }}   # skip on docs-only changes (TM-151)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write          # publish the JUnit check run
      pull-requests: write   # annotate the PR with results
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 21 (Temurin) + Maven cache
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Format/lint check (Spotless)
        run: ./mvnw -B spotless:check

      - name: Build & test
        run: ./mvnw -B -Dspotless.check.skip=true verify

      - name: Publish test report
        uses: mikepenz/action-junit-report@3585e9575db828022551b4231f165eb59a0e74e3 # v5
        if: ${{ always() }}
        with:
          report_paths: backend/target/surefire-reports/TEST-*.xml
          check_name: Backend test report

      # Supply-chain SBOM (TM-59) — the cyclonedx-maven-plugin writes target/bom.json during the
      # verify build above; publish it as a build artifact for CVE-exposure / provenance checks.
      - name: Upload CycloneDX SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ always() }}
        with:
          name: backend-sbom
          path: backend/target/bom.json
          if-no-files-found: warn

      # Coverage report (TM-54). The JaCoCo gate runs inside the `verify` above (the build fails
      # if coverage drops below LINE 0.85 / BRANCH 0.70); this publishes the HTML/XML report for
      # inspection. Uploaded even on failure so a gate breach is diagnosable.
      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: ${{ always() }}
        with:
          name: backend-coverage
          path: backend/target/site/jacoco
          if-no-files-found: warn

  backend-image:
    name: Backend image (build; push to Artifact Registry on main)
    needs: [changes, backend]   # only build/push an image that passed build + tests
    if: ${{ needs.changes.outputs.code == 'true' }}   # no image for docs-only changes (TM-151)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write         # keyless OIDC token for GCP (used only on the main push)
    env:
      # Artifact Registry repo `containers` (region europe-west2), provisioned for TM-55.
      # Single source of truth: infra/gcp/artifact-registry.md + infra/gcp/config.yaml.
      IMAGE: europe-west2-docker.pkg.dev/teammarhaba/containers/backend
      # True only on a real merge to main — gates the push (PRs build but never push).
      PUSH: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0   # full history + tags so `git describe` can name the build (TM-155)

      # Human-readable build name from the nearest tag (TM-155). `--always` falls back to the
      # bare short SHA until anything is tagged, so this never fails on a tag-less repo.
      - name: Compute version (git describe)
        run: echo "GIT_DESCRIBE=$(git describe --tags --always --long)" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      # Keyless auth (Workload Identity Federation, TM-67) — only when we will push.
      # token_format=access_token lets us log into Artifact Registry without a JSON key.
      - name: Authenticate to GCP (Workload Identity Federation, keyless)
        if: ${{ env.PUSH == 'true' }}
        id: auth
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          project_id: teammarhaba
          workload_identity_provider: projects/58443206078/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: gha-deployer@teammarhaba.iam.gserviceaccount.com
          token_format: access_token

      - name: Log in to Artifact Registry
        if: ${{ env.PUSH == 'true' }}
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: europe-west2-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      # On main: build + push :<sha> and :latest. On PRs: build only (push=false).
      - name: Build backend image (push on main)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: backend
          file: backend/Dockerfile
          # Bake the build provenance into the image so /version reports the live build:
          # the exact commit SHA (TM-142) + the `git describe` name (TM-155).
          build-args: |
            GIT_SHA=${{ github.sha }}
            GIT_DESCRIBE=${{ env.GIT_DESCRIBE }}
          push: ${{ env.PUSH == 'true' }}
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
