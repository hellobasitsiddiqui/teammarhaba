name: nightly canary

# Nightly health + drift check on `main` (TM-118): a fresh-clone full build + test, plus a
# smoke check that the live backend (Cloud Run Ready revision) and web (Firebase Hosting) are
# up. Catches overnight drift / new transitive deps that incremental PR CI misses, and confirms
# main is still deployable & serving. Green is silent (Actions record only); a failure opens an
# issue. Run manually any time via workflow_dispatch.
on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC daily
  workflow_dispatch:

permissions:
  contents: read

env:
  PROJECT: teammarhaba
  REGION: europe-west2
  SERVICE: teammarhaba-backend
  WEB_URL: https://teammarhaba.web.app

jobs:
  canary:
    name: Nightly canary
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # keyless WIF for the gcloud health check
      issues: write     # open an issue on failure
    steps:
      - name: Checkout main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 21 (Temurin) + Maven cache
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Fresh build + full test (Spotless, tests, JaCoCo gate, SBOM)
        working-directory: backend
        run: ./mvnw -B -ntp clean verify

      - name: Authenticate to GCP (Workload Identity Federation, keyless)
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          project_id: teammarhaba
          workload_identity_provider: projects/58443206078/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: gha-deployer@teammarhaba.iam.gserviceaccount.com

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - name: Backend live health (Cloud Run Ready revision)
        run: |
          rev="$(gcloud run services describe "$SERVICE" --project="$PROJECT" --region="$REGION" --format='value(status.latestReadyRevisionName)')"
          echo "latestReadyRevision: ${rev:-<none>}"
          [ -n "$rev" ] || { echo "::error::backend has no Ready revision — main not deployable/healthy"; exit 1; }

      - name: Web live health (Firebase Hosting)
        run: |
          code="$(curl -sS -o /dev/null -w '%{http_code}' "$WEB_URL")"
          echo "web $WEB_URL -> HTTP $code"
          [ "$code" = "200" ] || { echo "::error::web not healthy (HTTP $code)"; exit 1; }

      - name: Run summary
        if: always()
        run: |
          {
            echo "## 🌙 Nightly canary — ${{ job.status }}"
            echo ""
            echo "- Fresh build + full test (\`mvnw clean verify\`)"
            echo "- Backend: Cloud Run Ready revision"
            echo "- Web: ${WEB_URL}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const run = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const today = new Date().toISOString().slice(0, 10);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🌙 Nightly canary failed — ${today}`,
              body: `The nightly canary on \`main\` failed.\n\n**Run:** ${run}\n\nCheck which step went red: fresh build/test, backend Ready-revision, or web health.`,
            });

      # Push the canary result to Slack (TM-119) — the team lives in Slack, and the issue/summary
      # above are pull-only. A FAILURE always alerts; a GREEN run posts a daily heartbeat ONLY when
      # the `CANARY_SLACK_HEARTBEAT` repo variable is "true" (off by default — low noise). Fail-soft:
      # if `SLACK_WEBHOOK_URL` isn't configured yet (the HITL — TM-176), this no-ops and never fails
      # the canary. The webhook URL is a secret passed via env (never echoed); the payload is built
      # with jq so the text is safely escaped.
      - name: Notify Slack
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          HEARTBEAT: ${{ vars.CANARY_SLACK_HEARTBEAT }}
          JOB_STATUS: ${{ job.status }}
        run: |
          set -uo pipefail
          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
            echo "::notice::SLACK_WEBHOOK_URL not set — skipping Slack notify (HITL pending, TM-176)."
            exit 0
          fi
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          if [ "$JOB_STATUS" = "success" ]; then
            if [ "${HEARTBEAT:-}" != "true" ]; then
              echo "Canary green and heartbeat disabled — no Slack post."
              exit 0
            fi
            TEXT="✅ Nightly canary green on \`main\` — fresh build + tests + live backend/web all healthy. <${RUN_URL}|run>"
          else
            TEXT="❌ Nightly canary *${JOB_STATUS}* on \`main\` — check fresh build/test, backend Ready-revision, or web health. <${RUN_URL}|run>"
          fi
          payload="$(jq -nc --arg t "$TEXT" '{text: $t}')"
          code="$(curl -sS -o /dev/null -w '%{http_code}' -X POST -H 'Content-type: application/json' --data "$payload" "$SLACK_WEBHOOK_URL" || echo 000)"
          echo "Slack POST -> HTTP $code"
          [ "$code" = "200" ] || echo "::warning::Slack notify returned HTTP $code — not failing the canary."
