name: Test suite (on-demand)

# TM-340 — the FOUNDATION of the on-demand test-suite library (epic TM-339). This is the single
# dispatch + tagging + evidence entrypoint that the golden-path (TM-341), soak (TM-342) and load
# (TM-343) suites plug into. It runs a chosen journey suite across a chosen SURFACE and (optionally)
# attaches screenshots + a pass/fail summary to a Jira ticket.
#
# CROSS-SURFACE MODEL
# Every journey is meant to run across four surfaces. Android & iOS are Capacitor WebViews loading
# the SAME hosted web app, so the journeys are shared — only the *runner* differs:
#   web         → Playwright chromium project           (web/e2e, mirrors e2e.yml's stack)
#   mobile-web  → Playwright mobile-chromium project    (Pixel-5 viewport; same stack as web)
#   android     → Maestro on the WebView app            (mirrors mobile-e2e.yml → android/maestro/ci-run.sh)
#   ios         → Maestro on the iOS-Simulator WebView  (macos-latest; xcodebuild + xcrun simctl → ios/maestro/ci-run.sh)
#
# SUITE SELECTION
#   <feature>   → Playwright `--grep @<feature>` over web/e2e/tests (per-feature tags added in TM-340)
#   all         → the whole tagged suite (no grep)
#   golden|soak|load → dispatched to web/e2e/suites/<suite>.sh, which TM-341/342/343 drop in. Until
#                      the script exists the branch exits with a clear "not implemented yet" message.
#
# Manual dispatch — this is a library you INVOKE, never a PR/merge gate (the fast gate is ci.yml).
# One exception: a single offset NIGHTLY cron keeps the (slow, macOS-billed) iOS Simulator lane warm
# so it doesn't rot between dispatches (TM-353). The cron path runs ONLY the ios job — the web/
# mobile-web/android jobs gate on `inputs.surface`, which is empty on a `schedule` event, so they stay
# dispatch-only. Cost discipline: iOS runs on `macos-latest` (billed ~10x), so it is dispatch + this
# one nightly only — NEVER added to ci.yml's required gate, and no per-PR trigger (the path-filtered
# `ios-simulator.yml` compile gate already covers ios/** changes on PRs).
on:
  workflow_dispatch:
    inputs:
      suite:
        description: "Which suite to run"
        required: true
        default: "all"
        type: choice
        options:
          # journey feature suites (Playwright @tags)
          - auth
          - onboarding
          - terms
          - profile
          - avatar
          - admin
          - admin-events
          - broadcast
          - events
          - theme
          - help
          - badges
          - webview
          - responsive
          # events journey (TM-399): android Maestro is wired (events.yaml); web/mobile-web/ios specs land via TM-400/401
          - events
          # aggregates / special suites
          - all
          - golden
          - soak
          - load
      surface:
        description: "Which surface to run the suite on"
        required: true
        default: "web"
        type: choice
        options:
          - web
          - mobile-web
          - android
          - ios
      jira_ticket:
        description: "Jira ticket key to attach evidence to (e.g. TM-190). Blank = skip."
        required: false
        default: ""
      duration_minutes:
        description: "Soak duration in minutes (soak suite only; passthrough)"
        required: false
        default: ""
      vus:
        description: "Virtual users / concurrency (load suite only; passthrough)"
        required: false
        default: ""

  # Nightly keep-warm for the iOS Simulator lane ONLY (see the on: note above). Offset to 05:00 UTC so
  # it trails e2e.yml (03:00) and mobile-e2e.yml (04:00) and the three slow nightlies don't contend for
  # runners. On this event `inputs.*` are empty, so only the ios job (which also fires on schedule) runs.
  schedule:
    - cron: '0 5 * * *'   # ~05:00 UTC nightly — iOS Simulator smoke only

concurrency:
  # Serialize per (suite, surface) so two dispatches of the same combo don't fight over the emulator.
  # On the nightly `schedule` event the inputs are empty, so this collapses to a stable scheduled group.
  group: test-suite-${{ github.event.inputs.suite || 'nightly' }}-${{ github.event.inputs.surface || 'ios' }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # ───────────────────────────────────────────────────────────────────────────────────────────────
  # WEB + MOBILE-WEB — both are Playwright, same backend/emulator stack (mirrors e2e.yml), differing
  # only by --project (chromium vs mobile-chromium). One job with an `if` guard keeps them together.
  # ───────────────────────────────────────────────────────────────────────────────────────────────
  playwright:
    name: "Playwright — ${{ github.event.inputs.suite }} @ ${{ github.event.inputs.surface }}"
    if: ${{ github.event.inputs.surface == 'web' || github.event.inputs.surface == 'mobile-web' }}
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: teammarhaba
          POSTGRES_USER: app
          POSTGRES_PASSWORD: devpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app -d teammarhaba"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      # DB (matches the postgres service above).
      DB_NAME: teammarhaba
      DB_USER: app
      DB_PASSWORD: devpassword
      DB_HOST: 127.0.0.1
      DB_PORT: "5432"
      # Firebase Auth + Storage emulators — the backend (Admin SDK) and the browser both talk to them.
      FIREBASE_PROJECT_ID: teammarhaba
      FIREBASE_AUTH_EMULATOR_HOST: 127.0.0.1:9099
      FIREBASE_STORAGE_EMULATOR_HOST: 127.0.0.1:9199
      E2E_API_BASE_URL: http://127.0.0.1:8080
      E2E_AUTH_EMULATOR_HOST: 127.0.0.1:9099
      E2E_STORAGE_EMULATOR_HOST: 127.0.0.1:9199
      # Which Playwright project the surface maps to.
      PW_PROJECT: ${{ github.event.inputs.surface == 'mobile-web' && 'mobile-chromium' || 'chromium' }}
      SUITE: ${{ github.event.inputs.suite }}
      DURATION_MINUTES: ${{ github.event.inputs.duration_minutes }}
      VUS: ${{ github.event.inputs.vus }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 21 (Temurin) + Maven cache
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Set up Node 20
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'

      - name: Build backend jar
        working-directory: backend
        run: ./mvnw -B -DskipTests package

      - name: Install e2e dependencies
        working-directory: web/e2e
        run: npm install --no-audit --no-fund

      - name: Install Playwright browser (Chromium)
        working-directory: web/e2e
        run: npx playwright install --with-deps chromium

      - name: Start Firebase Auth + Storage emulators
        working-directory: web/e2e
        run: |
          npx firebase emulators:start --only auth,storage --project teammarhaba --config ../../firebase.json > /tmp/firebase-emulator.log 2>&1 &
          echo "Waiting for the Auth emulator on :9099…"
          for i in $(seq 1 60); do
            curl -sf "http://127.0.0.1:9099/" > /dev/null && { echo "auth emulator up"; break; }
            sleep 2
          done
          echo "Waiting for the Storage emulator on :9199…"
          for i in $(seq 1 60); do
            curl -sf "http://127.0.0.1:9199/" > /dev/null && { echo "storage emulator up"; break; }
            sleep 2
          done

      - name: Start backend (pointed at the emulator + Postgres)
        env:
          SPRING_PROFILES_ACTIVE: dev
          SPRING_DATASOURCE_URL: jdbc:postgresql://127.0.0.1:5432/teammarhaba
          SPRING_DATASOURCE_USERNAME: app
          SPRING_DATASOURCE_PASSWORD: devpassword
          # Events e2e (TM-400): run the waitlist offer-cascade sweep (TM-397) on a FAST cadence so the
          # "un-RSVP → a freed spot is offered → claim" path lands within seconds instead of the ~60s
          # prod default. The events spec still polls (bounded) for the claim affordance, so this only
          # tightens the timing; it never makes the run depend on an exact interval.
          OFFER_CASCADE_SCAN_INTERVAL_MS: "3000"
          OFFER_CASCADE_INITIAL_DELAY_MS: "2000"
        run: |
          java -jar backend/target/*.jar > /tmp/backend.log 2>&1 &
          echo "Waiting for the backend on :8080…"
          for i in $(seq 1 60); do
            curl -sf "http://127.0.0.1:8080/health" > /dev/null && { echo "backend up"; break; }
            sleep 2
          done
          curl -sf "http://127.0.0.1:8080/health" > /dev/null || { echo "backend failed to start"; tail -n 100 /tmp/backend.log; exit 1; }

      # Resolve the suite → Playwright invocation.
      #   feature tag → --grep @<suite>
      #   all         → whole project, no grep
      #   golden/soak/load → hand off to web/e2e/suites/<suite>.sh (TM-341/342/343). If the script is
      #                      absent, exit non-zero with a clear "not implemented yet" so those tickets
      #                      just drop their script in with no workflow change.
      # Screenshots are forced ON (--screenshot=on) so there's always evidence to attach, regardless
      # of the config (config already sets it, but a suite script may run its own invocation).
      - name: Run suite (${{ github.event.inputs.suite }}) on ${{ github.event.inputs.surface }}
        working-directory: web/e2e
        run: |
          set -euo pipefail
          mkdir -p suite-evidence
          case "$SUITE" in
            golden|soak|load)
              SCRIPT="suites/${SUITE}.sh"
              if [ ! -f "$SCRIPT" ]; then
                echo "::error::suite '${SUITE}' is not implemented yet — expected ${SCRIPT} (owned by TM-341/342/343). Drop the script in and re-dispatch."
                exit 1
              fi
              echo "Handing off to ${SCRIPT} (project=${PW_PROJECT}, duration=${DURATION_MINUTES:-n/a}, vus=${VUS:-n/a})"
              PW_PROJECT="$PW_PROJECT" DURATION_MINUTES="${DURATION_MINUTES:-}" VUS="${VUS:-}" bash "$SCRIPT"
              ;;
            all)
              echo "Running the full tagged suite on project ${PW_PROJECT}"
              npx playwright test --project="$PW_PROJECT"
              ;;
            auth|onboarding|terms|profile|avatar|admin|admin-events|theme|help|badges|webview|responsive|broadcast|events)
              echo "Running @${SUITE} on project ${PW_PROJECT}"
              npx playwright test --project="$PW_PROJECT" --grep "@${SUITE}"
              ;;
            *)
              echo "::error::unknown suite '${SUITE}'"; exit 1
              ;;
          esac

      - name: Upload Playwright report + screenshots (always — evidence)
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-suite-${{ github.event.inputs.suite }}-${{ github.event.inputs.surface }}
          path: |
            web/e2e/playwright-report
            web/e2e/test-results
          if-no-files-found: warn

      # Best-effort Jira evidence: attach the run's screenshots + a pass/fail summary.txt to the given
      # ticket. Never fails the job — skips silently if no ticket or the JIRA_* secrets are unset.
      - name: Post evidence to the Jira ticket (best-effort)
        if: ${{ always() && github.event.inputs.jira_ticket != '' }}
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          TICKET: ${{ github.event.inputs.jira_ticket }}
          SUITE: ${{ github.event.inputs.suite }}
          SURFACE: ${{ github.event.inputs.surface }}
          RESULT: ${{ job.status }}
        run: bash .github/scripts/test-suite-evidence.sh web/e2e/playwright-report web/e2e/test-results

  # ───────────────────────────────────────────────────────────────────────────────────────────────
  # ANDROID — Maestro on the WebView app. Reuses the mobile-e2e.yml toolchain + the SAME runner script
  # (android/maestro/ci-run.sh). The Maestro flows are shared journeys; per-feature grep isn't wired
  # for Maestro yet, so a feature suite runs the whole flow set with a notice (the WebView loads the
  # same hosted web, so a feature run is still meaningful as a smoke over that surface).
  # ───────────────────────────────────────────────────────────────────────────────────────────────
  android:
    name: "Android (Maestro) — ${{ github.event.inputs.suite }}"
    if: ${{ github.event.inputs.surface == 'android' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Suite/surface note
        env:
          SUITE: ${{ github.event.inputs.suite }}
        run: |
          case "$SUITE" in
            events)
              echo "::notice::suite 'events' → the Events Maestro journey (android/maestro/events.yaml, TM-399): browse → detail → RSVP → confirm → un-RSVP, plus the best-effort reminder/lifecycle push receipt (TM-368 method). Needs a seeded public event — see android/maestro/README.md → 'Events data precondition'." ;;
            golden|soak|load)
              echo "::notice::suite '${SUITE}' has no Maestro variant yet — running the shared android flow set as a smoke over this surface. TM-341/342/343 may add a surface-specific script later." ;;
            *)
              echo "::notice::running the shared android Maestro flow set for suite '${SUITE}' (per-tag Maestro selection wired for 'events' only so far)." ;;
          esac

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -l /dev/kvm

      - name: Set up JDK 21 (Temurin) + Gradle cache
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Set up Node (for Capacitor CLI)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - name: Install Capacitor deps + sync Android
        run: |
          npm ci
          npx cap sync android

      - name: Set up Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3.2.2

      - name: Build debug APK (assembleDebug)
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Locate debug APK
        id: apk
        run: |
          set -euo pipefail
          APK="$(find android/app/build/outputs/apk/debug -name '*.apk' | head -n1)"
          if [ -z "${APK}" ] || [ ! -f "${APK}" ]; then
            echo "::error::No debug APK produced by assembleDebug."
            exit 1
          fi
          echo "Built debug APK: ${APK}"
          echo "apk=${APK}" >> "$GITHUB_OUTPUT"

      - name: Install Maestro
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "${HOME}/.maestro/bin" >> "$GITHUB_PATH"

      - name: Run Maestro flows on emulator (API 34)
        uses: reactivecircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d # v2.38.0
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: bash android/maestro/ci-run.sh "${{ steps.apk.outputs.apk }}" "${{ github.event.inputs.suite }}"

      - name: Upload Maestro evidence (screenshots/video/report)
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: test-suite-${{ github.event.inputs.suite }}-android
          path: |
            maestro-artifacts
            ~/.maestro/tests
          if-no-files-found: warn

      - name: Post evidence to the Jira ticket (best-effort)
        if: ${{ always() && github.event.inputs.jira_ticket != '' }}
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          TICKET: ${{ github.event.inputs.jira_ticket }}
          SUITE: ${{ github.event.inputs.suite }}
          SURFACE: android
          RESULT: ${{ job.status }}
        run: bash .github/scripts/test-suite-evidence.sh maestro-artifacts

  # ───────────────────────────────────────────────────────────────────────────────────────────────
  # iOS — Maestro on the iOS Simulator. The iOS Capacitor WebView loads the SAME hosted web app as
  # Android, so the journeys are shared; only the runner differs — this is the macOS/Simulator sibling
  # of the android job above, structurally the ios-simulator.yml COMPILE-CHECK shape (not a release
  # job): Simulator destination → CODE_SIGNING_ALLOWED=NO → NO signing secrets.
  #
  # CEILING: Simulator only (no signing/provisioning/device/real-push). Runs on macos-latest (billed
  # ~10x), so it's dispatch + the one offset nightly cron above — never on ci.yml's required gate.
  #
  # Capacitor 8 uses Swift Package Manager, NOT CocoaPods — the project is ios/App/App.xcodeproj with
  # ios/App/CapApp-SPM/Package.swift; there is NO App.xcworkspace and NO Podfile, so this builds the
  # .xcodeproj directly and resolves plugin deps via SPM (there is no `pod install`). This matches the
  # working compile gate (ios-simulator.yml, TM-349); the TM-353 ticket text predates the Cap-8 SPM
  # reality and assumed the Cap-7 CocoaPods/workspace flow.
  #
  # SCOPE (TM-354): the iOS Simulator GATE is a reliable LAUNCH + WKWebView RENDER smoke —
  # ios/maestro/golden-path.yaml launches the shell and hard-asserts the hosted SPA rendered via the
  # STATIC login text Maestro-on-iOS can see (TeamMarhaba / tagline / Sign in / Email me a code / Try
  # another way), screenshotting each. The authenticated JOURNEY + per-plugin flows live under
  # ios/maestro/optional/ (journey.yaml, events.yaml, login-sms.yaml, plugins.yaml) and ci-run.sh runs them
  # BEST-EFFORT — non-gating — because they exercise dynamic WKWebView DOM interaction (e.g. the "Try
  # another way" → #sms-send-btn reveal driven by login.js's ES-module handler) that Maestro does NOT
  # reliably drive on the iOS Simulator (known Maestro-iOS/WKWebView limit; Android drives it fine). That
  # journey logic IS covered on CI by the web Playwright golden-path (same web code, TM-341) + the human
  # manual test on a real Simulator (TM-355). The reCAPTCHA-bypass flag injector (adb + Chrome DevTools
  # Protocol) does NOT port to WKWebView (no adb; Safari webinspectord ≠ CDP), so the iOS shell
  # (TeamMarhabaViewController.swift) sets localStorage["tm_e2e_phone_test"]="1" from its .atDocumentStart
  # WKUserScript, gated on the non-prod launch arg `-tmE2EPhoneTest` the flows pass on every launchApp
  # (retained even on the gate launch for parity). ci-run.sh keeps the tolerant "no gate flows yet →
  # green after boot+install+launch+WebView load" fallback from TM-353. See ios/maestro/README.md.
  # ───────────────────────────────────────────────────────────────────────────────────────────────
  ios:
    name: "iOS (Maestro, Simulator) — ${{ github.event.inputs.suite || 'nightly' }}"
    # Fires on an explicit surface=ios dispatch, OR on the nightly schedule (empty inputs → ios lane).
    if: ${{ github.event.inputs.surface == 'ios' || github.event_name == 'schedule' }}
    runs-on: macos-latest
    timeout-minutes: 45

    env:
      APP_ID: app.teammarhaba.webview
      # 'nightly' when the scheduled event fired with no suite input.
      SUITE: ${{ github.event.inputs.suite || 'nightly' }}
      # The .app xcodebuild drops for the Simulator SDK (derivedDataPath = ios/App/build).
      APP_PATH: ios/App/build/Build/Products/Debug-iphonesimulator/App.app

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Suite/surface note
        run: |
          case "$SUITE" in
            golden|soak|load)
              echo "::notice::suite '${SUITE}' has no native Maestro variant — running the shared iOS Simulator flow set as a smoke over this surface (web/e2e/suites/*.sh are Playwright-only). Mirrors the android job." ;;
            nightly)
              echo "::notice::nightly keep-warm run — booting the iOS Simulator + proving app launch/WebView load via the shared iOS flow set." ;;
            *)
              echo "::notice::running the shared iOS Simulator Maestro flow set for suite '${SUITE}' (per-tag Maestro selection not wired yet — same as android)." ;;
          esac

      # Pin a concrete, present Xcode. setup-xcode selects from the images actually installed on the
      # runner (surviving macos-latest image bumps better than a hardcoded /Applications path), and
      # `latest-stable` avoids a beta toolchain. Print the toolchain + available Simulator runtimes for
      # diagnosability (same spirit as the compile gate).
      - name: Select Xcode (latest stable)
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1.7.0
        with:
          xcode-version: latest-stable

      - name: Print toolchain + Simulator runtimes
        run: |
          xcodebuild -version
          xcrun simctl list runtimes

      # Node 22: the Capacitor 8 CLI (cap sync) needs >=22 — NOT node 20. (The Playwright job above
      # pins 20 for the web toolchain; the native lanes need 22, same as the android job.)
      - name: Set up Node (for Capacitor CLI)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      # cap sync copies the web assets + generates the gitignored capacitor.config.json that the app
      # loads, and points CapApp-SPM/Package.swift's plugin packages at ../../../node_modules/@capacitor/*
      # — so deps + sync MUST run before xcodebuild (mirrors the compile gate / the android job).
      - name: Install Capacitor deps + sync iOS
        run: |
          npm ci
          npx cap sync ios

      # Build the app for the Simulator SDK, signing fully disabled (a Simulator destination needs no
      # team/provisioning profile). `generic/platform=iOS Simulator` builds the .app without pinning a
      # booted device, so it's stable across runner Xcode/OS bumps; -derivedDataPath fixes where the
      # .app lands (APP_PATH above). Building the .xcodeproj directly (SPM) — no workspace, no pods.
      - name: Build App for iOS Simulator (Debug, signing disabled)
        working-directory: ios/App
        run: |
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build \
            build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=

      - name: Verify the built .app
        run: |
          set -euo pipefail
          if [ ! -d "$APP_PATH" ]; then
            echo "::error::xcodebuild did not produce an .app at $APP_PATH"
            find ios/App/build/Build/Products -maxdepth 2 -name '*.app' 2>/dev/null || true
            exit 1
          fi
          echo "Built app bundle: $APP_PATH"

      # Create + boot a Simulator. Pin the iPhone by NAME (simctl create accepts the device-type name),
      # preferring 'iPhone 15' per the ticket but falling back through nearby models so a future
      # macos-latest image that drops that exact model still resolves. The iOS RUNTIME is derived as the
      # NEWEST available iOS runtime identifier (single-line jq over `simctl list -j`) so it tracks the
      # runner's Xcode without a hardcoded 'iOS-17-x'. `bootstatus -b` blocks until fully booted.
      - name: Create + boot iOS Simulator
        id: sim
        run: |
          set -euo pipefail
          # Newest available iOS runtime identifier (e.g. com.apple.CoreSimulator.SimRuntime.iOS-17-5).
          RUNTIME="$(xcrun simctl list runtimes --json \
            | jq -r '[.runtimes[] | select(.isAvailable == true and (.identifier | contains("iOS")))]
                     | sort_by(.version | split(".") | map(tonumber))
                     | last.identifier')"
          if [ -z "$RUNTIME" ] || [ "$RUNTIME" = "null" ]; then
            echo "::error::no available iOS Simulator runtime found"; xcrun simctl list runtimes; exit 1
          fi
          echo "Using iOS runtime: $RUNTIME"
          # Pick the first device-type name the runner actually knows, preferring iPhone 15.
          DEVICE=""
          for cand in "iPhone 15" "iPhone 15 Pro" "iPhone 16" "iPhone 14" "iPhone SE (3rd generation)"; do
            if xcrun simctl list devicetypes | grep -qF "$cand ("; then DEVICE="$cand"; break; fi
          done
          if [ -z "$DEVICE" ]; then
            echo "::error::no expected iPhone device type available"; xcrun simctl list devicetypes | grep -i iphone; exit 1
          fi
          echo "Using device: $DEVICE"
          UDID="$(xcrun simctl create tm-sim "$DEVICE" "$RUNTIME")"
          echo "Created Simulator UDID: $UDID"
          xcrun simctl boot "$UDID"
          xcrun simctl bootstatus "$UDID" -b
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"

      # Install Maestro (same official installer + PATH wiring as the android job / mobile-e2e.yml).
      - name: Install Maestro
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "${HOME}/.maestro/bin" >> "$GITHUB_PATH"

      # Install + launch the app on the booted Simulator, pre-grant camera/photos/location, prove the
      # WebView loads, then run any iOS Maestro flows. Tolerant of "no iOS flows yet" → green once boot
      # + install + launch + WebView load are proven (the load-bearing evidence this lane produces).
      # simctl auto-drives the single booted Simulator; ci-run.sh takes (udid, app-path).
      - name: Install + launch on Simulator, run iOS Maestro flows
        run: bash ios/maestro/ci-run.sh "${{ steps.sim.outputs.udid }}" "$APP_PATH"

      # Upload whatever the run produced — launch/step screenshots, Maestro reports/debug output, and
      # the NO_FLOWS_YET marker — as the SAME test-suite-<suite>-ios artifact the android job uploads.
      - name: Upload Maestro evidence (screenshots/report)
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: test-suite-${{ github.event.inputs.suite || 'nightly' }}-ios
          path: |
            maestro-artifacts
            ~/.maestro/tests
          if-no-files-found: warn

      # Best-effort Jira evidence — byte-for-byte the android pattern (SURFACE: ios, same JIRA_* secrets,
      # RESULT from job.status). Skips silently on the nightly (no jira_ticket input) or unset secrets.
      - name: Post evidence to the Jira ticket (best-effort)
        if: ${{ always() && github.event.inputs.jira_ticket != '' }}
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          TICKET: ${{ github.event.inputs.jira_ticket }}
          SUITE: ${{ github.event.inputs.suite }}
          SURFACE: ios
          RESULT: ${{ job.status }}
        run: bash .github/scripts/test-suite-evidence.sh maestro-artifacts
