name: Jira reconcile merged → Done (backstop)

# Backstop for jira-merge-to-done.yml. That per-merge Action is the primary path,
# but the transition job can sit `queued` for minutes behind heavier CI jobs (public
# repos share a concurrency pool), or a run can be dropped entirely — leaving a merged
# ticket stranded In Review (observed on TM-456). This sweep runs on a schedule (and on
# demand) and moves ANY recently-merged PR's TM ticket that is still In Review / In
# Progress to Done. It makes "Done = merged to main" self-heal within one cron interval,
# with no dependency on the orchestrator's live session.
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: jira-reconcile-merged
  cancel-in-progress: true

jobs:
  reconcile:
    runs-on: ubuntu-latest
    env:
      JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
      JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
      JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Sweep recently-merged PRs → Done
        run: |
          # Fail soft throughout: this is a janitor, never a gate.
          set -o pipefail
          if [ -z "$JIRA_BASE_URL" ] || [ -z "$JIRA_USER_EMAIL" ] || [ -z "$JIRA_API_TOKEN" ]; then
            echo "::warning::Jira secrets not configured — nothing to reconcile."
            exit 0
          fi

          flipped=0
          # Last 30 merged PRs is a wide-enough window for a 10-min cadence.
          for br in $(gh pr list --repo "$GITHUB_REPOSITORY" --state merged --limit 30 \
                        --json headRefName --jq '.[].headRefName'); do
            key="$(printf '%s' "$br" | grep -oE 'TM-[0-9]+' | head -n1 || true)"
            [ -z "$key" ] && continue

            st="$(curl -sS -u "$JIRA_USER_EMAIL:$JIRA_API_TOKEN" -H 'Accept: application/json' \
                    "$JIRA_BASE_URL/rest/api/3/issue/$key?fields=status" \
                    | python3 -c "import sys,json;print(json.load(sys.stdin)['fields']['status']['name'])" 2>/dev/null || true)"

            if [ "$st" = "In Review" ] || [ "$st" = "In Progress" ]; then
              code="$(curl -sS -o /dev/null -w '%{http_code}' \
                       -u "$JIRA_USER_EMAIL:$JIRA_API_TOKEN" \
                       -X POST -H 'Content-Type: application/json' \
                       --data '{"transition":{"id":"51"}}' \
                       "$JIRA_BASE_URL/rest/api/3/issue/$key/transitions" || echo 000)"
              echo "$key was $st → Done (HTTP $code)"
              flipped=$((flipped + 1))
            fi
          done
          echo "Reconciled $flipped stranded ticket(s)."
          exit 0
