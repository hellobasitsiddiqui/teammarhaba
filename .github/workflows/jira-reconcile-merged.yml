name: Jira reconcile merged → Testing (backstop)

# Backstop for jira-merge-to-testing.yml. That per-merge Action is the primary path, but the
# transition job can sit `queued` for minutes behind heavier CI jobs (public repos share a
# concurrency pool), or a run can be dropped entirely — leaving a merged ticket stranded In Review.
# This sweep runs on a schedule (and on demand) and moves ANY recently-merged PR's TM ticket that is
# still In Review / In Progress to Testing (the QA gate). It makes "merged to main = Testing"
# self-heal within one cron interval, with no dependency on the orchestrator's live session. The
# In-Review/In-Progress-only guard means a ticket QA has already advanced to Done is never dragged
# back.
#
# TM-725 guard — a ticket that was DELIBERATELY REOPENED after merge (someone pulled a merged ticket
# back to In Progress / In Review to do follow-up work) must NOT be auto-re-closed every 10 minutes.
# The status-name-only guard above can't tell "never reached Testing yet" from "was Testing, then
# reopened on purpose". So before transitioning we inspect the issue changelog: if the ticket has
# ALREADY been moved into Testing (or Done) at least once, its current In Review / In Progress state
# is a deliberate reopen, and we SKIP it. We only auto-advance tickets this sweep has never closed
# once — the primary per-merge Action already handled the first transition, so the backstop only
# rescues genuinely-stranded tickets, never fights a human.
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: jira-reconcile-merged
  cancel-in-progress: true

jobs:
  reconcile:
    runs-on: ubuntu-latest
    env:
      JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
      JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
      JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Sweep recently-merged PRs → Testing
        run: |
          # Fail soft throughout: this is a janitor, never a gate.
          set -o pipefail
          if [ -z "$JIRA_BASE_URL" ] || [ -z "$JIRA_USER_EMAIL" ] || [ -z "$JIRA_API_TOKEN" ]; then
            echo "::warning::Jira secrets not configured — nothing to reconcile."
            exit 0
          fi

          flipped=0
          # Last 30 merged PRs is a wide-enough window for a 10-min cadence.
          for br in $(gh pr list --repo "$GITHUB_REPOSITORY" --state merged --limit 30 \
                        --json headRefName --jq '.[].headRefName'); do
            key="$(printf '%s' "$br" | grep -oE 'TM-[0-9]+' | head -n1 || true)"
            [ -z "$key" ] && continue

            st="$(curl -sS -u "$JIRA_USER_EMAIL:$JIRA_API_TOKEN" -H 'Accept: application/json' \
                    "$JIRA_BASE_URL/rest/api/3/issue/$key?fields=status" \
                    | python3 -c "import sys,json;print(json.load(sys.stdin)['fields']['status']['name'])" 2>/dev/null || true)"

            # Only advance tickets still short of the QA gate — never pull a Testing/Done ticket back.
            if [ "$st" = "In Review" ] || [ "$st" = "In Progress" ]; then
              # TM-725: skip a ticket that has ALREADY reached Testing/Done at least once — its current
              # In Review / In Progress state is a deliberate reopen, not a stranded merge. Inspect the
              # changelog once (expand=changelog) and look for any status transition whose TO-status was
              # Testing or Done. Fail-soft: if the changelog can't be read, fall through and advance (the
              # old behaviour) rather than silently stranding a genuinely-stuck ticket.
              reached_qa="$(curl -sS -u "$JIRA_USER_EMAIL:$JIRA_API_TOKEN" -H 'Accept: application/json' \
                      "$JIRA_BASE_URL/rest/api/3/issue/$key?expand=changelog&fields=status" \
                      | python3 -c "import sys,json; d=json.load(sys.stdin); qa={'testing','done'}; items=[i for h in d.get('changelog',{}).get('histories',[]) for i in h.get('items',[])]; print('yes' if any(i.get('field')=='status' and (i.get('toString') or '').strip().lower() in qa for i in items) else 'no')" 2>/dev/null || echo unknown)"

              if [ "$reached_qa" = "yes" ]; then
                echo "$key is $st but has already been Testing/Done once → deliberate reopen, skipping (TM-725)."
                continue
              fi

              code="$(curl -sS -o /dev/null -w '%{http_code}' \
                       -u "$JIRA_USER_EMAIL:$JIRA_API_TOKEN" \
                       -X POST -H 'Content-Type: application/json' \
                       --data '{"transition":{"id":"2"}}' \
                       "$JIRA_BASE_URL/rest/api/3/issue/$key/transitions" || echo 000)"
              echo "$key was $st → Testing (HTTP $code)"
              flipped=$((flipped + 1))
            fi
          done
          echo "Reconciled $flipped stranded ticket(s)."
          exit 0
