name: Dependabot auto-label

# Tags Dependabot PRs that are semver-MAJOR (framework migrations, e.g. Spring Boot 4 /
# springdoc 3) with `semver-major`, so they stand out and aren't mistaken for routine
# chores and merged (which broke main once, #56). Maven majors are already suppressed in
# dependabot.yml; this catches the rest (actions/docker) and any that slip through.
#
# Uses pull_request_target because Dependabot PRs get a read-only token on pull_request,
# which can't add labels. Only trusted first-party actions run here (no PR code is
# checked out or executed), so the elevated token is safe.

on:
  pull_request_target:
    types: [opened, reopened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  label-major:
    if: ${{ github.actor == 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@21025c705c08248db411dc16f3619e6b5f9ea21a # v2

      - name: Label semver-major updates
        if: ${{ steps.meta.outputs.update-type == 'version-update:semver-major' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr edit "$PR_URL" --add-label "semver-major"
