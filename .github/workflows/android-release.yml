name: Android

# Android APK CI + release (TM-246). Two independent jobs:
#
#   compile-check  — on PRs that TOUCH android/: JDK 21 + Android SDK, `./gradlew assembleDebug`.
#                    Closes the gap from TM-231 (the Kotlin shell shipped with NO Android CI — the
#                    bootstrap sandbox had no SDK). Path-filtered so unrelated PRs don't pay for it,
#                    and kept OFF the required PR gate (it's a separate workflow, not a `ci.yml` job)
#                    so a slow Android build never blocks merging non-Android changes.
#
#   release        — on a git TAG (v*) or manual `workflow_dispatch`: decode the keystore from the
#                    TM-245 secrets, run `assembleRelease`, produce the SIGNED APK, stamp its
#                    versionName to the live web `buildVersion`, and publish APK + /download page to
#                    Firebase Hosting (reusing deploy.yml's keyless WIF path). If the signing secrets
#                    are absent (the human TM-245 mint not done yet) it SKIPS the build/host with a
#                    clear warning and stays GREEN — it never ships an unsigned/debug APK as a release,
#                    and never red-fails just because the secrets aren't configured yet.
#
# Secrets consumed by `release` (stored by the human ticket TM-245 — never committed here):
#   KEYSTORE_BASE64    base64 of the release .jks
#   KEYSTORE_PASSWORD  keystore (store) password
#   KEY_ALIAS          signing key alias
#   KEY_PASSWORD       signing key password

on:
  # Compile-check only when android/ (or this workflow) changes — the path filter is the
  # Actions-minutes win (TM-151 spirit): a PR touching only web/ or backend/ skips the Android SDK.
  pull_request:
    branches: [main]
    paths:
      - 'android/**'
      - 'capacitor.config.json'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/android-release.yml'

  # Release on a deliberate version tag (the same "tag real releases only" discipline as TM-155/157)…
  push:
    tags:
      - 'v*'

  # …or on demand from the Actions tab → "Android" → Run (deploys current main's signed APK).
  workflow_dispatch:

# Cancel an in-flight PR compile-check when the PR is updated (fast gate); serialize releases so two
# tag pushes / dispatches don't race the single Hosting site. Keyed by ref so a release never cancels
# a PR check and vice-versa.
concurrency:
  group: android-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------------------------
  # PR compile check — works IMMEDIATELY (needs no secrets). Proves the Kotlin/Gradle/manifest
  # actually compile into an APK on every android/ change.
  # ---------------------------------------------------------------------------------------------
  compile-check:
    name: Android compile check (assembleDebug)
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Capacitor 8 toolchain needs JDK 21 (capacitor.build.gradle targets Java 21).
      - name: Set up JDK 21 (Temurin) + Gradle cache
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      # The Android Gradle build depends on the Capacitor node_modules (capacitor.settings.gradle
      # points :capacitor-android at ../node_modules/@capacitor/android) and on the generated
      # capacitor-cordova-android-plugins module + assets/capacitor.config.json — both produced by
      # `cap sync`, both gitignored. So install deps and sync BEFORE building (TM-278).
      - name: Set up Node (for Capacitor CLI)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      - name: Install Capacitor deps + sync Android
        working-directory: .
        run: |
          npm ci
          npx cap sync android

      # Installs the Android SDK + accepts licences; cmdline-tools land on PATH and ANDROID_HOME/
      # ANDROID_SDK_ROOT are exported, so Gradle's AGP resolves platform / build-tools itself.
      - name: Set up Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3.2.2

      - name: Compile the APK (assembleDebug)
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # Hand the debug APK back as an artifact so a reviewer can sideload it from the PR without a
      # local Android toolchain (it is NOT a release — debug-keystore signed, applicationId .debug).
      - name: Upload debug APK
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: ${{ always() }}
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn

  # ---------------------------------------------------------------------------------------------
  # Signed release + host. Stays RED until the TM-245 secrets exist (fail-loud preflight), then goes
  # green: builds the signed APK, stamps versionName = live web buildVersion, deploys APK + the
  # /download page to Firebase Hosting.
  # ---------------------------------------------------------------------------------------------
  release:
    name: Signed release APK + host on Firebase
    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # keyless WIF auth to GCP/Firebase (same as deploy.yml)
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0   # full history + tags so `git describe` names the build (matches deploy.yml)

      # Gate the signed-release path on the presence of the TM-245/TM-286 signing secrets. We DON'T
      # hard-fail when they're absent: the human keystore-custody step (TM-245) may not be done yet,
      # and a red workflow on every dispatch would be noise, not signal. Instead we SKIP the build +
      # host + upload steps with a clear neutral notice (the job stays GREEN), so nothing is shipped
      # unsigned and the run is unambiguous about *why* no APK was produced. Once the four secrets
      # exist, the same dispatch/tag goes green WITH a signed APK — no workflow change needed.
      # We test only the *names* (never echo the values), so nothing secret reaches the log.
      - name: Check signing secrets (skip gracefully if absent — TM-245)
        id: secrets
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          missing=""
          [ -z "${KEYSTORE_BASE64}" ]   && missing="${missing} KEYSTORE_BASE64"
          [ -z "${KEYSTORE_PASSWORD}" ] && missing="${missing} KEYSTORE_PASSWORD"
          [ -z "${KEY_ALIAS}" ]         && missing="${missing} KEY_ALIAS"
          [ -z "${KEY_PASSWORD}" ]      && missing="${missing} KEY_PASSWORD"
          if [ -n "${missing}" ]; then
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Release signing secrets missing:${missing}. Skipping the signed-release build/host (NOT failing). Store all four via the human keystore-custody ticket TM-245, then re-run to publish a signed APK. Never shipping an unsigned/debug APK as a release."
            {
              echo "### Android signed release — SKIPPED"
              echo "Signing secrets not configured yet (missing:${missing})."
              echo "Mint + set them via the human ticket **TM-245**, then re-run this workflow."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "present=true" >> "$GITHUB_OUTPUT"
            echo "All four signing secrets are present."
          fi

      # Capacitor 8 toolchain needs JDK 21 (capacitor.build.gradle targets Java 21).
      - name: Set up JDK 21 (Temurin) + Gradle cache
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3.2.2

      - name: Set up Node (for Capacitor CLI + firebase-tools + the asset fingerprinter)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'

      # The Android Gradle build depends on the Capacitor node_modules + the generated
      # capacitor-cordova-android-plugins module + assets/capacitor.config.json (all gitignored,
      # produced by `cap sync`). Install + sync BEFORE assembleRelease (TM-278).
      - name: Install Capacitor deps + sync Android
        run: |
          npm ci
          npx cap sync android

      # The APK's versionName MUST equal the web `buildVersion` it was cut from, so TM-231's
      # auto-update check (remote config.js buildVersion != installed versionName ⇒ prompt) fires
      # exactly when a newer web build shipped. Compute it the SAME way deploy.yml stamps config.js:
      # `git describe --tags --always --long`. versionCode is a monotonic int — GITHUB_RUN_NUMBER is
      # monotonic per-workflow, so every release the installed-APK sees as an upgrade on sideload.
      - name: Compute release version (match web buildVersion)
        id: ver
        run: |
          DESCRIBE="$(git describe --tags --always --long)"
          echo "Release versionName (= web buildVersion): ${DESCRIBE}"
          echo "versionName=${DESCRIBE}" >> "$GITHUB_OUTPUT"
          echo "versionCode=${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      # Decode the keystore from the secret into a runner-local file (gitignored pattern; runner is
      # ephemeral). Passwords flow to Gradle as ORG_GRADLE_PROJECT_* env so the signingConfig
      # (app/build.gradle → loadReleaseSigningProps) picks them up — never on the command line
      # (argv is visible in `ps`), never echoed.
      - name: Decode keystore
        if: ${{ steps.secrets.outputs.present == 'true' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "${KEYSTORE_BASE64}" | base64 --decode > "${RUNNER_TEMP}/teammarhaba-release.jks"
          echo "KEYSTORE_PATH=${RUNNER_TEMP}/teammarhaba-release.jks" >> "$GITHUB_ENV"

      - name: Build signed release APK (assembleRelease)
        if: ${{ steps.secrets.outputs.present == 'true' }}
        working-directory: android
        env:
          # The signing-property contract (gradle.properties header / README "Signing & release").
          # ORG_GRADLE_PROJECT_<name> sets Gradle project property <name> without exposing it in argv.
          ORG_GRADLE_PROJECT_teammarhaba.releaseStoreFile: ${{ env.KEYSTORE_PATH }}
          ORG_GRADLE_PROJECT_teammarhaba.releaseStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          ORG_GRADLE_PROJECT_teammarhaba.releaseKeyAlias: ${{ secrets.KEY_ALIAS }}
          ORG_GRADLE_PROJECT_teammarhaba.releaseKeyPassword: ${{ secrets.KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease --no-daemon --stacktrace \
            -PtmVersionName="${{ steps.ver.outputs.versionName }}" \
            -PtmVersionCode="${{ steps.ver.outputs.versionCode }}"

      # Locate the built APK and verify it is REALLY signed (apksigner ships with build-tools). This
      # is the belt-and-braces to the fail-loud preflight: if signing silently produced an unsigned
      # `*-unsigned.apk`, we abort rather than publish it.
      - name: Locate + verify signed APK
        id: apk
        if: ${{ steps.secrets.outputs.present == 'true' }}
        run: |
          set -euo pipefail
          APK="$(find android/app/build/outputs/apk/release -name '*.apk' ! -name '*-unsigned.apk' | head -n1)"
          if [ -z "${APK}" ] || [ ! -f "${APK}" ]; then
            echo "::error::No signed release APK produced (only an unsigned artifact?). Check the keystore secrets."
            exit 1
          fi
          echo "Built APK: ${APK}"
          APKSIGNER="$(find "${ANDROID_SDK_ROOT:-$ANDROID_HOME}/build-tools" -name apksigner | sort -V | tail -n1)"
          "${APKSIGNER}" verify --verbose "${APK}"
          echo "apk=${APK}" >> "$GITHUB_OUTPUT"

      # Upload the signed APK as a build artifact IMMEDIATELY after it's built + verified — BEFORE the
      # Firebase Hosting publish (TM-293). The artifact is the source of truth for QA (TM-288): if the
      # hosting publish later fails (or is skipped), the signed APK is still downloadable from the run.
      # `always()` (gated on the secrets being present, so it only runs on the real signed-release path)
      # means even a hosting failure can never lose the APK. This is deliberately the FIRST thing we do
      # with the verified APK, so nothing downstream can strand it.
      - name: Upload signed release APK as a build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: ${{ always() && steps.secrets.outputs.present == 'true' }}
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn

      # Build the Hosting bundle exactly like deploy.yml's web job (src -> dist, inject config.js),
      # THEN drop the signed APK into /downloads/. Deploying the whole site keeps the current web,
      # the /download page, and the APK consistent in one atomic Hosting release.
      - name: Build web bundle (mirror deploy.yml) + stage APK
        if: ${{ steps.secrets.outputs.present == 'true' }}
        run: |
          rm -rf web/dist && mkdir -p web/dist
          cp -r web/src/. web/dist/
          mkdir -p web/dist/downloads
          cp "${{ steps.apk.outputs.apk }}" web/dist/downloads/teammarhaba.apk
          ls -la web/dist/downloads

      # Keyless WIF → impersonate gha-deployer (has firebasehosting.admin) — identical to deploy.yml.
      - name: Authenticate to GCP (Workload Identity Federation, keyless)
        if: ${{ steps.secrets.outputs.present == 'true' }}
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          project_id: teammarhaba
          workload_identity_provider: projects/58443206078/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: gha-deployer@teammarhaba.iam.gserviceaccount.com

      - name: Set up gcloud
        if: ${{ steps.secrets.outputs.present == 'true' }}
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      # Same config.js injections as deploy.yml so the hosted build stays consistent: backend URL,
      # the build version (which we just stamped INTO the APK — keep them identical), and theme.
      - name: Inject backend API base URL into config.js
        if: ${{ steps.secrets.outputs.present == 'true' }}
        run: |
          URL=$(gcloud run services describe teammarhaba-backend --project=teammarhaba --region=europe-west2 --format='value(status.url)')
          if [ -z "$URL" ]; then echo "::error::could not resolve backend Cloud Run URL"; exit 1; fi
          sed -i "s#http://127.0.0.1:8080#${URL}#" web/dist/assets/config.js
          grep apiBaseUrl web/dist/assets/config.js

      - name: Inject web build version into config.js
        if: ${{ steps.secrets.outputs.present == 'true' }}
        run: |
          DESCRIBE="${{ steps.ver.outputs.versionName }}"
          echo "Build version: ${DESCRIBE}"
          sed -i "s/buildVersion: \"dev\"/buildVersion: \"${DESCRIBE}\"/" web/dist/assets/config.js
          grep buildVersion web/dist/assets/config.js

      - name: Inject web theme into config.js
        if: ${{ steps.secrets.outputs.present == 'true' }}
        env:
          THEME: ${{ vars.THEME }}
        run: |
          THEME="${THEME:-doodle}"
          if grep -q "theme:" web/dist/assets/config.js; then
            sed -i "s/theme: \"[^\"]*\"/theme: \"${THEME}\"/" web/dist/assets/config.js
          else
            sed -i "s#\(apiBaseUrl: \"[^\"]*\",\)#\1\n    theme: \"${THEME}\",#" web/dist/assets/config.js
          fi
          grep theme web/dist/assets/config.js

      # Fingerprint /assets/** for cache-busting (same as deploy.yml). It only touches /assets/*.{js,
      # css}; the /download page and /downloads/*.apk are untouched, so their URLs stay stable.
      - name: Fingerprint web assets (cache-bust)
        if: ${{ steps.secrets.outputs.present == 'true' }}
        run: |
          node web/tools/fingerprint.mjs web/dist
          ls web/dist/assets

      # Publish the web bundle + the staged /downloads/teammarhaba.apk to Firebase Hosting, keyless via
      # the WIF ADC the auth step wrote (same path as deploy.yml's working web job). Two changes vs the
      # first failing run (28184674691), where this errored with "Failed to authenticate, have you run
      # firebase login?" even though the auth + setup-gcloud blocks are byte-identical to deploy.yml:
      #
      #   1. Pass GOOGLE_APPLICATION_CREDENTIALS explicitly to firebase-tools (it's already exported to
      #      the job env by google-github-actions/auth, but we make the ADC file the deploy authenticates
      #      with unambiguous at the step level — this is the credential deploy.yml relies on).
      #
      #   2. Make the step NON-FATAL (`|| echo ::warning::`), mirroring the existing best-effort
      #      "Deploy Firebase Storage rules" step in deploy.yml. The signed APK is ALREADY uploaded as a
      #      build artifact above (the source of truth for QA — TM-288), so a hosting-auth hiccup must
      #      never red-fail the whole release job and strand the deliverable. If hosting succeeds the
      #      APK is also live at https://teammarhaba.web.app/downloads/teammarhaba.apk; if it fails the
      #      artifact still ships and the run stays green with a visible warning.
      - name: Deploy to Firebase Hosting (live channel) — non-fatal
        if: ${{ steps.secrets.outputs.present == 'true' }}
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ env.GOOGLE_APPLICATION_CREDENTIALS }}
        run: |
          npx --yes firebase-tools@15.22.0 deploy --only hosting --project teammarhaba --non-interactive \
            || echo "::warning::hosting publish failed — signed APK is still available as the build artifact (TM-293). Hosting auth (WIF ADC) needs investigation; the artifact is the QA source of truth."

      - name: Summary
        if: ${{ steps.secrets.outputs.present == 'true' }}
        run: |
          {
            echo "### Android signed release"
            echo "- versionName (= web buildVersion): \`${{ steps.ver.outputs.versionName }}\`"
            echo "- versionCode: \`${{ steps.ver.outputs.versionCode }}\`"
            echo "- **Signed APK artifact: \`app-release-apk\`** (always attached to this run — the QA source of truth, TM-288)."
            echo "- Hosted APK (if the hosting publish above succeeded): https://teammarhaba.web.app/downloads/teammarhaba.apk"
            echo "- Download page (if hosted): https://teammarhaba.web.app/download"
          } >> "$GITHUB_STEP_SUMMARY"
