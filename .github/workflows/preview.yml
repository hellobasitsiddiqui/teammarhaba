name: PR preview

# Per-PR live preview (TM-65): every PR gets a Firebase Hosting preview channel for the web
# and a tagged, NO-TRAFFIC Cloud Run revision for the backend, with both URLs posted as a PR
# comment. Torn down when the PR closes/merges. Keyless throughout (WIF -> gha-deployer, the
# same identity as the production deploy); no JSON key. Previews never take production traffic.
#
# Verification note: like any CD workflow, this can only be exercised once it's on `main` and a
# PR is opened against it — the reviewer confirms the first run produces working URLs and that
# closing the PR tears them down.

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed]

# One preview per PR; a new push supersedes the in-flight preview deploy.
concurrency:
  group: preview-${{ github.event.number }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PROJECT: teammarhaba
  REGION: europe-west2
  SERVICE: teammarhaba-backend
  IMAGE: europe-west2-docker.pkg.dev/teammarhaba/containers/backend
  CLOUDSQL: teammarhaba:europe-west2:teammarhaba-pg
  # Channel + revision tag, keyed by PR number. Lowercased, DNS-safe.
  PREVIEW: pr-${{ github.event.number }}

jobs:
  # ---- Deploy preview (PR opened / updated / reopened) ----
  deploy:
    name: Deploy preview
    if: ${{ github.event.action != 'closed' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write        # keyless WIF
      pull-requests: write   # post the preview-URL comment
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # token_format=access_token gives BOTH Application Default Credentials (for gcloud +
      # firebase-tools) AND an access token (for the Artifact Registry docker login below).
      - name: Authenticate to GCP (Workload Identity Federation, keyless)
        id: auth
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          project_id: teammarhaba
          workload_identity_provider: projects/58443206078/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: gha-deployer@teammarhaba.iam.gserviceaccount.com
          token_format: access_token

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f # v2

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      # ---- Web -> Firebase Hosting preview channel ----
      # Build seam mirrors web/Dockerfile (src/ -> dist/); firebase.json serves web/dist.
      - name: Build web assets
        run: |
          rm -rf web/dist
          mkdir -p web/dist
          cp -r web/src/. web/dist/

      - name: Deploy web preview channel
        id: web
        run: |
          # Deploy to a channel keyed by PR number; auto-expires after 7 days as a backstop
          # even if the close-cleanup is missed. --json gives us the channel URL to surface.
          out=$(npx --yes firebase-tools@15.22.0 hosting:channel:deploy "${PREVIEW}" \
            --expires 7d --project "${PROJECT}" --json)
          echo "$out"
          url=$(echo "$out" | jq -r '.result[].url' | head -n1)
          echo "url=${url}" >> "$GITHUB_OUTPUT"

      # ---- Backend -> tagged, no-traffic Cloud Run revision ----
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to Artifact Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: europe-west2-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Build & push preview image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: ${{ env.IMAGE }}:${{ env.PREVIEW }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      # Deploy a tagged revision with NO traffic — production keeps serving its live revision;
      # the preview is reachable only at the tag URL (pr-N---<service>-...run.app). Same runtime
      # SA / Cloud SQL / secrets as prod so the revision actually boots and serves /health.
      - name: Deploy backend preview revision (tagged, no traffic)
        id: backend
        run: |
          gcloud run deploy "${SERVICE}" \
            --project="${PROJECT}" --region="${REGION}" --platform=managed \
            --image="${IMAGE}:${PREVIEW}" \
            --tag="${PREVIEW}" --no-traffic \
            --service-account="teammarhaba-run@${PROJECT}.iam.gserviceaccount.com" \
            --port=8080 \
            --no-allow-unauthenticated \
            --min-instances=0 --max-instances=2 \
            --cpu=1 --memory=512Mi --cpu-boost \
            --add-cloudsql-instances="${CLOUDSQL}" \
            --set-secrets=DB_PASSWORD=teammarhaba-db-app-password:latest \
            --set-env-vars=SPRING_PROFILES_ACTIVE=prod,DB_NAME=teammarhaba,DB_USER=app,INSTANCE_CONNECTION_NAME=${CLOUDSQL},FIREBASE_PROJECT_ID=${PROJECT} \
            --startup-probe=httpGet.path=/health,httpGet.port=8080,initialDelaySeconds=10,timeoutSeconds=3,periodSeconds=10,failureThreshold=6 \
            --quiet
          # Pull the tag URL back out of the service's traffic targets.
          url=$(gcloud run services describe "${SERVICE}" --project="${PROJECT}" --region="${REGION}" \
            --format='json' | jq -r --arg t "${PREVIEW}" '.status.traffic[] | select(.tag==$t) | .url' | head -n1)
          echo "url=${url}" >> "$GITHUB_OUTPUT"

      - name: Comment preview URLs on the PR
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        env:
          WEB_URL: ${{ steps.web.outputs.url }}
          BACKEND_URL: ${{ steps.backend.outputs.url }}
          PREVIEW: ${{ env.PREVIEW }}
        with:
          script: |
            const marker = '<!-- pr-preview -->';
            const web = process.env.WEB_URL || '(web preview unavailable)';
            const backend = process.env.BACKEND_URL || '(backend preview unavailable)';
            const preview = process.env.PREVIEW;
            const body = [
              marker,
              '### 🔍 PR preview',
              '',
              `| Surface | URL |`,
              `| --- | --- |`,
              `| Web (Firebase preview channel) | ${web} |`,
              `| Backend (Cloud Run \`${preview}\` revision, no traffic) | ${backend} |`,
              '',
              '_Web channel auto-expires in 7 days; both are torn down when this PR closes. The backend revision is private (authenticated invokers only) and takes no production traffic._',
            ].join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body });
            }

  # ---- Tear down preview (PR closed / merged) ----
  cleanup:
    name: Tear down preview
    if: ${{ github.event.action == 'closed' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    steps:
      - name: Authenticate to GCP (Workload Identity Federation, keyless)
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          project_id: teammarhaba
          workload_identity_provider: projects/58443206078/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: gha-deployer@teammarhaba.iam.gserviceaccount.com

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f # v2

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Delete web preview channel
        run: |
          npx --yes firebase-tools@15.22.0 hosting:channel:delete "${PREVIEW}" \
            --project "${PROJECT}" --force || echo "Channel ${PREVIEW} already gone."

      - name: Remove backend preview tag (drops the no-traffic revision URL)
        run: |
          gcloud run services update-traffic "${SERVICE}" \
            --project="${PROJECT}" --region="${REGION}" \
            --remove-tags="${PREVIEW}" --quiet || echo "Tag ${PREVIEW} already removed."

      - name: Note teardown on the PR
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        env:
          PREVIEW: ${{ env.PREVIEW }}
        with:
          script: |
            const marker = '<!-- pr-preview -->';
            const preview = process.env.PREVIEW;
            const body = `${marker}\n### 🔍 PR preview\n\nPreview environment torn down (web channel deleted, backend \`${preview}\` tag removed).`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body });
            }
