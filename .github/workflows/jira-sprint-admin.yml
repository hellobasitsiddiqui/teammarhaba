# TM-320 — Jira sprint admin from CI.
#
# Sprint start / close / set-goal are UI-only through the Atlassian MCP connector (no sprint tool), so
# the agent normally has to ask a human to click in the board UI. The Jira Agile REST API supports all
# of it; this workflow drives it via the existing JIRA_* secrets (same ones jira-merge-to-done.yml
# uses) — the token never leaves CI. Manual dispatch only.
name: Jira sprint admin

on:
  workflow_dispatch:
    inputs:
      sprint_id:
        description: "Sprint ID (numeric, e.g. 302)"
        required: true
      action:
        description: "What to do"
        required: true
        type: choice
        options:
          - close
          - start
          - set-goal
      goal:
        description: "Sprint goal (for set-goal; optional when starting)"
        required: false
      start_date:
        description: "Start date ISO8601 (start only; default: now)"
        required: false
      end_date:
        description: "End date ISO8601 (start only; default: now + 14 days)"
        required: false

permissions:
  contents: read

concurrency:
  group: jira-sprint-admin-${{ inputs.sprint_id }}
  cancel-in-progress: false

jobs:
  admin:
    runs-on: ubuntu-latest
    steps:
      - name: "Sprint ${{ inputs.action }} via Jira Agile API"
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          SPRINT_ID: ${{ inputs.sprint_id }}
          ACTION: ${{ inputs.action }}
          GOAL: ${{ inputs.goal }}
          START_DATE: ${{ inputs.start_date }}
          END_DATE: ${{ inputs.end_date }}
        run: |
          set -euo pipefail

          if [ -z "${JIRA_BASE_URL:-}" ] || [ -z "${JIRA_USER_EMAIL:-}" ] || [ -z "${JIRA_API_TOKEN:-}" ]; then
            echo "::error::JIRA_BASE_URL / JIRA_USER_EMAIL / JIRA_API_TOKEN secrets are not all set."
            exit 1
          fi
          case "$SPRINT_ID" in
            ''|*[!0-9]*) echo "::error::sprint_id must be numeric (got '$SPRINT_ID')."; exit 1 ;;
          esac

          case "$ACTION" in
            close)
              BODY="$(jq -n '{state:"closed"}')"
              ;;
            start)
              SD="${START_DATE:-$(date -u +%Y-%m-%dT%H:%M:%S.000Z)}"
              ED="${END_DATE:-$(date -u -d '+14 days' +%Y-%m-%dT%H:%M:%S.000Z)}"
              if [ -n "${GOAL:-}" ]; then
                BODY="$(jq -n --arg sd "$SD" --arg ed "$ED" --arg g "$GOAL" '{state:"active",startDate:$sd,endDate:$ed,goal:$g}')"
              else
                BODY="$(jq -n --arg sd "$SD" --arg ed "$ED" '{state:"active",startDate:$sd,endDate:$ed}')"
              fi
              ;;
            set-goal)
              if [ -z "${GOAL:-}" ]; then echo "::error::set-goal requires the 'goal' input."; exit 1; fi
              BODY="$(jq -n --arg g "$GOAL" '{goal:$g}')"
              ;;
            *)
              echo "::error::unknown action '$ACTION'"; exit 1 ;;
          esac

          echo "POST ${JIRA_BASE_URL}/rest/agile/1.0/sprint/${SPRINT_ID}"
          echo "body: ${BODY}"
          code="$(curl -sS -o /tmp/resp.json -w '%{http_code}' \
            -u "${JIRA_USER_EMAIL}:${JIRA_API_TOKEN}" \
            -X POST -H 'Content-Type: application/json' \
            --data "${BODY}" \
            "${JIRA_BASE_URL}/rest/agile/1.0/sprint/${SPRINT_ID}" || echo "000")"

          echo "HTTP ${code}"
          cat /tmp/resp.json 2>/dev/null || true
          echo
          case "$code" in
            2*) echo "::notice::sprint ${SPRINT_ID}: ${ACTION} OK (HTTP ${code})" ;;
            *)  echo "::error::sprint ${ACTION} failed (HTTP ${code})"; exit 1 ;;
          esac
