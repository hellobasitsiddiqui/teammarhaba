name: OIDC smoke (deploy auth)

# Proves GitHub Actions can authenticate to GCP via Workload Identity Federation
# (keyless — no service-account JSON key) and act as the least-privilege deploy SA.
# Set up in TM-67. The real deploy workflows live in TM-55 / TM-60 / TM-61.

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # required for the OIDC token

jobs:
  oidc-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Authenticate to GCP (Workload Identity Federation, keyless)
        id: auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          project_id: teammarhaba
          workload_identity_provider: projects/58443206078/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: gha-deployer@teammarhaba.iam.gserviceaccount.com

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - name: Verify keyless identity + act within granted scope
        run: |
          echo "Active identity (expect the deploy SA, no key):"
          gcloud auth list --filter=status:ACTIVE --format='value(account)'
          echo "List Cloud Run services (exercises run.admin; empty is fine):"
          gcloud run services list --region=europe-west2 --format='value(metadata.name)' || true
