name: Deploy

# Continuous delivery on merge to main. Each surface has its own job; web and
# backend are independent and run in parallel:
#   web     -> Firebase Hosting   (TM-61 / 1.4.2)
#   backend -> Cloud Run          (TM-60 / 1.4.1)

on:
  # Deploy is a DELIBERATE action, not an automatic side-effect of merging (TM-153) — that's the
  # GitHub-Actions-minutes win. Run it from the Actions tab → "Deploy" → Run (it deploys current
  # `main`): before a test session, at sprint-end, whenever. Because it now runs *after* the merge,
  # `main`'s image already exists in Artifact Registry, so the "Wait for the SHA-tagged image" step
  # below finds it on the first check — the old ~2-3 min idle polling is gone.
  workflow_dispatch:

  # Auto-deploy on merge of a PR labelled `deploy` (TM-156) — "this change should go live" = label it.
  # The trigger lives IN this workflow because it can't be a separate `gh workflow run`: a
  # GITHUB_TOKEN-dispatched run won't start another workflow (the TM-148 trap). So we listen for the
  # PR close here, gate every job on `merged && labelled deploy` (the `if:` blocks below), and deploy
  # DEPLOY_SHA — the real main merge commit, NOT the PR test-merge `github.sha` (see the env below).
  # The manual `workflow_dispatch` above stays as the always-available control; an unlabelled merge
  # deploys nothing.
  pull_request:
    branches: [main]
    types: [closed]

# One live environment → serialize ALL deploys regardless of how they were triggered (manual run vs
# labelled-PR merge — these arrive on different refs, so keying on github.ref would let them run in
# parallel and clobber each other). A constant group queues them; never cancel an in-flight deploy.
concurrency:
  group: deploy-${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read

# The commit to deploy. On a manual run this is empty → falls back to github.sha (main's head). On a
# labelled-PR merge it's the PR's merge commit ON main (merge_commit_sha) — NOT github.sha, which for
# a pull_request event is the ephemeral test-merge, a commit CI never built/pushed an image for
# (TM-156). Both jobs key off this.
env:
  DEPLOY_SHA: ${{ github.event.pull_request.merge_commit_sha || github.sha }}

jobs:
  web:
    name: Deploy web to Firebase Hosting (live)
    # Manual run, OR a merged PR that carried the `deploy` label (TM-156). An unlabelled merge,
    # or a PR closed without merging, skips this job.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
       contains(github.event.pull_request.labels.*.name, 'deploy'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for keyless WIF auth
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.DEPLOY_SHA }}   # deploy the real main merge commit, not the PR test-merge (TM-156)
          fetch-depth: 0   # full history + tags so `git describe` can name the build (TM-155)

      # Build seam: mirrors web/Dockerfile's build stage (src/ -> dist/). Today a
      # plain copy; a real bundler (Vite/esbuild) drops in here without changing
      # the deploy. firebase.json serves web/dist.
      - name: Build web assets
        run: |
          rm -rf web/dist
          mkdir -p web/dist
          cp -r web/src/. web/dist/

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'

      # Keyless: WIF -> impersonate gha-deployer (has roles/firebasehosting.admin).
      # The action writes a credentials file and exports GOOGLE_APPLICATION_CREDENTIALS,
      # which firebase-tools picks up as Application Default Credentials. No JSON key.
      - name: Authenticate to GCP (Workload Identity Federation, keyless)
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          project_id: teammarhaba
          workload_identity_provider: projects/58443206078/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: gha-deployer@teammarhaba.iam.gserviceaccount.com

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      # Inject the live backend URL into the BUILT config.js so the web app calls the real
      # (public, TM-96) Cloud Run backend — not the 127.0.0.1 dev default, which on the live
      # site triggers Chrome's Private Network Access prompt and breaks /api/v1/me (TM-128).
      # Resolved at deploy time via gcloud — never hardcoded — so a rename/new project just works.
      - name: Inject backend API base URL into config.js
        run: |
          URL=$(gcloud run services describe teammarhaba-backend --project=teammarhaba --region=europe-west2 --format='value(status.url)')
          if [ -z "$URL" ]; then echo "::error::could not resolve backend Cloud Run URL"; exit 1; fi
          echo "Backend URL: $URL"
          sed -i "s#http://127.0.0.1:8080#${URL}#" web/dist/assets/config.js
          grep apiBaseUrl web/dist/assets/config.js

      # Stamp the web build name into the built config.js (same seam as the backend URL above),
      # so the live first page shows which build it was deployed from (TM-142/TM-155). Uses
      # `git describe --tags` — a readable name from the nearest release tag, or the bare short
      # SHA until anything is tagged (`--always`, so it never fails on a tag-less repo). The
      # checkout above fetches full history + tags. Never hardcoded.
      - name: Inject web build version into config.js
        run: |
          DESCRIBE="$(git describe --tags --always --long)"
          echo "Build version: ${DESCRIBE}"
          sed -i "s/buildVersion: \"dev\"/buildVersion: \"${DESCRIBE}\"/" web/dist/assets/config.js
          grep buildVersion web/dist/assets/config.js

      # Inject the active visual theme into the BUILT config.js (same seam as the backend URL /
      # build version above), so an operator switches the live theme — `clean` or `doodle` — by
      # setting the THEME repo variable and redeploying, with NO code change (TM-212). Surfaces as
      # window.TEAMMARHABA_CONFIG.theme; the web app (TM-210) falls back to `doodle` for any unknown
      # value, so we pass THEME through as-is and DON'T validate it here. Defaults to `doodle` when
      # the THEME variable is unset (vars.THEME -> empty -> `doodle`), so an unconfigured deploy
      # serves the social-events MVP look (TM-215); set the THEME repo var to `clean` to switch back.
      # Robust to whether config.js
      # already carries a `theme` field (TM-210 adds `theme: "clean"`): if present we overwrite it
      # (exactly like apiBaseUrl/buildVersion); if not, we insert it after apiBaseUrl so the live
      # build always has a real value. Never hardcoded.
      - name: Inject web theme into config.js
        env:
          THEME: ${{ vars.THEME }}
        run: |
          THEME="${THEME:-doodle}"
          echo "Theme: ${THEME}"
          if grep -q "theme:" web/dist/assets/config.js; then
            sed -i "s/theme: \"[^\"]*\"/theme: \"${THEME}\"/" web/dist/assets/config.js
          else
            sed -i "s#\(apiBaseUrl: \"[^\"]*\",\)#\1\n    theme: \"${THEME}\",#" web/dist/assets/config.js
          fi
          grep theme web/dist/assets/config.js

      # Content-hash the built assets so each deploy changes their URLs — an automatic cache-bust
      # (TM-144). Runs AFTER the config.js injections above so the hash reflects the final content;
      # it rewrites index.html + the ES-module import specifiers. firebase.json then serves
      # index.html no-cache and /assets/** immutable.
      - name: Fingerprint web assets (cache-bust)
        run: |
          node web/tools/fingerprint.mjs web/dist
          ls web/dist/assets

      - name: Deploy to Firebase Hosting (live channel)
        run: npx --yes firebase-tools@15.22.0 deploy --only hosting --project teammarhaba --non-interactive

      # Deploy the committed storage.rules (TM-191) too, reusing the same WIF ADC + pinned
      # firebase-tools as the hosting deploy above. Kept a SEPARATE, NON-FATAL step on purpose
      # (mirrors the backend job's best-effort "Enable public access"):
      #   - On a fresh replay where Firebase Storage isn't enabled yet (the human TM-184 step),
      #     or before gha-deployer has roles/firebaserules.admin, this warns and the deploy stays
      #     green instead of failing the hosting deploy.
      #   - NOT folded into `--only hosting,storage` for exactly that reason — a storage error there
      #     would fail the (already-succeeded) hosting deploy.
      - name: Deploy Firebase Storage rules (best-effort)
        run: |
          npx --yes firebase-tools@15.22.0 deploy --only storage --project teammarhaba --non-interactive \
            || echo "::warning::storage rules deploy skipped/failed — is Firebase Storage enabled (TM-184) and does gha-deployer have roles/firebaserules.admin (TM-192)? Not failing the deploy."

  backend:
    name: Deploy backend to Cloud Run
    # Manual run, OR a merged PR that carried the `deploy` label (TM-156). An unlabelled merge,
    # or a PR closed without merging, skips this job.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
       contains(github.event.pull_request.labels.*.name, 'deploy'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for keyless WIF auth
    env:
      PROJECT: teammarhaba
      REGION: europe-west2
      SERVICE: teammarhaba-backend
      IMAGE: europe-west2-docker.pkg.dev/teammarhaba/containers/backend
      CLOUDSQL: teammarhaba:europe-west2:teammarhaba-pg
    steps:
      # Full history (fetch-depth: 0) is REQUIRED here: the "Resolve backend image SHA"
      # step below walks `git rev-list ${DEPLOY_SHA}` to find the newest ancestor that has
      # a backend image, and a shallow checkout would hide those ancestors. Pinned by SHA to
      # match the supply-chain convention used by every other action in this file. (The CI
      # image-build job and the web job already check out full history per CONTRIBUTING.)
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.DEPLOY_SHA }}   # the real main merge commit, not the PR test-merge (TM-156)
          fetch-depth: 0   # full history so `git rev-list` can see ancestors (TM-194)

      # Keyless: WIF -> impersonate gha-deployer (roles/run.admin, cloudsql client via
      # the deploy, secretmanager.secretAccessor, iam.serviceAccountUser). No JSON key.
      - name: Authenticate to GCP (Workload Identity Federation, keyless)
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          project_id: teammarhaba
          workload_identity_provider: projects/58443206078/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: gha-deployer@teammarhaba.iam.gserviceaccount.com

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      # Resolve the EFFECTIVE backend image SHA to deploy (TM-194).
      #
      # The problem: CI's docs-skip gate (TM-151) does NOT build a backend image for a
      # docs-only commit (the image-build job needs `changes.outputs.code == 'true'`). So
      # when `main` HEAD (= DEPLOY_SHA) is a docs-only merge, no `backend:<HEAD>` image ever
      # exists and the old "Wait for the SHA-tagged image" step polled ~10m then exit 1'd —
      # stranding the deploy even though the backend code itself was unchanged and a perfectly
      # good image already exists at an earlier ancestor commit (this stranded sprint-170,
      # HEAD 23adf6a, a docs-only merge).
      #
      # The fix: deploy the newest backend image that actually exists.
      #   1. Bounded wait for backend:${DEPLOY_SHA} — an image for a real backend-code HEAD
      #      may still be building, racing this deploy. Kept SHORT (~10 x 15s = 2.5m, was 40
      #      x 15s = 10m): the docs-only fallback is the common case and shouldn't wait 10m.
      #   2. If still absent, walk ancestry HEAD-first (`git rev-list ${DEPLOY_SHA}`, capped at
      #      50 commits) and pick the FIRST commit whose backend:<sha> image exists.
      #   3. If neither HEAD nor any ancestor has an image, fail loudly (never deploy nothing).
      # The resolved SHA is exported as EFFECTIVE_SHA for the Deploy step. The web job is
      # untouched — it still deploys HEAD.
      - name: Resolve backend image SHA
        id: resolve
        run: |
          set -euo pipefail

          image_exists() {
            gcloud artifacts docker images describe "${IMAGE}:$1" --quiet >/dev/null 2>&1
          }

          EFFECTIVE_SHA=""
          FELL_BACK="false"

          # 1) Bounded wait for HEAD's image (it may still be building for a code HEAD).
          for i in $(seq 1 10); do
            if image_exists "${DEPLOY_SHA}"; then
              echo "Image ${IMAGE}:${DEPLOY_SHA} is available (HEAD)."
              EFFECTIVE_SHA="${DEPLOY_SHA}"
              break
            fi
            echo "Waiting for ${IMAGE}:${DEPLOY_SHA} (attempt $i/10)..."
            sleep 15
          done

          # 2) Fallback: HEAD has no image (e.g. a docs-only commit — CI built none per TM-151).
          #    Walk ancestry HEAD-first and take the newest commit that DOES have an image.
          if [ -z "${EFFECTIVE_SHA}" ]; then
            echo "No image for HEAD ${DEPLOY_SHA} after the bounded wait — walking ancestry for the newest available backend image..."
            for sha in $(git rev-list --max-count=50 "${DEPLOY_SHA}"); do
              if image_exists "${sha}"; then
                EFFECTIVE_SHA="${sha}"
                FELL_BACK="true"
                break
              fi
              echo "  no image for ancestor ${sha}"
            done
          fi

          # 3) Nothing for HEAD or any of the last 50 ancestors — fail loudly, deploy nothing.
          if [ -z "${EFFECTIVE_SHA}" ]; then
            echo "::error::No backend image found for HEAD ${DEPLOY_SHA} or any of its last 50 ancestors (did CI build/push fail?)."
            exit 1
          fi

          if [ "${FELL_BACK}" = "true" ]; then
            echo "Backend image resolved to ${EFFECTIVE_SHA} (fallback from HEAD ${DEPLOY_SHA}: docs-only commit — no image built for HEAD)."
            SUMMARY="Backend image: \`${EFFECTIVE_SHA}\` — **fallback** from docs-only HEAD \`${DEPLOY_SHA}\` (no image built for HEAD per TM-151)."
          else
            echo "Backend image resolved to ${EFFECTIVE_SHA} (HEAD)."
            SUMMARY="Backend image: \`${EFFECTIVE_SHA}\` (HEAD)."
          fi
          echo "EFFECTIVE_SHA=${EFFECTIVE_SHA}" >> "$GITHUB_ENV"
          echo "- ${SUMMARY}" >> "$GITHUB_STEP_SUMMARY"

      # Resolve the MAIL (email-code delivery) config — gated on the secret EXISTING (TM-253).
      #
      # WHY GATED, not hardcoded: `gcloud run deploy --set-secrets=MAIL_PASSWORD=teammarhaba-mail-app-password:latest`
      # FAILS THE WHOLE DEPLOY if that Secret Manager secret doesn't exist yet. Minting + pasting the
      # app password is the HUMAN half (TM-252) and may not be done when this lands. So instead of
      # unconditionally wiring MAIL_PASSWORD (which would red-fail every deploy until TM-252 is done),
      # we probe for the secret and only wire the MAIL block when it's actually present:
      #   - secret PRESENT  -> add MAIL_PASSWORD (secret) + MAIL_HOST/MAIL_PORT/MAIL_USERNAME (plain env)
      #                        => SmtpEmailCodeMailer turns ON (application.yml binds these; TM-249).
      #   - secret ABSENT   -> add nothing; MAIL_HOST stays unset => LoggingEmailCodeMailer fallback,
      #                        deploy stays GREEN. (This is the "impossible to footgun" choice.)
      # Env names match TM-249's application.yml mapping exactly: MAIL_HOST->spring.mail.host,
      # MAIL_PORT->spring.mail.port, MAIL_USERNAME->spring.mail.username, MAIL_PASSWORD->spring.mail.password.
      # The password is passed by Secret Manager *name* only — its value never touches CI, the repo, or
      # the logs (same no-mask-needed property as DB_PASSWORD). The runtime SA teammarhaba-run needs
      # secretmanager.secretAccessor on teammarhaba-mail-app-password — see infra/gcp/secrets-env.md.
      - name: Resolve MAIL config (gate on secret existing — TM-252/TM-253)
        id: mail
        run: |
          set -euo pipefail
          MAIL_SECRETS=""
          MAIL_ENV=""
          if gcloud secrets describe teammarhaba-mail-app-password --project="${PROJECT}" >/dev/null 2>&1; then
            echo "Secret teammarhaba-mail-app-password found — wiring real email-code delivery (TM-249)."
            MAIL_SECRETS="MAIL_PASSWORD=teammarhaba-mail-app-password:latest"
            MAIL_ENV="MAIL_HOST=smtp.gmail.com,MAIL_PORT=587,MAIL_USERNAME=no-reply@10xai.co.uk"
            echo "- Email-code delivery: **ON** (mail secret present)." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::warning::Secret teammarhaba-mail-app-password NOT found — deploying WITHOUT mail (logging fallback). Create it (TM-252) to turn email delivery on; see infra/gcp/secrets-env.md."
            echo "- Email-code delivery: **OFF** (mail secret absent — create it per TM-252)." >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "secrets=${MAIL_SECRETS}" >> "$GITHUB_OUTPUT"
          echo "env=${MAIL_ENV}" >> "$GITHUB_OUTPUT"

      # Deploy the immutable SHA-tagged image (EFFECTIVE_SHA, resolved above — HEAD when its
      # image exists, else the newest ancestor that has one; TM-194). Probes hit /health so a revision only
      # takes traffic once healthy (startup probe gates traffic; liveness restarts a
      # wedged container). Scale-to-zero (min-instances 0) for dev cost; cpu-boost
      # softens the cold start.
      #
      # Runtime identity: a dedicated least-privilege SA (teammarhaba-run) reads the DB
      # secret + connects to Cloud SQL — NOT the default compute SA (which lacks access).
      # Deploy PRIVATE here (--no-allow-unauthenticated); public access is enabled in a
      # SEPARATE best-effort step below. This ordering is deliberately replay-safe: the
      # org enforces domain-restricted sharing, so binding `allUsers` only works where the
      # TM-96 exception (org policy + `allUsersIngress` tag) exists. Deploying private first
      # always succeeds (incl. a fresh replay env that lacks the exception); the public step
      # then upgrades it where allowed and no-ops (stays private, still green) where not.
      #
      # Secrets/env (TM-62): the full required-var set is documented in .env.example
      # (the contract the 1.4.5 validator enforces at boot). Non-sensitive config is
      # passed as plain --set-env-vars; sensitive values (DB_PASSWORD, and MAIL_PASSWORD
      # when present) are Secret Manager references via --set-secrets — the value never
      # touches CI, the repo, or the logs (we pass the secret *name*, not the value, so
      # there is nothing for the runner to mask).
      #
      # MAIL block (TM-253): the MAIL_SECRETS / MAIL_ENV fragments come from the gated
      # "Resolve MAIL config" step above and are EMPTY when teammarhaba-mail-app-password
      # doesn't exist yet (TM-252 not done) — so the comma-join below drops them cleanly and
      # the deploy never references a missing secret. When present they append
      # MAIL_PASSWORD (secret) + MAIL_HOST/MAIL_PORT/MAIL_USERNAME (env) to turn delivery on.
      - name: Deploy to Cloud Run
        env:
          MAIL_SECRETS: ${{ steps.mail.outputs.secrets }}
          MAIL_ENV: ${{ steps.mail.outputs.env }}
        run: |
          set -euo pipefail
          # Comma-join DB_PASSWORD with the optional MAIL_PASSWORD (empty -> no trailing comma).
          SECRETS="DB_PASSWORD=teammarhaba-db-app-password:latest${MAIL_SECRETS:+,${MAIL_SECRETS}}"
          ENV_VARS="SPRING_PROFILES_ACTIVE=prod,DB_NAME=teammarhaba,DB_USER=app,INSTANCE_CONNECTION_NAME=${CLOUDSQL},FIREBASE_PROJECT_ID=${PROJECT},ADMIN_BOOTSTRAP_EMAIL=${{ vars.ADMIN_BOOTSTRAP_EMAIL }}${MAIL_ENV:+,${MAIL_ENV}}"
          gcloud run deploy "${SERVICE}" \
            --project="${PROJECT}" --region="${REGION}" --platform=managed \
            --image="${IMAGE}:${EFFECTIVE_SHA}" \
            --service-account="teammarhaba-run@${PROJECT}.iam.gserviceaccount.com" \
            --port=8080 \
            --no-allow-unauthenticated \
            --min-instances=0 --max-instances=3 \
            --cpu=1 --memory=512Mi --cpu-boost \
            --add-cloudsql-instances="${CLOUDSQL}" \
            --set-secrets="${SECRETS}" \
            --set-env-vars="${ENV_VARS}" \
            --startup-probe=httpGet.path=/health,httpGet.port=8080,initialDelaySeconds=10,timeoutSeconds=3,periodSeconds=10,failureThreshold=6 \
            --liveness-probe=httpGet.path=/health,httpGet.port=8080,timeoutSeconds=3,periodSeconds=30,failureThreshold=3 \
            --quiet
          # Record the revision THIS deploy created, so the verify step can assert it is
          # the one actually serving traffic (the TM-131 guard — see "Verify rollout").
          NEW_REV=$(gcloud run services describe "${SERVICE}" --project="${PROJECT}" --region="${REGION}" \
            --format='value(status.latestCreatedRevisionName)')
          echo "Deploy created revision: ${NEW_REV}"
          echo "NEW_REV=${NEW_REV}" >> "$GITHUB_ENV"

      # Enable public (unauthenticated) access — best-effort, replay-safe (TM-96).
      # The org enforces domain-restricted sharing (iam.allowedPolicyMemberDomains); binding
      # `allUsers` is permitted ONLY for resources carrying the `allUsersIngress=True` org tag
      # (the conditional exception set up in TM-96). This step:
      #   1. (re)asserts that tag on the service — idempotent, and a no-op without tagUser perms
      #      since the binding persists once set;
      #   2. binds allUsers as run.invoker, retrying while the policy condition propagates.
      # EVERYTHING here is non-fatal: in an environment WITHOUT the TM-96 exception/tag
      # (e.g. a fresh replay project), the bindings simply fail and the service stays private —
      # the deploy still succeeds. So a replay never hits the org-policy wall.
      - name: Enable public access (best-effort, TM-96)
        run: |
          ORG=103553953969
          gcloud resource-manager tags bindings create \
            --tag-value="${ORG}/allUsersIngress/True" \
            --parent="//run.googleapis.com/projects/${PROJECT}/locations/${REGION}/services/${SERVICE}" \
            --location="${REGION}" 2>/dev/null && echo "Tagged allUsersIngress=True" || echo "Tag not (re)applied — already bound, or no perms/exception here (ok)."
          for i in $(seq 1 8); do
            if gcloud run services add-iam-policy-binding "${SERVICE}" \
                 --member=allUsers --role=roles/run.invoker \
                 --region="${REGION}" --project="${PROJECT}" --quiet 2>/dev/null; then
              echo "allUsers bound as run.invoker (public)."; break
            fi
            echo "allUsers not bound yet (attempt ${i}/8) — DRS propagation, or no exception in this env; retrying…"
            sleep 15
          done || true

      # Verify the rollout — TM-131 hardening. A green deploy is NOT enough: in TM-131 the
      # backend served an ancient revision (#5) for the whole project while every deploy
      # reported success, because (a) new revisions failed the /health startup probe (Flyway
      # couldn't auth to Cloud SQL) so never became Ready, and (b) traffic stayed pinned to a
      # stale revision. The old verify only curled /health — which 200s on the STALE revision
      # too — so it false-greened. This step instead proves the revision THIS run created is
      # the one actually serving 100% of traffic, and fails loudly otherwise.
      #
      #   AC-H2: roll traffic forward to the latest Ready revision (never leave it pinned).
      #          If the new revision failed to become Ready, --to-latest routes to an OLDER
      #          Ready revision, so the AC-H1 match below fails — exactly the TM-131 signal.
      #   AC-H1: assert the revision serving 100% traffic == the revision this deploy created.
      - name: Verify rollout (new revision is actually serving)
        run: |
          set -euo pipefail
          if [ -z "${NEW_REV:-}" ]; then
            echo "::error::NEW_REV not set — the Deploy step did not record the created revision."
            exit 1
          fi

          # AC-H2 — roll traffic forward to the latest Ready revision (idempotent).
          gcloud run services update-traffic "${SERVICE}" --project="${PROJECT}" --region="${REGION}" --to-latest --quiet

          # AC-H1 — which revision is serving 100% of (untagged) traffic right now?
          gcloud run services describe "${SERVICE}" --project="${PROJECT}" --region="${REGION}" --format=json > /tmp/svc.json
          SERVING_REV=$(jq -r '.status.traffic[] | select((.percent==100) and (has("tag")|not)) | .revisionName' /tmp/svc.json | head -n1)
          echo "Deploy created revision : ${NEW_REV}"
          echo "Revision serving traffic: ${SERVING_REV}"

          if [ "${SERVING_REV}" != "${NEW_REV}" ]; then
            echo "::error::Stale rollout — traffic is on '${SERVING_REV}', not the just-deployed '${NEW_REV}'."
            echo "::error::The new revision likely failed its /health startup probe (check boot logs: Flyway/Cloud SQL/Firebase) so traffic stayed on an older Ready revision."
            exit 1
          fi
          echo "OK — the revision built by this run is serving 100% of traffic (current code is live)."

          # Informational: report public reachability (the deploy stays green whether the
          # TM-96 public-access exception is applied in this env or not).
          URL=$(jq -r '.status.url' /tmp/svc.json)
          echo "Service URL: ${URL}"
          code=$(curl -fsS -o /tmp/health.json -w '%{http_code}' "${URL}/health" 2>/dev/null || echo 000)
          if [ "${code}" = "200" ]; then
            echo "Public /health -> 200 $( [ -f /tmp/health.json ] && cat /tmp/health.json ) (service is PUBLIC)."
          else
            echo "Unauthenticated /health -> ${code} (service is PRIVATE in this env — TM-96 exception not applied). The serving-revision match above already confirmed current code is live."
          fi
