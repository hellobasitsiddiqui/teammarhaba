name: Jira merge → Testing

# When a PR merges to main, move its TM ticket to Testing (id 2) — "merged to main = ready for
# QA". Done is set only AFTER Testing passes (the team QA gate), so nothing is marked Done before
# it's actually been tested. Lifecycle: In Progress → In Review (PR open) → Testing (merged) → Done
# (QA passed). Replaces the old merge→Done behaviour.
on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: read

jobs:
  transition:
    # Only on an actual merge, not a plain close.
    if: ${{ github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest
    steps:
      - name: Transition merged ticket to Testing
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          HEAD_REF: ${{ github.head_ref }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          # Fail soft throughout: never block/fail the merge over Jira.
          set -o pipefail

          # 1) Find a TM-NNN key: branch name first, then PR title.
          KEY="$(printf '%s' "$HEAD_REF" | grep -oE 'TM-[0-9]+' | head -n1 || true)"
          if [ -z "$KEY" ]; then
            KEY="$(printf '%s' "$PR_TITLE" | grep -oE 'TM-[0-9]+' | head -n1 || true)"
          fi
          if [ -z "$KEY" ]; then
            echo "No TM-NNN key in branch ('$HEAD_REF') or title ('$PR_TITLE') — nothing to do."
            exit 0
          fi

          # 2) Need the Jira secrets to do anything.
          if [ -z "$JIRA_BASE_URL" ] || [ -z "$JIRA_USER_EMAIL" ] || [ -z "$JIRA_API_TOKEN" ]; then
            echo "::warning::Jira secrets not configured — skipping transition for $KEY."
            exit 0
          fi

          # 3) Transition to Testing (id 2) — the QA gate before Done.
          echo "Transitioning $KEY → Testing (id 2)…"
          code="$(curl -sS -o /tmp/jira-resp.txt -w '%{http_code}' \
            -u "$JIRA_USER_EMAIL:$JIRA_API_TOKEN" \
            -X POST \
            -H 'Content-Type: application/json' \
            --data '{"transition":{"id":"2"}}' \
            "$JIRA_BASE_URL/rest/api/3/issue/$KEY/transitions" || echo "000")"

          if [ "$code" = "204" ]; then
            echo "$KEY transitioned to Testing."
          else
            echo "::warning::Could not transition $KEY (HTTP $code) — it may already be past Testing or the transition isn't available from its current status. Not failing the merge."
            echo "Response: $(cat /tmp/jira-resp.txt 2>/dev/null)"
          fi
          # 4) Always succeed.
          exit 0
