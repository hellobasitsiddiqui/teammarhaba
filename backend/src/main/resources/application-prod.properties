# Production profile — activated by SPRING_PROFILES_ACTIVE=prod (set by the Cloud
# Run deploy, TM-60). Inherits application.properties (server.port binds Cloud Run's
# PORT). Kept minimal on purpose: the backend is still a web-only walking skeleton.
#
# Datasource wiring is intentionally NOT here yet — there is no JDBC driver on the
# classpath, so Spring autoconfigures no datasource and the app boots clean. The
# Cloud Run deploy already attaches the Cloud SQL instance and injects the
# connection env so the data-layer ticket only adds the driver + a datasource URL:
#   spring.datasource.url=jdbc:postgresql:///${DB_NAME}?cloudSqlInstance=${INSTANCE_CONNECTION_NAME}&socketFactory=com.google.cloud.sql.postgres.SocketFactory
#   spring.datasource.username=${DB_USER}
#   spring.datasource.password=${DB_PASSWORD}
# (DB_NAME / DB_USER / INSTANCE_CONNECTION_NAME as env vars, DB_PASSWORD from Secret Manager.)
