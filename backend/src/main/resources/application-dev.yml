# Local development (docker-compose Postgres, TM-52). Safe defaults — zero setup.
# Datasource defaults target a host-side Postgres on localhost; `docker compose up`
# overrides SPRING_DATASOURCE_URL to the in-network `postgres` host (see docker-compose.yml).
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/${DB_NAME:teammarhaba}
    username: ${DB_USER:app}
    password: ${DB_PASSWORD:devpassword}

app:
  # Enable the TM-587 chat seed hook for local dev + the browser-e2e backend (which runs on this
  # `dev` profile — see .github/workflows/e2e.yml). Lets the chat foundation screens be seeded and
  # rendered against a live backend. Prod leaves it off (base default + the beans' @Profile("!prod")).
  test-seed:
    enabled: true
  db:
    name: teammarhaba
    user: app
    password: devpassword
    instance-connection-name: local
  firebase:
    project-id: teammarhaba
  # CORS allow-list for the local web app (docker-compose serves it on :8081). TM-104.
  cors:
    allowed-origins:
      - http://127.0.0.1:8081
      - http://localhost:8081

# OpenAPI docs (TM-520 / TM-526): the base config disables springdoc on every runtime profile; DEV
# (non-prod) re-enables the interactive Swagger UI + /v3/api-docs so developers get a working
# "Try it out" against a non-prod backend. Prod stays disabled (application-prod.yml); the PUBLIC docs
# there are the static, read-only Swagger UI page (web/src/api-docs/).
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
