# Production (Cloud Run -> Cloud SQL). Every value is REQUIRED from the environment,
# with NO silent defaults: a missing var fails startup (placeholder resolution) and a
# blank value fails Bean Validation (@NotBlank in AppProperties). Injected by the deploy
# (.github/workflows/deploy.yml) as plain env + Secret Manager; the required set is the
# .env.example contract (TM-62) and is enforced further by the fail-loud validator (TM-64).
#
# The datasource connects to Cloud SQL Postgres via the IAM-gated Cloud SQL connector
# (postgres-socket-factory) — no public IP, no host:port. Flyway then migrates the schema
# on startup (TM-71). The deploy attaches the instance (--add-cloudsql-instances) and the
# connector reaches it by INSTANCE_CONNECTION_NAME.
spring:
  datasource:
    url: jdbc:postgresql:///${DB_NAME}?cloudSqlInstance=${INSTANCE_CONNECTION_NAME}&socketFactory=com.google.cloud.sql.postgres.SocketFactory
    username: ${DB_USER}
    password: ${DB_PASSWORD}

app:
  db:
    name: ${DB_NAME}
    user: ${DB_USER}
    password: ${DB_PASSWORD}
    instance-connection-name: ${INSTANCE_CONNECTION_NAME}
  firebase:
    project-id: ${FIREBASE_PROJECT_ID}

# OpenAPI docs are disabled in production (TM-76): the interactive UI + spec endpoint
# would expose the API's shape publicly. Re-enable behind auth later if an internal
# docs surface is wanted.
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
