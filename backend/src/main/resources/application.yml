# Base config shared by all profiles; profile-specific values live in
# application-{dev,test,prod}.yml. Profile selection via SPRING_PROFILES_ACTIVE:
# unset -> `dev` (zero-setup local runs), CI/tests use `test`, the Cloud Run
# deploy sets `prod`.
spring:
  application:
    name: backend
  profiles:
    default: dev

  # Flyway owns the schema (versioned migrations in classpath:db/migration, applied on
  # startup); Hibernate only validates its entities against the migrated schema and never
  # generates DDL. Applies to every profile — dev/test/prod all migrate the same way.
  flyway:
    enabled: true
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate

  # Mail transport for the email-code login (TM-249). Google Workspace SMTP on 10xai.co.uk.
  # host binds from MAIL_HOST (recommended value smtp.gmail.com) but is ONLY set when MAIL_HOST is
  # provided — left unset, no JavaMailSender is created and the email-code login falls back to
  # LoggingEmailCodeMailer, so dev/test/CI/e2e boot with no mail config and no SMTP connection.
  # username/password come from MAIL_USERNAME/MAIL_PASSWORD (a Workspace *app password*, SECRET);
  # the SMTP mailer fails startup loudly if mail is enabled but either is blank. To turn delivery
  # ON, set MAIL_HOST (+ creds) — or app.auth.email-code.smtp.enabled=true (which still needs a host).
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          # Fail fast instead of hanging a request thread if Gmail SMTP is unreachable.
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

# 12-factor: bind to the platform-provided port (Cloud Run sets PORT), default 8080 locally.
server:
  port: ${PORT:8080}

# Actuator (TM-74). Expose health/info/metrics over HTTP. SecurityConfig keeps
# /actuator/health public (probes) and requires auth for info/metrics. Health detail is
# shown only to authorized callers so internals never leak to anonymous probes; the
# liveness/readiness groups are enabled for orchestration. Micrometer ships /metrics here;
# exporting it to Cloud Monitoring is TM-75.
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  health:
    # Don't let the email-code SMTP relay (TM-249) gate the app's health. spring-boot-starter-mail
    # auto-registers a MailHealthIndicator that opens an SMTP connection on every /actuator/health
    # call; an unreachable/unconfigured relay would flip overall health to DOWN (503) and fail
    # liveness/readiness probes — coupling the app's "am I up" to an external mail server. Mail
    # delivery failures already surface per-request (EmailCodeDeliveryException); they must not
    # take the instance out of rotation.
    mail:
      enabled: false
  info:
    env:
      enabled: true
  # Micrometer -> Cloud Monitoring export (TM-75). Off by default, so dev/test are a no-op
  # and never reach for GCP credentials; prod turns it on (application-prod.yml). JVM + HTTP
  # server metrics are collected regardless and exposed at /actuator/metrics.
  stackdriver:
    metrics:
      export:
        enabled: false

# OpenAPI docs (TM-76). Spec at /v3/api-docs, Swagger UI at /swagger-ui. Enabled here
# (dev/test); prod disables both (application-prod.yml) to keep the API shape off the
# public surface. When auth tightens (TM-79), these paths must stay permit-listed in non-prod.
springdoc:
  swagger-ui:
    path: /swagger-ui

# Passwordless email-code login (TM-234). Safe defaults shared by every profile; these are
# tunables, NOT secrets (the only secret is the generated code, which is never logged/persisted).
# Prod can tighten any value via the environment. A non-positive ttl/length/limit fails startup
# loudly (Bean Validation in EmailCodeProperties) rather than silently weakening the flow.
app:
  # Event reminder scan (TM-394): a fixed-delay @Scheduled tick that pushes the T-24h and T-1h
  # nudges to an event's GOING attendees. `enabled: false` skips creating the scheduler bean
  # entirely (the test profile does this so integration tests stay deterministic and drive the
  # service directly). Cadence knobs are tunables, not secrets; per-(event, milestone) idempotency
  # is a DB unique claim (V14), so any number of instances may tick concurrently.
  event-reminders:
    enabled: ${EVENT_REMINDERS_ENABLED:true}
    scan-interval-ms: ${EVENT_REMINDERS_SCAN_INTERVAL_MS:60000}   # gap between scan passes
    initial-delay-ms: ${EVENT_REMINDERS_INITIAL_DELAY_MS:15000}   # startup grace before the first pass
  # Current published terms/privacy version (TM-170). The client gates the app until the user's
  # accepted version (terms_accepted_version, migration V6) matches this. Bump it (via the env var or
  # this default) when the terms change to re-prompt everyone. Exposed read-only on GET /api/v1/me as
  # `currentTermsVersion`. Blank/unset falls back to the shipped default in TermsProperties.
  terms:
    current-version: ${APP_TERMS_CURRENT_VERSION:2026-06-01}
  auth:
    email-code:
      length: ${EMAIL_CODE_LENGTH:6}            # digits in the one-time code (matches the SMS UX)
      ttl: ${EMAIL_CODE_TTL:10m}                # how long an issued code stays valid (short by design)
      send-cooldown: ${EMAIL_CODE_SEND_COOLDOWN:60s}  # min gap between requests for one address (rate-limit + Resend)
      max-verify-attempts: ${EMAIL_CODE_MAX_VERIFY_ATTEMPTS:5}  # wrong guesses before the code is burned
      # Bounded in-memory state + per-IP limit (TM-247): cap memory under a flood of distinct addresses
      # / source IPs, and throttle varied-address floods the per-address cooldown can't catch.
      max-outstanding: ${EMAIL_CODE_MAX_OUTSTANDING:100000}     # hard cap on addresses with in-memory auth state
      ip-request-limit: ${EMAIL_CODE_IP_REQUEST_LIMIT:20}       # max request calls per client IP per window (429 over)
      ip-request-window: ${EMAIL_CODE_IP_REQUEST_WINDOW:1m}     # fixed window for the per-IP limit
      max-tracked-ips: ${EMAIL_CODE_MAX_TRACKED_IPS:100000}     # hard cap on IPs the limiter tracks (bounds the limiter)
      # Real SMTP delivery (TM-249). Activates SmtpEmailCodeMailer when `enabled` is true OR
      # spring.mail.host is set; otherwise the LoggingEmailCodeMailer fallback stays in place.
      # `from` is the sender address (decided sender domain 10xai.co.uk); these are NOT secrets —
      # the SMTP credentials live in spring.mail.username/password (MAIL_USERNAME/MAIL_PASSWORD).
      smtp:
        enabled: ${MAIL_SMTP_ENABLED:false}     # explicit on-switch; or just set MAIL_HOST
        from: ${APP_MAIL_FROM:no-reply@10xai.co.uk}   # From address on the code email
        from-name: ${APP_MAIL_FROM_NAME:TeamMarhaba}  # display name shown with the From address
      # Inbox-free test-email hook (TM-312) — the email twin of the SMS test phone number (TM-309).
      # An allow-listed address gets a FIXED, known code and the real send is SKIPPED, so the
      # email-code login can be driven end-to-end in CI without reading an inbox. DISABLED by default
      # (empty allow-list => no-op): prod is unaffected and real addresses always get a random code +
      # real send + full cooldown/attempt caps. Turn it ON only in CI/e2e by setting an allow-list.
      # (Flagging these accounts accountType=test is follow-up TM-311, not configured here.)
      test:
        # Comma-separated domain suffixes (leading @ optional) whose addresses take the test path.
        allowed-domains: ${EMAIL_CODE_TEST_ALLOWED_DOMAINS:}
        # Comma-separated explicit addresses that take the test path.
        allowed-addresses: ${EMAIL_CODE_TEST_ALLOWED_ADDRESSES:}
        # The known code returned for allow-listed addresses; inert unless the allow-list is non-empty.
        fixed-code: ${EMAIL_CODE_TEST_FIXED_CODE:123456}

# Populates /actuator/info (authenticated). Static, non-sensitive identity.
info:
  app:
    name: TeamMarhaba backend
    description: TeamMarhaba backend API service
