# Automated tests — isolated, no external services. Defaults keep the context
# bootable; the Testcontainers Postgres harness lands in TM-57.
app:
  # Enable the TM-587 chat seed hook under the test profile so the seed endpoint's own integration
  # test (ChatSeedControllerIntegrationTest) can exercise it. The prod-disabled guard is proven by
  # ChatSeedDisabledIntegrationTest, which overrides this back to `false` (as prod inherits it).
  test-seed:
    enabled: true
  db:
    name: teammarhaba_test
    user: test
    password: test
    instance-connection-name: test
  firebase:
    project-id: teammarhaba-test
  # No background reminder ticks during tests (TM-394): integration tests call
  # EventReminderService directly with a controlled clock, so a live schedule would only inject
  # nondeterminism (a mid-test tick could claim a marker the test expects to claim itself).
  event-reminders:
    enabled: false
  # Likewise no background offer-cascade sweeps during tests (TM-397): integration tests drive
  # WaitlistOfferCascadeService directly with a controlled clock, so a live sweep would race the
  # stamps/pushes a test sets up itself.
  offer-cascade:
    enabled: false
  # And no background event-chat close sweeps during tests (TM-578): the lifecycle integration test
  # drives sweepDueThreadCloses directly with a fixed `now`, so a live hourly tick would only add
  # nondeterminism (it could stamp closed_at on a thread mid-assertion).
  event-chat-close:
    enabled: false
  # Pin the open-ended default duration (TM-412) so listing-state integration tests are deterministic
  # regardless of any future change to the shipped prod default.
  event-listing:
    default-duration-hours: 3
  # No API rate limiting during tests by default (TM-158): the suite fires many /api/** requests from
  # one MockMvc client and would otherwise trip the limit and flake. RateLimitFilterIntegrationTest
  # re-enables it with a tiny budget via @TestPropertySource to prove the under-/over-limit behaviour.
  rate-limit:
    enabled: false

# OpenAPI docs (TM-76, TM-520): the live springdoc endpoints are disabled by default on every runtime
# profile (application.yml); the test profile re-enables them so OpenApiDocsTest + OpenApiDriftTest can
# read /v3/api-docs and /swagger-ui. This is an internal test surface, not a deployed one.
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
