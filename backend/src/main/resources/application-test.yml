# Automated tests — isolated, no external services. Defaults keep the context
# bootable; the Testcontainers Postgres harness lands in TM-57.
app:
  db:
    name: teammarhaba_test
    user: test
    password: test
    instance-connection-name: test
  firebase:
    project-id: teammarhaba-test
  # No background reminder ticks during tests (TM-394): integration tests call
  # EventReminderService directly with a controlled clock, so a live schedule would only inject
  # nondeterminism (a mid-test tick could claim a marker the test expects to claim itself).
  event-reminders:
    enabled: false
